<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f0d">
<title>鳥類調査記録</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.svg">
<link rel="stylesheet" href="./leaflet.css">
<style>
  :root{
    --bg:#0a0f0d; --panel:#12181a; --panel2:#1a2226; --line:#2a3438;
    --fg:#e8efe9; --muted:#8a9a93; --accent:#3fb984; --accent2:#2c8a63;
    --warn:#e0a030; --danger:#d05555; --chip:#233029;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    font-size:16px; line-height:1.5; overscroll-behavior:none;}
  body{padding-bottom:env(safe-area-inset-bottom);}
  h1,h2,h3{margin:0 0 .4em;}
  a{color:var(--accent);}
  button{font-family:inherit; font-size:16px;}
  .app{max-width:900px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}

  /* ヘッダー */
  header{position:sticky; top:0; z-index:500; background:var(--panel);
    border-bottom:1px solid var(--line); padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;}
  .hbar{display:flex; align-items:center; gap:10px;}
  .htitle{font-weight:700; font-size:18px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .back{background:none; border:none; color:var(--accent); font-size:16px; padding:6px 4px; cursor:pointer;}
  .hsub{display:flex; gap:10px; flex-wrap:wrap; margin-top:6px; font-size:13px; color:var(--muted);}
  .hsub .pill{background:var(--chip); border:1px solid var(--line); border-radius:20px; padding:2px 10px;}
  .pill.ok{color:var(--accent);} .pill.warn{color:var(--warn);} .pill.off{color:var(--muted);}

  main{flex:1; padding:14px; padding-bottom:90px;}

  /* カード・リスト */
  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:12px;}
  .card.tap{cursor:pointer;} .card.tap:active{background:var(--panel2);}
  .row{display:flex; align-items:center; gap:10px;}
  .grow{flex:1;}
  .muted{color:var(--muted);} .small{font-size:13px;} .tiny{font-size:12px;}
  .badge{display:inline-block; border-radius:20px; padding:2px 10px; font-size:12px; background:var(--chip); border:1px solid var(--line);}
  .badge.status-未開始{color:var(--muted);}
  .badge.status-調査中{color:var(--accent); border-color:var(--accent2);}
  .badge.status-終了{color:var(--muted);}
  .badge.warn{color:var(--warn);}
  .sp{height:8px;}

  /* ボタン */
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--panel2); color:var(--fg); border:1px solid var(--line);
    border-radius:12px; padding:12px 16px; cursor:pointer; width:100%; text-align:center;}
  .btn:active{background:var(--panel);}
  .btn.primary{background:var(--accent2); border-color:var(--accent); color:#fff; font-weight:700;}
  .btn.ghost{background:none;}
  .btn.danger{color:var(--danger); border-color:#5a2e2e;}
  .btn.big{font-size:18px; padding:18px; font-weight:700;}
  .btn-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .btn-grid.one{grid-template-columns:1fr;}

  /* フォーム */
  label.field{display:block; margin-bottom:14px;}
  label.field > .lab{display:block; font-size:13px; color:var(--muted); margin-bottom:5px;}
  input,select,textarea{width:100%; background:var(--panel2); color:var(--fg);
    border:1px solid var(--line); border-radius:10px; padding:11px 12px; font-size:16px;}
  textarea{min-height:70px; resize:vertical;}
  input:focus,select,textarea:focus{outline:none; border-color:var(--accent);}
  .req{color:var(--accent);}
  .seg{display:flex; flex-wrap:wrap; gap:8px;}
  .seg button{background:var(--panel2); border:1px solid var(--line); color:var(--muted);
    border-radius:20px; padding:8px 14px; cursor:pointer;}
  .seg button.on{background:var(--accent2); border-color:var(--accent); color:#fff;}
  .two{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

  /* 大ボタン群（調査中） */
  .actions{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:6px;}
  .act{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:20px 12px; text-align:center; cursor:pointer; font-size:17px; font-weight:700;}
  .act:active{background:var(--panel2);}
  .act .ic{font-size:26px; display:block; margin-bottom:6px;}
  .act.primary{background:var(--accent2); border-color:var(--accent); color:#fff;}
  .act.wide{grid-column:1 / -1;}

  /* 検索候補 */
  .suggest{border:1px solid var(--line); border-radius:10px; margin-top:6px; overflow:hidden; max-height:280px; overflow-y:auto;}
  .suggest .item{padding:11px 12px; border-bottom:1px solid var(--line); cursor:pointer;}
  .suggest .item:last-child{border-bottom:none;}
  .suggest .item:active{background:var(--panel2);}
  .suggest .item .fam{font-size:12px; color:var(--muted);}
  .chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;}
  .chips .c{background:var(--chip); border:1px solid var(--line); border-radius:16px; padding:5px 10px; font-size:13px; cursor:pointer;}

  /* 地図 */
  #map{height:calc(100vh - 220px); min-height:320px; border-radius:var(--radius); border:1px solid var(--line);}
  .leaflet-container{background:#0d1412;}
  .locate-btn{width:42px; height:42px; font-size:20px; line-height:1;
    background:var(--panel); color:var(--fg); border:1px solid var(--line);
    border-radius:10px; cursor:pointer; box-shadow:0 1px 5px rgba(0,0,0,.4);}
  .locate-btn:active{background:var(--panel2);}

  /* 集計テーブル */
  table{width:100%; border-collapse:collapse; font-size:14px;}
  th,td{text-align:left; padding:8px 6px; border-bottom:1px solid var(--line);}
  th{color:var(--muted); font-weight:600; position:sticky; top:0; background:var(--panel);}
  td.num,th.num{text-align:right;}
  .tablewrap{overflow-x:auto; -webkit-overflow-scrolling:touch;}

  /* トースト */
  #toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%);
    background:#000; color:#fff; padding:11px 18px; border-radius:24px; font-size:14px;
    opacity:0; transition:opacity .25s; pointer-events:none; z-index:2000; max-width:90%;}
  #toast.show{opacity:.94;}

  /* 録音 */
  .reclist{margin-top:10px; display:flex; flex-direction:column; gap:10px;}
  .recitem{background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:10px;}
  .recaudio{width:100%; margin-top:8px; height:38px;}
  .recdot{display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--danger); margin-right:6px; animation:recblink 1s infinite;}
  @keyframes recblink{0%,100%{opacity:1;} 50%{opacity:.2;}}
  /* 写真・動画 */
  .mediagrid{margin-top:10px; display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .mediaitem{position:relative;}
  .mediathumb{position:relative; width:100%; aspect-ratio:1/1; background:var(--panel2);
    border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .mediael{width:100%; height:100%; object-fit:cover; display:block; background:#000;}
  .mediadel{position:absolute; top:4px; right:4px; width:26px; height:26px; border-radius:50%;
    background:rgba(0,0,0,.6); color:#fff; border:1px solid rgba(255,255,255,.5); font-size:16px;
    line-height:1; cursor:pointer; z-index:2;}
  .mediacap{margin-top:3px; text-align:center;}

  /* 選択削除 */
  .selcard.selected{border-color:var(--accent); background:var(--panel2);}
  .selcb{font-size:22px; line-height:1; color:var(--accent); flex:0 0 auto;}
  button:disabled,.btn:disabled{opacity:.45; pointer-events:none;}

  .empty{text-align:center; color:var(--muted); padding:40px 10px;}
  .divider{height:1px; background:var(--line); margin:14px 0;}
  .note{font-size:13px; color:var(--muted); background:var(--panel2); border:1px solid var(--line);
    border-radius:10px; padding:10px 12px;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="hbar">
      <button class="back hidden" id="backBtn" onclick="goBack()">‹ 戻る</button>
      <div class="htitle" id="hTitle">鳥類調査記録</div>
    </div>
    <div class="hsub" id="hSub"></div>
  </header>
  <main id="main"></main>
</div>
<div id="toast"></div>

<script src="./leaflet.js"></script>
<script>
/* ============================================================
   鳥類調査員育成用フィールド記録アプリ — Web/PWA 試作版 v1
   保存: localStorage(JSON) + IndexedDB(録音音声) / 地図: Leaflet + 地理院タイル
   ※ 軌跡記録(GPSトラック)は次版で追加予定
   ============================================================ */

/* ---------- バージョン（更新されたか目視で確認するための表示） ---------- */
const APP_VERSION = 'v15（2026-07-17 まとめて記録・北海道音源準備）';

/* ---------- ユーティリティ ---------- */
const $ = (s,el=document)=>el.querySelector(s);
const uuid = ()=> (crypto.randomUUID ? crypto.randomUUID()
  : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
      const r=Math.random()*16|0, v=c==='x'?r:(r&0x3|0x8); return v.toString(16);}));
const nowISO = ()=> new Date().toISOString();
function localDatetimeValue(d=new Date()){
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}
function dateValue(d=new Date()){
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function fmtDate(s){ if(!s) return '—'; return String(s).slice(0,10); }
function fmtTime(s){ if(!s) return '—'; const d=new Date(s); if(isNaN(d)) return '—';
  const p=n=>String(n).padStart(2,'0'); return `${p(d.getHours())}:${p(d.getMinutes())}`; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),1800); }

/* ---------- データ層（localStorage） ---------- */
const DB = {
  key:{sv:'bs_surveys', ob:'bs_observations', nt:'bs_notes', hy:'bs_hypotheses', hr:'bs_hyp_results', recent:'bs_recent_species', fav:'bs_fav_species'},
  load(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } },
  save(k,v){ localStorage.setItem(k, JSON.stringify(v)); },
  surveys(){ return this.load(this.key.sv).filter(s=>!s.deleted_at); },
  allSurveys(){ return this.load(this.key.sv); },
  observations(){ return this.load(this.key.ob).filter(o=>!o.deleted_at); },
  notes(){ return this.load(this.key.nt).filter(n=>!n.deleted_at); },
  hypotheses(){ return this.load(this.key.hy).filter(h=>!h.deleted_at); },
  hypResults(){ return this.load(this.key.hr).filter(r=>!r.deleted_at); },
  obsOf(svUuid){ return this.observations().filter(o=>o.survey_uuid===svUuid); },
  notesOf(svUuid){ return this.notes().filter(n=>n.survey_uuid===svUuid); },
  hypOf(svUuid){ return this.hypotheses().filter(h=>h.survey_uuid===svUuid); },
  hypothesis(u){ return this.load(this.key.hy).find(h=>h.uuid===u); },
  resultsOf(hyUuid){ return this.hypResults().filter(r=>r.hypothesis_uuid===hyUuid); },
  survey(u){ return this.allSurveys().find(s=>s.uuid===u); },
  upsertSurvey(rec){ const a=this.load(this.key.sv); const i=a.findIndex(x=>x.uuid===rec.uuid);
    rec.updated_at=nowISO(); if(i<0){ rec.created_at=nowISO(); a.push(rec);} else a[i]=rec; this.save(this.key.sv,a); },
  upsertObs(rec){ const a=this.load(this.key.ob); const i=a.findIndex(x=>x.uuid===rec.uuid);
    rec.updated_at=nowISO(); if(i<0){ rec.created_at=nowISO(); a.push(rec);} else a[i]=rec; this.save(this.key.ob,a); },
  upsertNote(rec){ const a=this.load(this.key.nt); const i=a.findIndex(x=>x.uuid===rec.uuid);
    rec.updated_at=nowISO(); if(i<0){ rec.created_at=nowISO(); a.push(rec);} else a[i]=rec; this.save(this.key.nt,a); },
  upsertHyp(rec){ const a=this.load(this.key.hy); const i=a.findIndex(x=>x.uuid===rec.uuid);
    rec.updated_at=nowISO(); if(i<0){ rec.created_at=nowISO(); a.push(rec);} else a[i]=rec; this.save(this.key.hy,a); },
  upsertHypResult(rec){ const a=this.load(this.key.hr); const i=a.findIndex(x=>x.uuid===rec.uuid);
    rec.updated_at=nowISO(); if(i<0){ rec.created_at=nowISO(); a.push(rec);} else a[i]=rec; this.save(this.key.hr,a); },
  softDelete(k,u){ const a=this.load(k); const i=a.findIndex(x=>x.uuid===u);
    if(i>=0){ a[i].deleted_at=nowISO(); this.save(k,a);} },
  restore(k,u){ const a=this.load(k); const i=a.findIndex(x=>x.uuid===u);
    if(i>=0){ delete a[i].deleted_at; this.save(k,a);} },
  hardDelete(k,u){ this.save(k, this.load(k).filter(x=>x.uuid!==u)); },
  deleted(k){ return this.load(k).filter(x=>x.deleted_at); },
  recentSpecies(){ return this.load(this.key.recent); },
  pushRecent(name){ if(!name) return; let a=this.load(this.key.recent).filter(x=>x!==name);
    a.unshift(name); a=a.slice(0,12); this.save(this.key.recent,a); },
};

/* ---------- 録音・写真・動画の保存（IndexedDB：サイズが大きいためlocalStorageと分離） ---------- */
/* ストア 'audio' = 録音 / 'media' = 写真・動画 */
let _mediaDbPromise=null;
function openMediaDB(){
  if(_mediaDbPromise) return _mediaDbPromise;
  _mediaDbPromise=new Promise((res,rej)=>{
    if(!window.indexedDB){ rej(new Error('no-indexeddb')); return; }
    const r=indexedDB.open('bird_survey_audio',4);
    r.onupgradeneeded=()=>{ const db=r.result;
      if(!db.objectStoreNames.contains('audio')) db.createObjectStore('audio',{keyPath:'id'});
      if(!db.objectStoreNames.contains('media')) db.createObjectStore('media',{keyPath:'id'});
      if(!db.objectStoreNames.contains('refdoc')) db.createObjectStore('refdoc',{keyPath:'id'});
      if(!db.objectStoreNames.contains('call')) db.createObjectStore('call',{keyPath:'jp'}); };
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
  return _mediaDbPromise;
}
function idbDo(store, mode, fn){ return openMediaDB().then(db=>new Promise((res,rej)=>{
  const st=db.transaction(store,mode).objectStore(store); const q=fn(st);
  q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error);
})); }
function makeBlobStore(store, refField){
  return {
    put(rec){ return idbDo(store,'readwrite', st=>st.put(rec)); },
    get(id){ return idbDo(store,'readonly', st=>st.get(id)); },
    del(id){ return idbDo(store,'readwrite', st=>st.delete(id)); },
    all(){ return idbDo(store,'readonly', st=>st.getAll()).then(r=>r||[]); },
    // どの観察にも参照されていない残骸（保存されなかった・完全削除済み）を掃除
    // ただしマイ図鑑に登録済みのものは保護する
    gc(){ const valid=new Set();
      DB.load(DB.key.ob).forEach(o=>(o[refField]||[]).forEach(a=>a&&a.id&&valid.add(a.id)));
      try{ JSON.parse(localStorage.getItem('bs_myguide')||'[]').forEach(g=>{
        if((store==='audio'&&g.kind==='audio')||(store==='media'&&(g.kind==='photo'||g.kind==='video'))) valid.add(g.ref_id);
      }); }catch(e){}
      return this.all().then(list=>Promise.all(list.filter(a=>!valid.has(a.id)).map(a=>this.del(a.id)))); }
  };
}
const AudioDB = makeBlobStore('audio','audio');   // 観察の o.audio[] が参照
const PhotoDB = makeBlobStore('media','media');   // 観察の o.media[] が参照
function mediaGcAll(){ return Promise.all([AudioDB.gc().catch(()=>{}), PhotoDB.gc().catch(()=>{})]); }

// 資料PDF（図鑑など）。端末内のみに保存し、公開URL・バックアップには含めない
const RefDB = {
  put(rec){ return idbDo('refdoc','readwrite', st=>st.put(rec)); },
  get(id){ return idbDo('refdoc','readonly', st=>st.get(id)); },
  del(id){ return idbDo('refdoc','readwrite', st=>st.delete(id)); },
};
function refdocList(){ try{ return JSON.parse(localStorage.getItem('bs_refdocs')||'[]'); }catch(e){ return []; } }
function refdocSave(list){ localStorage.setItem('bs_refdocs', JSON.stringify(list)); }

// オフライン鳴き声（同梱CC音源を端末に保存）。store 'call' に 和名→blob
const CallDB = {
  put(rec){ return idbDo('call','readwrite', st=>st.put(rec)); },
  get(jp){ return idbDo('call','readonly', st=>st.get(jp)); },
  keys(){ return idbDo('call','readonly', st=>st.getAllKeys()).then(r=>r||[]); },
  clear(){ return idbDo('call','readwrite', st=>st.clear()); },
};

  habitat:['河畔林','森林','草地','農耕地','開放地','水域','市街地','その他'],

function guideLinksByName(name){ const s=speciesByName(name)||{japanese_name:name, scientific_name:''};

let STACK = [];               // {name, arg}
let currentSurveyUuid = null; // 調査中コンテキスト
let mapObj = null;
let mapCurMarker = null, mapCurCircle = null; // 地図上の現在地マーカー・精度円

function nav(name, arg){ SCREENS._sel=null; STACK.push({name,arg}); render(); }
function goBack(){ if(STACK.length>1){ SCREENS._sel=null; STACK.pop(); render(); } }
function reset(name,arg){ SCREENS._sel=null; STACK=[{name,arg}]; render(); }

const SCREENS = {}; // name -> function(arg) -> returns {title, sub[], html, onMount}

function render(){
  if(REC) recAbort(); // 画面を離れたら録音を中断（保存はしない）
  if(PDFCTX){ try{ PDFCTX.doc.destroy(); }catch(e){} PDFCTX=null; } // PDF閲覧の後始末
  if(mapObj){ try{ mapObj.remove(); }catch(e){} mapObj=null; }
  const cur = STACK[STACK.length-1] || {name:'home'};
  const scr = SCREENS[cur.name] || SCREENS.home;
  const out = scr(cur.arg) || {};
  $('#hTitle').textContent = out.title || '鳥類調査記録';
  $('#backBtn').classList.toggle('hidden', STACK.length<=1);
  const sub = $('#hSub'); sub.innerHTML = (out.sub||[]).join('');
  $('#main').innerHTML = out.html || '';
  if(out.onMount) out.onMount();
  window.scrollTo(0,0);
}

SCREENS.home = ()=>{
  const surveys = DB.surveys().sort((a,b)=>(b.survey_date||'').localeCompare(a.survey_date||''));
  const active = surveys.filter(s=>s.status==='調査中');
  const others = surveys.filter(s=>s.status!=='調査中');

  const selMode = !!(SCREENS._sel && SCREENS._sel.scope==='home');
  const svCard = s=>{
    const obs = DB.obsOf(s.uuid);
    const spCount = new Set(obs.filter(o=>o.species_name_snapshot).map(o=>o.species_name_snapshot)).size;
    const review = obs.filter(o=>o.needs_review).length;
    const body = `
      <div class="row">
        ${selMode?`<span class="selcb">${SCREENS._sel.set.has(s.uuid)?'☑':'☐'}</span>`:''}

        </div>
        <span class="badge status-${esc(s.status||'未開始')}">${esc(s.status||'未開始')}</span>
      </div>
      <div class="chips" style="margin-top:10px;">
        <span class="c">確認種数 ${spCount}</span>
        <span class="c">観察 ${obs.length}件</span>
        ${review?`<span class="c" style="color:var(--warn)">要確認 ${review}</span>`:''}
      </div>`;
    return selMode
      ? `<div class="card tap selcard ${SCREENS._sel.set.has(s.uuid)?'selected':''}" onclick="toggleSel('${s.uuid}',this)">${body}</div>`
      : `<div class="card tap" onclick="nav('survey','${s.uuid}')">${body}</div>`;

  const selBar = selMode
    ? `<div class="sp"></div><button class="btn danger big" id="selDelBtn" ${SCREENS._sel.set.size?'':'disabled'} onclick="deleteSelected()">選択した${SCREENS._sel.set.size}件を削除</button>`

      <h3 class="muted small grow" style="margin:0;">調査一覧</h3>

    </div>`;

  return {
    title:'鳥類調査記録',
    html:`
      <button class="btn primary big" onclick="nav('surveyEdit',null)">＋ 新しい調査を作成</button>
      <div class="sp"></div>
      <div class="btn-grid">
        <button class="btn" onclick="nav('search',null)">🔍 記録を検索</button>
        <button class="btn" onclick="nav('guide',null)">📖 図鑑・鳴き声</button>
      </div>
      <div class="sp"></div>
      <button class="btn" onclick="nav('refdocs',null)">📚 資料・図鑑（PDF取り込み）</button>
      <div class="sp"></div>
      ${active.length?`<h3 class="muted small">継続中の調査</h3>${active.map(svCard).join('')}`:''}
      ${listHeader}
      ${(active.length||others.length)? others.map(svCard).join('') : '<div class="empty">まだ調査がありません。<br>「新しい調査を作成」から始めましょう。</div>'}
      ${selBar}

      <div class="sp"></div>
      <div class="row" style="justify-content:space-between; align-items:center;">
        <span class="tiny muted">バージョン ${APP_VERSION}</span>
        <button class="btn ghost" style="width:auto; padding:6px 12px; font-size:13px;" onclick="forceUpdate()">↻ 最新に更新</button>
      </div>
    `
  };
};
// アプリ本体のプログラムだけを最新に読み込み直す（記録データは消さない）
function forceUpdate(){
  if(!confirm('保存した記録（調査・観察・録音）はそのままで、アプリのプログラムだけを最新に読み込み直します。よろしいですか？')) return;
  const reload=()=>location.reload();
  const tasks=[];
  if('serviceWorker' in navigator){ tasks.push(navigator.serviceWorker.getRegistrations()
    .then(rs=>Promise.all(rs.map(r=>r.unregister()))).catch(()=>{})); }
  if(window.caches){ tasks.push(caches.keys().then(ks=>Promise.all(ks.map(k=>caches.delete(k)))).catch(()=>{})); }
  Promise.all(tasks).then(reload, reload);
}

const DRAFT_KEY='bs_draft_survey';
SCREENS.surveyEdit = (svUuid)=>{
  const editing = !!svUuid;
  let s = editing ? Object.assign({}, DB.survey(svUuid)) : null;
  if(!s){
    // 下書き復元（新規作成時のみ）
    let draft=null; try{ draft=JSON.parse(localStorage.getItem(DRAFT_KEY)||'null'); }catch(e){}
    s = draft || { uuid:uuid(), name:'', survey_date:dateValue(), location_name:'',
      survey_method:'ラインセンサス', investigator_name:'', weather:'晴', wind:'弱い',
      temperature:'', purpose:'', pre_survey_notes:'', pre_hypothesis:'', status:'未開始' };
  }
  const seg=(field,opts)=>`<div class="seg" data-seg="${field}">${opts.map(o=>
    `<button type="button" class="${s[field]===o?'on':''}" onclick="pickSeg(this,'${field}','${esc(o)}')">${esc(o)}</button>`).join('')}</div>`;

  return {
    title: editing?'調査を編集':'調査を作成',
    html:`
      <form id="svForm" oninput="draftSave()">
        <label class="field"><span class="lab">調査名 <span class="req">*</span></span>
          <input name="name" value="${esc(s.name)}" placeholder="例：〇〇川 河畔林 定点調査"></label>
        <div class="two">
          <label class="field"><span class="lab">調査日</span>
            <input type="date" name="survey_date" value="${esc(s.survey_date)}"></label>
          <label class="field"><span class="lab">気温(℃)</span>
            <input type="number" name="temperature" inputmode="decimal" value="${esc(s.temperature)}" placeholder="任意"></label>
        </div>
        <label class="field"><span class="lab">調査場所</span>
          <input name="location_name" value="${esc(s.location_name)}" placeholder="地名・地点名"></label>
        <label class="field"><span class="lab">調査方法</span>${seg('survey_method',OPT.method)}</label>
        <label class="field"><span class="lab">調査者名</span>
          <input name="investigator_name" value="${esc(s.investigator_name)}" placeholder="任意"></label>
        <div class="two">
          <label class="field"><span class="lab">天候</span>${seg('weather',OPT.weather)}</label>
          <label class="field"><span class="lab">風</span>${seg('wind',OPT.wind)}</label>
        </div>
        <label class="field"><span class="lab">調査目的</span>
          <textarea name="purpose" placeholder="何を確かめる調査か">${esc(s.purpose)}</textarea></label>
        <label class="field"><span class="lab">調査前の確認事項</span>
          <textarea name="pre_survey_notes" placeholder="現場で確認したいこと">${esc(s.pre_survey_notes)}</textarea></label>
        <label class="field"><span class="lab">調査前の仮説</span>
          <textarea name="pre_hypothesis" placeholder="予想していること">${esc(s.pre_hypothesis||'')}</textarea></label>
      </form>
      <button class="btn primary big" onclick="saveSurvey('${s.uuid}',${editing})">保存する</button>
      ${editing?`<div class="sp"></div><button class="btn danger" onclick="deleteSurvey('${s.uuid}')">この調査を削除</button>`:''}
      <div class="sp"></div>
      <div class="note">入力途中でも自動で下書き保存されます。開始・終了の時刻は「調査を開始／終了」で自動記録します。</div>
    `,
    onMount:()=>{ SCREENS._editUuid=s.uuid; SCREENS._editing=editing; }
  };
};
function pickSeg(btn,field,val){
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); btn.parentElement.dataset.value=val; draftSave();
}
function collectSurveyForm(){
  const f=$('#svForm'); const g=n=>{const el=f.querySelector(`[name="${n}"]`); return el?el.value:'';};
  const seg=field=>{ const on=f.querySelector(`[data-seg="${field}"] button.on`); return on?on.textContent:''; };
  return { name:g('name'), survey_date:g('survey_date'), temperature:g('temperature'),
    location_name:g('location_name'), survey_method:seg('survey_method'),
    investigator_name:g('investigator_name'), weather:seg('weather'), wind:seg('wind'),
    purpose:g('purpose'), pre_survey_notes:g('pre_survey_notes'), pre_hypothesis:g('pre_hypothesis') };
}
function draftSave(){ if(SCREENS._editing) return; // 新規のみ下書き
  const base={uuid:SCREENS._editUuid, status:'未開始'};
  localStorage.setItem(DRAFT_KEY, JSON.stringify(Object.assign(base, collectSurveyForm()))); }
function saveSurvey(u, editing){
  const data=collectSurveyForm();
  if(!data.name.trim()){ toast('調査名を入力してください'); return; }
  const cur = editing ? DB.survey(u) : {uuid:u, status:'未開始'};
  const rec = Object.assign({}, cur, data);
  DB.upsertSurvey(rec);
  if(!editing) localStorage.removeItem(DRAFT_KEY);
  toast('保存しました');
  reset('home'); nav('survey', u);
}
// 調査を関連データごとソフト削除（ごみ箱から戻せる）
function softDeleteSurveyCascade(u){
  DB.softDelete(DB.key.sv,u);
  DB.obsOf(u).forEach(o=>DB.softDelete(DB.key.ob,o.uuid));
  DB.notesOf(u).forEach(n=>DB.softDelete(DB.key.nt,n.uuid));
  DB.hypOf(u).forEach(h=>DB.softDelete(DB.key.hy,h.uuid));
}
function deleteSurvey(u){
  if(!confirm('この調査と、ひも付く観察記録を削除します。よろしいですか？（あとで「ごみ箱」から戻せます）')) return;
  softDeleteSurveyCascade(u);
  toast('削除しました'); reset('home');
}

  const sel=SCREENS._sel; if(!sel) return;
  if(sel.set.has(uuid)){ sel.set.delete(uuid); card.classList.remove('selected'); }
  else { sel.set.add(uuid); card.classList.add('selected'); }
  const cb=card.querySelector('.selcb'); if(cb) cb.textContent=sel.set.has(uuid)?'☑':'☐';
  const btn=$('#selDelBtn'); const n=sel.set.size;
  if(btn){ btn.textContent=`選択した${n}件を削除`; btn.disabled=n===0; }
}
function deleteSelected(){
  const sel=SCREENS._sel; if(!sel||!sel.set.size) return;
  const n=sel.set.size;
  if(!confirm(`選択した${n}件を削除しますか？（あとで「ごみ箱」から戻せます）`)) return;
  if(sel.scope==='home') sel.set.forEach(u=>softDeleteSurveyCascade(u));
  else sel.set.forEach(u=>DB.softDelete(DB.key.ob,u));
  toast(`${n}件を削除しました`); SCREENS._sel=null; render();
}

/* ============================================================
   調査 詳細 / 調査中
   ============================================================ */
SCREENS.survey = (u)=>{
  const s = DB.survey(u); if(!s) return SCREENS.home();
  currentSurveyUuid = u;
  const obs = DB.obsOf(u);
  const spCount = new Set(obs.filter(o=>o.species_name_snapshot).map(o=>o.species_name_snapshot)).size;
  const review = obs.filter(o=>o.needs_review).length;
  const running = s.status==='調査中';

  let elapsed='—';
  if(s.start_datetime){ const ms=(s.end_datetime?new Date(s.end_datetime):new Date())-new Date(s.start_datetime);
    if(ms>=0){ const m=Math.floor(ms/60000); elapsed=`${Math.floor(m/60)}時間${m%60}分`; } }

  const sub=[
    `<span class="pill">${esc(s.status||'未開始')}</span>`,
    running?`<span class="pill" id="pGps">GPS —</span>`:'',
    `<span class="pill">経過 ${elapsed}</span>`,
    `<span class="pill">観察 ${obs.length}</span>`,
    review?`<span class="pill warn">要確認 ${review}</span>`:'',
  ].filter(Boolean);

  const startBtn = s.status==='未開始'
    ? `<button class="btn primary big" onclick="startSurvey('${u}')">▶ 調査を開始</button>`
    : '';
  const actions = running ? `
    <div class="actions">
      <div class="act primary wide" onclick="nav('obsEdit', JSON.stringify({sv:'${u}'}))"><span class="ic">🐦</span>観察を追加</div>
      <div class="act wide" onclick="nav('obsBatch','${u}')"><span class="ic">🐦🐦</span>まとめて記録（複数種）</div>
      <div class="act" onclick="nav('noteEdit', JSON.stringify({sv:'${u}'}))"><span class="ic">📝</span>メモを追加</div>
      <div class="act" onclick="nav('hypotheses','${u}')"><span class="ic">💡</span>仮説を見る</div>
      <div class="act" onclick="nav('map','${u}')"><span class="ic">🗺</span>地図を見る</div>
      <div class="act" onclick="nav('summary','${u}')"><span class="ic">📊</span>集計を見る</div>
      <div class="act" onclick="nav('surveyEnd','${u}')"><span class="ic">⏹</span>調査を終了</div>
    </div>` : '';

  const selMode = !!(SCREENS._sel && SCREENS._sel.scope==='obs' && SCREENS._sel.sv===u);
  const recent = obs.slice().sort((a,b)=>(b.observed_at||'').localeCompare(a.observed_at||'')).slice(0,50);
  const obsInner = o=>`
    <div class="grow">
      <div style="font-weight:700;">${esc(o.species_name_snapshot||'（未同定）')}
        ${o.needs_review?'<span class="badge warn">要確認</span>':''}
        ${o.identification_status&&o.identification_status!=='確定'?`<span class="badge">${esc(o.identification_status)}</span>`:''}
      </div>
      <div class="small muted">${fmtTime(o.observed_at)} ・ ${esc(o.count||1)}個体 ・ ${esc(o.detection_method||'')}${o.habitat?' ・ '+esc(o.habitat):''}</div>
    </div>
    <span class="tiny muted">${(o.audio&&o.audio.length)?'🎤':''}${(o.media&&o.media.length)?'📷':''}${o.latitude?'📍':''}</span>`;
  const obsCard = o=> selMode
    ? `<div class="card tap selcard ${SCREENS._sel.set.has(o.uuid)?'selected':''}" onclick="toggleSel('${o.uuid}',this)">
        <div class="row"><span class="selcb">${SCREENS._sel.set.has(o.uuid)?'☑':'☐'}</span>${obsInner(o)}</div></div>`
    : `<div class="card tap" onclick="nav('obsEdit', JSON.stringify({sv:'${u}',id:'${o.uuid}'}))">
        <div class="row">${obsInner(o)}</div></div>`;
  const obsList = recent.length ? recent.map(obsCard).join('')
    : '<div class="empty small">まだ観察記録がありません。</div>';
  const obsHeader = `<div class="row" style="align-items:center;">
      <h3 class="grow" style="margin:0;">観察記録 <span class="muted small">(${obs.length})</span></h3>
      ${obs.length? (selMode
        ? `<button class="btn ghost" style="width:auto; padding:6px 12px;" onclick="endSelect()">キャンセル</button>`
        : `<button class="btn ghost" style="width:auto; padding:6px 12px;" onclick="startSelect('obs','${u}')">☑ 選択して削除</button>`):''}
    </div>`;
  const selBar = selMode
    ? `<div class="sp"></div><button class="btn danger big" id="selDelBtn" ${SCREENS._sel.set.size?'':'disabled'} onclick="deleteSelected()">選択した${SCREENS._sel.set.size}件を削除</button>`
    : '';

  const notes = DB.notesOf(u);

  return {
    title: s.name||'調査', sub,
    html:`
      ${startBtn}
      ${actions}
      ${!running?`<div class="sp"></div><div class="btn-grid">
        <button class="btn" onclick="nav('map','${u}')">🗺 地図</button>
        <button class="btn" onclick="nav('summary','${u}')">📊 集計</button>
        <button class="btn" onclick="nav('hypotheses','${u}')">💡 仮説・検証</button>
        <button class="btn" onclick="nav('obsEdit', JSON.stringify({sv:'${u}'}))">🐦 観察を追加</button>
        <button class="btn" onclick="nav('obsBatch','${u}')">🐦🐦 まとめて記録</button>
        <button class="btn" onclick="nav('surveyEdit','${u}')">✎ 調査情報を編集</button>
        <button class="btn" onclick="nav('surveyEnd','${u}')">⏹ 終了・振り返り</button>
      </div>`:''}
      <div class="divider"></div>
      ${obsHeader}
      ${obsList}
      ${selBar}
      ${notes.length?`<div class="divider"></div><h3>調査メモ <span class="muted small">(${notes.length})</span></h3>
        ${notes.map(n=>`<div class="card tap" onclick="nav('noteEdit', JSON.stringify({sv:'${u}',id:'${n.uuid}'}))">
          <div class="small"><span class="badge">${esc(n.category||'')}</span> ${fmtTime(n.recorded_at)}</div>
          <div>${esc((n.content||'').slice(0,120))}</div></div>`).join('')}`:''}
    `,
    onMount:()=>{ if(running) startGpsIndicator(); }
  };
};
function startSurvey(u){ const s=DB.survey(u); if(!s) return;
  s.status='調査中'; if(!s.start_datetime) s.start_datetime=nowISO(); DB.upsertSurvey(s);
  toast('調査を開始しました'); render(); }

/* GPS状態インジケータ（ヘッダの pill を更新） */
let gpsWatchId=null, lastFix=null;
function startGpsIndicator(){
  stopGps();
  if(!navigator.geolocation) return;
  gpsWatchId=navigator.geolocation.watchPosition(p=>{
    lastFix={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy, t:Date.now()};
    const el=$('#pGps'); if(el){ el.textContent=`GPS ±${Math.round(p.coords.accuracy)}m`; el.className='pill ok'; }
  }, e=>{ const el=$('#pGps'); if(el){ el.textContent='GPS 取得不可'; el.className='pill off'; } },
  {enableHighAccuracy:true, maximumAge:5000, timeout:15000});
}
function stopGps(){ if(gpsWatchId!=null && navigator.geolocation){ navigator.geolocation.clearWatch(gpsWatchId); } gpsWatchId=null; }

/* ============================================================
   観察記録 追加/編集
   ============================================================ */

        <label class="field"><span class="lab">行動</span>${seg('behavior',OPT.behavior,true)}</label>
        <label class="field"><span class="lab">生息環境</span>${seg('habitat',OPT.habitat,true)}</label>
        <label class="field"><span class="lab">同定状態</span>${seg('identification_status',OPT.idStatus)}</label>
        <label class="field"><span class="lab">信頼度</span>${seg('confidence',OPT.confidence)}</label>
        <label class="field"><span class="lab">観察メモ</span>
          <textarea name="note" placeholder="行動・環境・気づいたこと">${esc(o.note)}</textarea></label>
        <div class="field"><span class="lab">録音メモ（鳴き声など）</span>
          <div id="recPanel"></div></div>

            <button type="button" class="btn ghost" style="width:auto; padding:6px 12px;" onclick="grabGps()">📍 現在地</button></div>
          <div class="two" style="margin-top:8px;">

      </form>
      <div class="sp"></div>

      <div class="sp"></div>
      <div class="note">種名が未入力なら「未同定」として保存されます。同じ場所で何種も見たときは「保存して続けて別の種を追加」で位置を引き継いで連続入力できます。</div>

function pickObs(btn,field,val){ btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); }
function segVal(field){ const on=document.querySelector(`[data-seg="${field}"] button.on`); return on? (on.textContent==='なし'?'':on.textContent):''; }

/* 種名検索（ひらがな・カタカナどちらの入力でもヒット） */
function toKata(s){ return String(s||'').replace(/[ぁ-ゖ]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60)); }
function spSearch(q){
  const box=$('#spSuggest'); q=(q||'').trim();
  updateSpRefLinks(q);
  if(!q){ box.innerHTML=''; return; }
  const qk=toKata(q);
  const pre = SPECIES.filter(s=>toKata(s.japanese_name).startsWith(qk));
  const part = SPECIES.filter(s=>!toKata(s.japanese_name).startsWith(qk) && toKata(s.japanese_name).includes(qk));
  const list=[...pre,...part].slice(0,12);
  box.innerHTML = list.length ? `<div class="suggest">${list.map(s=>
    `<div class="item" onclick="chooseSpecies(${s.species_id},'${esc(s.japanese_name)}')">${esc(s.japanese_name)}</div>`).join('')}
    <div class="item" style="color:var(--muted)" onclick="chooseSpecies('','')">「${esc(q)}」は候補になし → 未同定で保存</div></div>`
    : `<div class="suggest"><div class="item" style="color:var(--muted)" onclick="chooseSpecies('','')">候補なし → 未同定で保存</div></div>`;
}
function chooseSpecies(id,name){ $('#spInput').value=name; $('#spSuggest').innerHTML=''; updateSpRefLinks(name);
  if(!name){ document.querySelectorAll('[data-seg="identification_status"] button').forEach(b=>{
    b.classList.toggle('on', b.textContent==='未同定'); }); } SCREENS._chosenId=id; }
function renderQuickSpecies(){
  const box=$('#spQuick'); const recent=DB.recentSpecies();
  const inSurvey=[...new Set(DB.obsOf(currentSurveyUuid).map(o=>o.species_name_snapshot).filter(Boolean))];
  const set=[...new Set([...inSurvey.slice(0,6),...recent])].slice(0,10);
  box.innerHTML = set.map(n=>`<span class="c" onclick="chooseSpecies('','${esc(n)}');$('#spInput').value='${esc(n)}'">${esc(n)}</span>`).join('');
}
function grabGps(){
  if(!navigator.geolocation){ toast('位置情報を利用できません'); return; }
  toast('位置を取得中…');
  navigator.geolocation.getCurrentPosition(p=>{
    $('#latIn').value=p.coords.latitude.toFixed(6); $('#lonIn').value=p.coords.longitude.toFixed(6);
    $('#posLabel').textContent=`${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)} (±${Math.round(p.coords.accuracy)}m)`;
    SCREENS._acc=Math.round(p.coords.accuracy); lastFix={lat:p.coords.latitude,lon:p.coords.longitude,acc:p.coords.accuracy,t:Date.now()};
    toast('位置を取得しました');
  }, e=>toast('位置を取得できませんでした'), {enableHighAccuracy:true, timeout:15000});
}
function saveObs(u, svUuid, editing, cont){
  const f=$('#obForm'); const g=n=>{const el=f.querySelector(`[name="${n}"]`); return el?el.value:'';};
  const name=$('#spInput').value.trim();
  const idStatus = segVal('identification_status') || (name?'確定':'未同定');
  const rec = Object.assign({}, editing?DB.observations().find(x=>x.uuid===u):{uuid:u}, {
    uuid:u, survey_uuid:svUuid,
    observed_at: g('observed_at')? new Date(g('observed_at')).toISOString() : nowISO(),
    latitude: $('#latIn').value.trim(), longitude: $('#lonIn').value.trim(),
    gps_accuracy: SCREENS._acc || (DB.observations().find(x=>x.uuid===u)||{}).gps_accuracy || '',
    species_id: SCREENS._chosenId||'', species_name_snapshot: name,
    count: parseInt(g('count'),10)||0, detection_method: segVal('detection_method'),
    behavior: segVal('behavior'), habitat: segVal('habitat'),
    identification_status: name? idStatus : '未同定',
    confidence: segVal('confidence'), needs_review: $('#needsReview').checked,
    note: g('note'), external_photo_reference: g('external_photo_reference'),
    audio: SCREENS._audio||[], media: SCREENS._media||[],
  });
  DB.upsertObs(rec); if(name) DB.pushRecent(name);
  SCREENS._acc=null; SCREENS._chosenId=null; SCREENS._audio=null; SCREENS._media=null;
  toast('保存しました');
  if(cont){ goBack(); nav('obsEdit', JSON.stringify({sv:svUuid})); } // 位置を引き継いで次の種へ
  else goBack();
}
/* ---------- マイ図鑑（自分の確定記録を種の図鑑に登録） ---------- */
function myguideList(){ try{ return JSON.parse(localStorage.getItem('bs_myguide')||'[]'); }catch(e){ return []; } }
function myguideSave(l){ localStorage.setItem('bs_myguide', JSON.stringify(l)); }
function myguideOf(sp){ return myguideList().filter(g=>g.species_name===sp); }
function myguideSpecies(){ return [...new Set(myguideList().map(g=>g.species_name))]; }
// 観察編集画面から、確定種の鳴き声・写真を図鑑に登録
function addObsToGuide(){
  const o=SCREENS._obs; if(!o) return;
  const name=(($('#spInput')&&$('#spInput').value)||'').trim();
  if(!name){ toast('先に種名を入れてください'); return; }
  const status=segVal('identification_status');
  if(status!=='確定'){ if(!confirm('この記録は「確定」ではありません。それでも図鑑に登録しますか？')) return; }
  const audio=SCREENS._audio||[], media=SCREENS._media||[];
  if(!audio.length && !media.length){ toast('登録できる録音・写真がありません'); return; }
  const l=myguideList(); const have=new Set(l.filter(g=>g.species_name===name).map(g=>g.ref_id)); let added=0;
  audio.forEach(a=>{ if(have.has(a.id)) return; l.push({ id:uuid(), species_name:name, kind:'audio', ref_id:a.id, ext:a.ext, mime:a.mime, source_obs:o.uuid, created_at:nowISO() }); added++; });
  media.forEach(m=>{ if(have.has(m.id)) return; l.push({ id:uuid(), species_name:name, kind:m.kind, ref_id:m.id, ext:m.ext, mime:m.mime, source_obs:o.uuid, created_at:nowISO() }); added++; });
  myguideSave(l);
  toast(added?`図鑑に${added}件登録しました（${name}）`:'すでに登録済みです');
}
function removeFromGuide(id){
  myguideSave(myguideList().filter(g=>g.id!==id));
  toast('図鑑から外しました'); render(); mediaGcAll();
}

/* ---------- 録音 ---------- */
let REC = null; // 録音中コンテキスト { mr, stream, t0, chunks, timer, abort }
function recSupported(){ return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder); }
function pickRecMime(){
  const c=['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/aac','audio/ogg'];
  for(const m of c){ try{ if(MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)) return m; }catch(e){} }
  return '';
}
function mimeExt(m){ m=m||''; if(m.includes('webm'))return 'webm'; if(m.includes('mp4'))return 'm4a';
  if(m.includes('aac'))return 'aac'; if(m.includes('ogg'))return 'ogg'; return 'bin'; }
function fmtDur(s){ s=Math.max(0,Math.round(+s||0)); const m=Math.floor(s/60); return `${m}:${String(s%60).padStart(2,'0')}`; }

async function recToggle(){
  if(REC){ recStop(); return; }
  if(!recSupported()){ toast('この端末では録音を利用できません（httpsで開いてください）'); return; }
  let stream;
  try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ toast('マイクを使えません（許可を確認してください）'); return; }
  const mime=pickRecMime();
  let mr;
  try{ mr=new MediaRecorder(stream, mime?{mimeType:mime}:undefined); }
  catch(e){ stream.getTracks().forEach(t=>t.stop()); toast('録音を開始できませんでした'); return; }
  const ctx={ mr, stream, t0:Date.now(), chunks:[], timer:null, abort:false };
  mr.ondataavailable=e=>{ if(e.data && e.data.size) ctx.chunks.push(e.data); };
  mr.onstop=()=>{ clearInterval(ctx.timer); stream.getTracks().forEach(t=>t.stop());
    const wasAbort=ctx.abort; REC=null; renderRecPanel();
    if(!wasAbort) recFinalize(ctx.chunks, mr.mimeType||mime, ctx.t0); };
  REC=ctx; mr.start(); ctx.timer=setInterval(updateRecTimer,250); renderRecPanel();
}
function recStop(){ if(REC){ clearInterval(REC.timer); try{ REC.mr.stop(); }catch(e){} } }
function recAbort(){ if(REC){ REC.abort=true; clearInterval(REC.timer); try{ REC.mr.stop(); }catch(e){} } }
function updateRecTimer(){ const el=$('#recTime'); if(el && REC) el.textContent=fmtDur((Date.now()-REC.t0)/1000); }

function recFinalize(chunks, mime, t0){
  const dur=Math.round((Date.now()-t0)/1000);
  const blob=new Blob(chunks,{type:mime}); if(!blob.size){ toast('録音が空でした'); return; }
  const meta={ id:uuid(), dur, size:blob.size, mime, ext:mimeExt(mime), created_at:nowISO() };
  const obsUuid=(SCREENS._obs&&SCREENS._obs.uuid)||'';
  AudioDB.put(Object.assign({}, meta, { blob, obs_uuid:obsUuid })).then(()=>{
    SCREENS._audio=SCREENS._audio||[]; SCREENS._audio.push(meta);
    persistAudioIfSaved(); renderRecPanel(); toast('録音を保存しました');
  }).catch(()=>toast('録音の保存に失敗しました'));
}
function delAudio(id){
  AudioDB.del(id).catch(()=>{}).then(()=>{
    SCREENS._audio=(SCREENS._audio||[]).filter(a=>a.id!==id);
    persistAudioIfSaved(); renderRecPanel(); toast('録音を削除しました');
  });
}
// 編集中の観察がすでに保存済みなら、録音の追加・削除を即座に反映（保存待ちの不整合を防ぐ）
function persistAudioIfSaved(){
  const o=SCREENS._obs; if(!o) return;
  const rec=DB.load(DB.key.ob).find(x=>x.uuid===o.uuid);
  if(rec){ rec.audio=SCREENS._audio||[]; DB.upsertObs(rec); }
}
function renderRecPanel(){
  const box=$('#recPanel'); if(!box) return;
  if(!recSupported()){ box.innerHTML='<div class="note">この端末・接続では録音を利用できません（httpsまたはホーム画面から起動すると使えます）。</div>'; return; }
  const list=SCREENS._audio||[]; const active=!!REC;
  box.innerHTML=`
    <button type="button" class="btn ${active?'danger':''}" onclick="recToggle()">
      ${active?'<span class="recdot"></span>録音を停止 <span id="recTime">0:00</span>':'🎤 録音する'}</button>
    ${list.length?`<div class="reclist">${list.map((a,i)=>`
      <div class="recitem" data-id="${a.id}">
        <div class="row"><span class="small muted grow">録音${i+1} ・ ${fmtDur(a.dur)} ・ ${Math.max(1,Math.round(a.size/1024))}KB</span>
          <button type="button" class="btn danger" style="width:auto; padding:6px 12px;" onclick="delAudio('${a.id}')">削除</button></div>
        <audio controls preload="none" class="recaudio"></audio>
      </div>`).join('')}</div>`:''}`;
  // 各プレーヤーにIndexedDBの音声を割り当て
  list.forEach(a=>{ AudioDB.get(a.id).then(r=>{ if(!r||!r.blob) return;
    const el=box.querySelector(`.recitem[data-id="${a.id}"] audio`); if(!el) return;
    if(el._url) URL.revokeObjectURL(el._url);
    el._url=URL.createObjectURL(r.blob); el.src=el._url;
  }).catch(()=>{}); });
}

/* ---------- 写真・動画（カメラ／ライブラリ） ---------- */
function fileExt(name, mime){
  const m=String(name||'').match(/\.([a-z0-9]{1,5})$/i); if(m) return m[1].toLowerCase();
  mime=mime||''; const map={'image/jpeg':'jpg','image/png':'png','image/webp':'webp','image/heic':'heic',
    'image/heif':'heif','image/gif':'gif','video/mp4':'mp4','video/quicktime':'mov','video/webm':'webm','video/3gpp':'3gp'};
  return map[mime] || (mime.startsWith('video')?'mp4':'jpg');
}
function pickMedia(input){
  const files=Array.from(input.files||[]); input.value='';
  if(!files.length) return;
  const obsUuid=(SCREENS._obs&&SCREENS._obs.uuid)||'';
  const jobs=files.map(f=>{
    const kind=(f.type||'').startsWith('video')?'video':'photo';
    const meta={ id:uuid(), kind, mime:f.type||'', ext:fileExt(f.name,f.type), size:f.size, name:f.name||'', created_at:nowISO() };
    return PhotoDB.put(Object.assign({}, meta, { blob:f, obs_uuid:obsUuid })).then(()=>{
      SCREENS._media=SCREENS._media||[]; SCREENS._media.push(meta);
    });
  });
  toast('取り込み中…');
  Promise.all(jobs).then(()=>{ persistMediaIfSaved(); renderMediaPanel(); toast('写真・動画を追加しました'); })
    .catch(()=>toast('取り込みに失敗しました'));
}
function delMedia(id){
  PhotoDB.del(id).catch(()=>{}).then(()=>{
    SCREENS._media=(SCREENS._media||[]).filter(m=>m.id!==id);
    persistMediaIfSaved(); renderMediaPanel(); toast('削除しました');
  });
}
function persistMediaIfSaved(){
  const o=SCREENS._obs; if(!o) return;
  const rec=DB.load(DB.key.ob).find(x=>x.uuid===o.uuid);
  if(rec){ rec.media=SCREENS._media||[]; DB.upsertObs(rec); }
}
function renderMediaPanel(){
  const box=$('#mediaPanel'); if(!box) return;
  const list=SCREENS._media||[];
  // ラベル直結＋capture属性で、端末のカメラを確実に起動（撮影と選択を分離）
  const HID='position:absolute; width:1px; height:1px; opacity:0; overflow:hidden;';
  box.innerHTML=`
    <input type="file" id="mediaCamPhoto" accept="image/*" capture="environment" style="${HID}" onchange="pickMedia(this)">
    <input type="file" id="mediaCamVideo" accept="video/*" capture="environment" style="${HID}" onchange="pickMedia(this)">
    <input type="file" id="mediaLib" accept="image/*,video/*" multiple style="${HID}" onchange="pickMedia(this)">
    <div class="btn-grid">
      <label class="btn" for="mediaCamPhoto">📷 写真を撮る</label>
      <label class="btn" for="mediaCamVideo">🎬 動画を撮る</label>
    </div>
    <div class="sp"></div>
    <label class="btn" for="mediaLib">🖼 ライブラリから選ぶ</label>
    ${list.length?`<div class="mediagrid">${list.map(m=>`
      <div class="mediaitem" data-id="${m.id}">
        <div class="mediathumb">${m.kind==='video'
          ? '<video class="mediael" controls preload="metadata"></video>'
          : '<img class="mediael" alt="写真">'}</div>
        <button type="button" class="mediadel" onclick="delMedia('${m.id}')">×</button>
        <div class="tiny muted mediacap">${m.kind==='video'?'🎬 動画':'📷 写真'} ・ ${Math.max(1,Math.round(m.size/1024))}KB</div>
      </div>`).join('')}</div>`:''}`;
  list.forEach(m=>{ PhotoDB.get(m.id).then(r=>{ if(!r||!r.blob) return;
    const el=box.querySelector(`.mediaitem[data-id="${m.id}"] .mediael`); if(!el) return;
    if(el._url) URL.revokeObjectURL(el._url); el._url=URL.createObjectURL(r.blob); el.src=el._url;

};

        <label class="field"><span class="lab">判定理由 <span class="req">*判定するなら必須</span></span>
          <textarea name="judgment_reason" placeholder="なぜその判定か">${esc(r.judgment_reason)}</textarea></label>
        <label class="field"><span class="lab">根拠となる観察記録（タップで選択）</span>${obsPick}</label>
        <label class="field"><span class="lab">不足している情報</span>
          <textarea name="missing_information">${esc(r.missing_information)}</textarea></label>
        <label class="field"><span class="lab">別の可能性</span>
          <textarea name="alternative_explanation">${esc(r.alternative_explanation)}</textarea></label>
        <label class="field"><span class="lab">次回の確認事項</span>
          <textarea name="next_action">${esc(r.next_action)}</textarea></label>
        <label class="field"><span class="lab">次回の調査方法</span>
          <textarea name="next_method">${esc(r.next_method)}</textarea></label>
        <label class="field"><span class="lab">補足メモ</span>
          <textarea name="note">${esc(r.note)}</textarea></label>

      <div class="sp"></div>
      <div class="note">判定だけでは保存できません（判定を選ぶなら理由も入力）。途中まででも、判定を空にすれば下書きとして保存できます。</div>
    `
  };
};
function saveHypResult(u,hyUuid,editing){
  const f=$('#hrForm'); const g=n=>{const el=f.querySelector(`[name="${n}"]`); return el?el.value:'';};
  const judgment=segVal('judgment');
  if(judgment && !g('judgment_reason').trim()){ toast('判定するときは判定理由を入力してください'); return; }
  const obsIds=[...document.querySelectorAll('#hrForm .chips .c.on')].map(el=>el.dataset.obs).filter(Boolean);
  const prev=editing?DB.resultsOf(hyUuid).find(x=>x.uuid===u):{uuid:u};
  const rec=Object.assign({},prev,{ uuid:u, hypothesis_uuid:hyUuid,
    verified_at:g('verified_at'), observed_result:g('observed_result'), judgment,
    judgment_reason:g('judgment_reason'), missing_information:g('missing_information'),
    alternative_explanation:g('alternative_explanation'), next_action:g('next_action'),
    next_method:g('next_method'), note:g('note'), observation_uuids:obsIds });
  DB.upsertHypResult(rec);
  // 判定が付いたら仮説ステータスを検証済みへ更新（未検証のときのみ）
  const h=DB.hypothesis(hyUuid);
  if(judgment && h && (h.status==='未検証'||h.status==='検証中')){ h.status='検証済み'; DB.upsertHyp(h); }
  toast('保存しました'); goBack();
}
function deleteHypResult(u){ if(!confirm('この検証結果を削除しますか？')) return; DB.softDelete(DB.key.hr,u); toast('削除しました'); goBack(); }

function finishSurvey(u){

SCREENS.summary = (u)=>{
  const s=DB.survey(u); const obs=DB.obsOf(u);
  const map={};
  obs.forEach(o=>{ const key=o.species_name_snapshot||'（未同定）';
    const m=map[key]||(map[key]={name:key, total:0, count:0, first:null, last:null, methods:new Set(), review:0, undet:0});
    m.total+=parseInt(o.count,10)||0; m.count++;
    if(o.detection_method) m.methods.add(o.detection_method);
    if(o.needs_review) m.review++;
    if(o.identification_status==='未同定'||!o.species_name_snapshot) m.undet++;
    const t=o.observed_at; if(t){ if(!m.first||t<m.first) m.first=t; if(!m.last||t>m.last) m.last=t; }
  });
  const rows=Object.values(map).sort((a,b)=>b.total-a.total);
  const totalInd=rows.reduce((a,r)=>a+r.total,0);
  return {
    title:'種別集計',
    sub:[`<span class="pill">確認種数 ${rows.filter(r=>r.name!=='（未同定）').length}</span>`,`<span class="pill">延べ ${totalInd}個体</span>`],
    html:`
      ${rows.length? `<div class="tablewrap"><table>
        <thead><tr><th>種名</th><th class="num">個体</th><th class="num">回数</th><th>初認</th><th>終認</th><th>確認</th></tr></thead>
        <tbody>${rows.map(r=>`<tr>
          <td>${esc(r.name)}${r.review?` <span class="badge warn tiny">要${r.review}</span>`:''}</td>
          <td class="num">${r.total}</td><td class="num">${r.count}</td>
          <td>${fmtTime(r.first)}</td><td>${fmtTime(r.last)}</td>
          <td class="tiny muted">${[...r.methods].join('/')}</td></tr>`).join('')}</tbody>
      </table></div>` : '<div class="empty">観察記録がありません。</div>'}
      <div class="sp"></div>
      <div class="note">合計個体数は延べ数です。同一個体の重複記録を含むため、生息個体数とは限りません。</div>

SCREENS.map = (u)=>{
  const obs=DB.obsOf(u).filter(o=>o.latitude&&o.longitude);
  const notes=DB.notesOf(u).filter(n=>n.latitude&&n.longitude);
  return {
    title:'地図',
    sub:[`<span class="pill">観察地点 ${obs.length}</span>`],
    html:`<div id="map"></div>
      <div class="sp"></div>
      <div class="note">丸＝観察地点 / ?＝未同定 / △＝要確認 / ノート＝メモ。青丸＝現在地（開くと自動で表示範囲に含めます）。右上の📍で現在地へ移動。</div>`,
    onMount:()=>{ setTimeout(()=>drawMap(obs,notes),50); }
  };
};
function drawMap(obs,notes){
  const el=$('#map'); if(!el) return;
  let center=[35.68,139.77], zoom=13;
  const pts=obs.filter(o=>!isNaN(parseFloat(o.latitude)));
  if(pts.length){ center=[parseFloat(pts[0].latitude), parseFloat(pts[0].longitude)]; zoom=15; }
  else if(lastFix){ center=[lastFix.lat,lastFix.lon]; zoom=15; }
  mapObj=L.map('map').setView(center,zoom);
  L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',
    {maxZoom:18, attribution:'地理院タイル'}).addTo(mapObj);
  const mk=(lat,lon,html,color)=>L.marker([lat,lon],{icon:L.divIcon({className:'',
    html:`<div style="background:${color};border:2px solid #fff;border-radius:50%;width:22px;height:22px;
      display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700;
      box-shadow:0 1px 4px rgba(0,0,0,.5)">${html}</div>`, iconSize:[22,22], iconAnchor:[11,11]})});
  const group=[];
  pts.forEach(o=>{ const lat=parseFloat(o.latitude), lon=parseFloat(o.longitude);
    let sym='●', col='#3fb984';
    if(o.needs_review){ sym='▲'; col='#e0a030'; }
    else if(o.identification_status==='未同定'||!o.species_name_snapshot){ sym='?'; col='#8a9a93'; }
    const m=mk(lat,lon,sym,col).addTo(mapObj);
    m.bindPopup(`<b>${esc(o.species_name_snapshot||'（未同定）')}</b><br>${esc(o.count||1)}個体 ・ ${esc(o.detection_method||'')}<br>${fmtTime(o.observed_at)}`);
    group.push([lat,lon]);
  });
  notes.forEach(n=>{ const lat=parseFloat(n.latitude), lon=parseFloat(n.longitude);
    const m=mk(lat,lon,'✎','#5a7de0').addTo(mapObj);
    m.bindPopup(`<b>メモ:${esc(n.category||'')}</b><br>${esc((n.content||'').slice(0,80))}`); group.push([lat,lon]); });
  mapCurMarker=null; mapCurCircle=null;
  if(lastFix){ addCurrentPos(lastFix.lat,lastFix.lon,lastFix.acc); }
  if(group.length>1){ try{ mapObj.fitBounds(group,{padding:[40,40]}); }catch(e){} }
  else if(group.length===1 && !lastFix){ mapObj.setView(group[0],15); }
  // コンテナ確定後にサイズを再計算（初期表示のタイル欠け・灰色化を防ぐ）
  setTimeout(()=>{ if(mapObj) mapObj.invalidateSize(); }, 200);
  addLocateControl();   // 右上に「現在地へ」ボタンを設置
  locateOnMap(group);   // 現在地を取得し、自動で表示範囲に含める
}
// 地図上の現在地マーカー（青丸）と精度円を更新
function addCurrentPos(lat,lon,acc){
  if(!mapObj) return;
  if(mapCurMarker){ try{ mapObj.removeLayer(mapCurMarker); }catch(e){} }
  if(mapCurCircle){ try{ mapObj.removeLayer(mapCurCircle); }catch(e){} }
  if(acc && acc>0 && acc<3000){
    mapCurCircle=L.circle([lat,lon],{radius:acc,color:'#3f7de0',fillColor:'#3f7de0',fillOpacity:.08,weight:1}).addTo(mapObj);
  }
  mapCurMarker=L.circleMarker([lat,lon],{radius:7,color:'#fff',weight:2,fillColor:'#3f7de0',fillOpacity:1}).addTo(mapObj).bindPopup('現在地');
}
// 現在地を取得して表示範囲を自動調整（観察地点があれば両方が収まるように）
function locateOnMap(group){
  if(!navigator.geolocation) return;
  toast('現在地を取得中…');
  navigator.geolocation.getCurrentPosition(p=>{
    const lat=p.coords.latitude, lon=p.coords.longitude, acc=p.coords.accuracy;
    lastFix={lat,lon,acc,t:Date.now()};
    if(!mapObj) return;
    addCurrentPos(lat,lon,acc);
    const all=(group||[]).concat([[lat,lon]]);
    if(all.length>1){ try{ mapObj.fitBounds(all,{padding:[40,40], maxZoom:17}); }catch(e){} }
    else { mapObj.setView([lat,lon],16); }
  }, e=>{ /* 取得失敗時は既存の表示のまま */ }, {enableHighAccuracy:true, timeout:15000, maximumAge:10000});
}
// 右上の「現在地へ」ボタン（自分中心に寄せ直す）
function addLocateControl(){
  if(!mapObj || !navigator.geolocation) return;
  const Ctl=L.Control.extend({ options:{position:'topright'},
    onAdd:function(){
      const b=L.DomUtil.create('button','locate-btn'); b.type='button'; b.innerHTML='📍'; b.title='現在地へ';
      L.DomEvent.disableClickPropagation(b); L.DomEvent.on(b,'click',L.DomEvent.stop);
      b.onclick=()=>{ toast('現在地を取得中…');
        navigator.geolocation.getCurrentPosition(p=>{
          const lat=p.coords.latitude, lon=p.coords.longitude, acc=p.coords.accuracy;
          lastFix={lat,lon,acc,t:Date.now()}; addCurrentPos(lat,lon,acc); if(mapObj) mapObj.setView([lat,lon],16);
        }, ()=>toast('現在地を取得できませんでした'), {enableHighAccuracy:true, timeout:15000}); };
      return b;
    } });
  mapObj.addControl(new Ctl());
}

/* ============================================================
   検索（全調査を横断）
   ============================================================ */
SCREENS.search = ()=>({
  title:'検索',
  html:`
    <label class="field"><span class="lab">記録を横断して探す（種名・メモ・場所・行動など）</span>
      <input id="searchBox" autocomplete="off" placeholder="例）カワセミ ／ 採餌 ／ 川の名前" oninput="runSearch(this.value)"></label>
    <div id="searchResults"></div>`,
  onMount:()=>{ const b=$('#searchBox'); if(b) b.value=SCREENS._searchQ||''; runSearch(SCREENS._searchQ||''); if(b) b.focus(); }
});
function runSearch(q){
  SCREENS._searchQ=q; const box=$('#searchResults'); if(!box) return;
  q=(q||'').trim();
  if(!q){ box.innerHTML='<div class="empty small">種名・メモ・場所などを入力すると、すべての調査から探します。</div>'; return; }
  const qk=toKata(q.toLowerCase());
  const hit=txt=>toKata(String(txt||'').toLowerCase()).includes(qk);
  const svMap={}; DB.surveys().forEach(s=>svMap[s.uuid]=s); // 削除されていない調査のみ
  const results=[];
  DB.observations().forEach(o=>{ const s=svMap[o.survey_uuid]; if(!s) return;
    if([o.species_name_snapshot,o.note,o.behavior,o.habitat,o.detection_method,o.identification_status,s.name,s.location_name].some(hit)){
      results.push({ kind:'obs', s, o, t:o.observed_at||'',
        title:o.species_name_snapshot||'（未同定）',
        sub:`${esc(s.name||'')} ・ ${fmtDate(o.observed_at)} ・ ${esc(o.detection_method||'')}${o.behavior?' ・ '+esc(o.behavior):''}`,
        snippet:o.note||'', marks:`${(o.audio&&o.audio.length)?'🎤':''}${(o.media&&o.media.length)?'📷':''}${o.latitude?'📍':''}` });
    }});
  DB.notes().forEach(n=>{ const s=svMap[n.survey_uuid]; if(!s) return;
    if([n.content,n.category,s.name,s.location_name].some(hit)){
      results.push({ kind:'note', s, n, t:n.recorded_at||'',
        title:'📝 メモ: '+esc(n.category||''), sub:`${esc(s.name||'')} ・ ${fmtDate(n.recorded_at)}`,
        snippet:n.content||'', marks:'' });
    }});
  results.sort((a,b)=>String(b.t).localeCompare(String(a.t)));
  if(!results.length){ box.innerHTML=`<div class="empty small">「${esc(q)}」に一致する記録はありませんでした。</div>`; return; }
  box.innerHTML=`<div class="small muted" style="margin-bottom:8px;">${results.length}件見つかりました</div>`+
    results.slice(0,200).map(r=>{
      const act=r.kind==='obs'
        ? `nav('obsEdit', JSON.stringify({sv:'${r.s.uuid}',id:'${r.o.uuid}'}))`
        : `nav('noteEdit', JSON.stringify({sv:'${r.s.uuid}',id:'${r.n.uuid}'}))`;
      return `<div class="card tap" onclick="${act}">
        <div class="row"><div class="grow">
          <div style="font-weight:700;">${esc(r.title)} <span class="tiny muted">${r.marks}</span></div>
          <div class="small muted">${r.sub}</div>
          ${r.snippet?`<div class="small" style="margin-top:4px;">${esc(String(r.snippet).slice(0,80))}</div>`:''}
        </div><span class="muted">›</span></div></div>`;
    }).join('');
}

SCREENS.trash = ()=>{

    { k:DB.key.nt, label:'メモ',   items:DB.deleted(DB.key.nt), name:x=>x.category||'メモ', sub:x=>String(x.content||'').slice(0,40) },
    { k:DB.key.hy, label:'仮説',   items:DB.deleted(DB.key.hy), name:x=>x.title||'(無題の仮説)', sub:x=>'' },
  ];
  const total=groups.reduce((n,g)=>n+g.items.length,0);
  return { title:'ごみ箱',

        ${g.items.map(x=>`<div class="card">

          <div class="row" style="margin-top:10px; gap:8px;">
            <button class="btn" style="flex:1;" onclick="restoreItem('${g.k}','${x.uuid}')">↩ 復元</button>
            <button class="btn danger" style="flex:1;" onclick="purgeItem('${g.k}','${x.uuid}')">完全に削除</button>
          </div></div>`).join('')}`).join('')}
      <div class="divider"></div>
      <button class="btn danger" onclick="purgeAll()">ごみ箱を空にする（完全削除）</button>
      <div class="sp"></div>
      <div class="note">「復元」で元に戻せます。「完全に削除」すると取り消せません。調査を復元・完全削除すると、ひも付く観察記録・メモ・仮説もまとめて処理します。</div>
    ` : '<div class="empty">ごみ箱は空です。</div>'
  };
};
function restoreItem(k,u){
  DB.restore(k,u);
  if(k===DB.key.sv){
    DB.deleted(DB.key.ob).filter(o=>o.survey_uuid===u).forEach(o=>DB.restore(DB.key.ob,o.uuid));

let _pdfjsLoading=null;
function ensurePdfjs(){
  if(window.pdfjsLib) return Promise.resolve();
  if(_pdfjsLoading) return _pdfjsLoading;
  _pdfjsLoading=new Promise((res,rej)=>{
    const s=document.createElement('script'); s.src='./vendor/pdf.min.js';
    s.onload=()=>{ if(window.pdfjsLib){ pdfjsLib.GlobalWorkerOptions.workerSrc='./vendor/pdf.worker.min.js'; res(); } else rej(new Error('pdfjs')); };
    s.onerror=()=>rej(new Error('pdfjs load')); document.head.appendChild(s);
  });
  return _pdfjsLoading;
}

async function loadPdf(id){
  try{
    await ensurePdfjs();
    const rec=await RefDB.get(id); if(!rec||!rec.blob){ toast('PDFが見つかりません'); return; }
    const buf=await rec.blob.arrayBuffer();
    const doc=await pdfjsLib.getDocument({data:buf}).promise;
    PDFCTX={ doc, page:1, total:doc.numPages };
    const tot=$('#pdfPageTot'); if(tot) tot.textContent=doc.numPages;
    const pill=$('#pdfPill'); if(pill) pill.textContent=`全 ${doc.numPages} ページ`;
    renderPdfPage();
  }catch(e){ toast('PDFを開けませんでした'); }
}
async function renderPdfPage(){
  if(!PDFCTX) return;
  const page=PDFCTX.page;
  try{
    const p=await PDFCTX.doc.getPage(page);
    const canvas=$('#pdfCanvas'); if(!canvas || !PDFCTX) return;
    const wrap=$('#pdfWrap'); const wrapW=Math.min((wrap&&wrap.clientWidth)||900, 1400);
    const vp0=p.getViewport({scale:1});
    const scale=Math.max(0.3, Math.min(3, (wrapW-4)/vp0.width));
    const vp=p.getViewport({scale});
    const ctx=canvas.getContext('2d');
    canvas.width=vp.width; canvas.height=vp.height;
    await p.render({canvasContext:ctx, viewport:vp}).promise;
    const num=$('#pdfPageNum'); if(num) num.textContent=page;
  }catch(e){}
}
function pdfPage(d){ if(!PDFCTX) return; const n=PDFCTX.page+d; if(n<1||n>PDFCTX.total) return; PDFCTX.page=n; renderPdfPage(); }
function pdfJump(){ if(!PDFCTX) return; const el=$('#pdfJump'); const v=parseInt(el&&el.value,10);
  if(v>=1 && v<=PDFCTX.total){ PDFCTX.page=v; renderPdfPage(); } else toast('1〜'+PDFCTX.total+' のページ番号を入れてください'); }

function download(filename, text, mime){
  downloadBlob(filename, new Blob([text],{type:mime||'text/plain;charset=utf-8'}));
}
function downloadBlob(filename, blob){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),3000);

/* ---------- 録音ZIP（無圧縮・追加ライブラリ不要） ---------- */
function crc32(u8){ let c=~0>>>0; for(let i=0;i<u8.length;i++){ c^=u8[i];
  for(let k=0;k<8;k++) c=(c>>>1)^(0xEDB88320 & -(c&1)); } return (~c)>>>0; }
function buildZip(files){
  const enc=new TextEncoder(); const parts=[]; const central=[]; let offset=0;
  const u16=n=>[n&255,(n>>8)&255]; const u32=n=>[n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];
  files.forEach(f=>{
    const name=enc.encode(f.name); const data=f.u8; const crc=crc32(data);
    const lh=[].concat([0x50,0x4b,0x03,0x04], u16(20), u16(0x0800), u16(0), u16(0), u16(0),
      u32(crc), u32(data.length), u32(data.length), u16(name.length), u16(0));
    parts.push(new Uint8Array(lh), name, data);
    const ch=[].concat([0x50,0x4b,0x01,0x02], u16(20), u16(20), u16(0x0800), u16(0), u16(0), u16(0),
      u32(crc), u32(data.length), u32(data.length), u16(name.length), u16(0), u16(0), u16(0), u16(0),
      u32(0), u32(offset));
    central.push({ head:new Uint8Array(ch), name });
    offset += lh.length + name.length + data.length;
  });
  const cdStart=offset; let cdSize=0;
  central.forEach(c=>{ parts.push(c.head, c.name); cdSize += c.head.length + c.name.length; });
  const end=[].concat([0x50,0x4b,0x05,0x06], u16(0), u16(0), u16(central.length), u16(central.length),
    u32(cdSize), u32(cdStart), u16(0));
  parts.push(new Uint8Array(end));
  return new Blob(parts,{type:'application/zip'});
}
function mediaFilename(o,i,m){ const k=(m&&m.kind==='video')?'video':'photo';
  return `${o.uuid}_${k}${i+1}.${(m&&m.ext)||(k==='video'?'mp4':'jpg')}`; }
// 録音・写真・動画をまとめてZIP出力（対応表 index.csv 付き）
async function exportMediaZip(surveys, base){
  const audioItems=[], mediaItems=[];
  surveys.forEach(s=>DB.obsOf(s.uuid).forEach(o=>{
    (o.audio||[]).forEach((a,i)=>audioItems.push({s,o,a,i}));
    (o.media||[]).forEach((m,i)=>mediaItems.push({s,o,m,i}));
  }));
  if(!audioItems.length && !mediaItems.length){ toast('書き出す録音・写真・動画がありません'); return; }
  toast('まとめています…');
  const files=[]; const idxRows=[];
  for(const it of audioItems){
    let r; try{ r=await AudioDB.get(it.a.id); }catch(e){ r=null; }
    if(!r||!r.blob) continue;
    const name=audioFilename(it.o,it.i,it.a);
    files.push({ name, u8:new Uint8Array(await r.blob.arrayBuffer()) });
    idxRows.push([name,'録音',csvCell(it.s.name),it.o.observed_at,csvCell(it.o.species_name_snapshot),it.o.latitude,it.o.longitude].join(','));
  }
  for(const it of mediaItems){
    let r; try{ r=await PhotoDB.get(it.m.id); }catch(e){ r=null; }
    if(!r||!r.blob) continue;
    const name=mediaFilename(it.o,it.i,it.m);
    files.push({ name, u8:new Uint8Array(await r.blob.arrayBuffer()) });
    idxRows.push([name,(it.m.kind==='video'?'動画':'写真'),csvCell(it.s.name),it.o.observed_at,csvCell(it.o.species_name_snapshot),it.o.latitude,it.o.longitude].join(','));
  }
  if(!files.length){ toast('データが見つかりません'); return; }
  const idx=['file,type,survey_name,observed_at,species_name,latitude,longitude'].concat(idxRows).join('\r\n');
  files.push({ name:'index.csv', u8:new TextEncoder().encode('﻿'+idx) });
  downloadBlob(`${base}_media.zip`, buildZip(files));
  toast('録音・写真・動画ZIPを書き出しました');
}

function buildRows(surveys){

  surveys.forEach(s=>{ DB.obsOf(s.uuid).forEach(o=>{

      audio_file:(o.audio||[]).map((a,i)=>audioFilename(o,i,a)).join(';'),
      media_file:(o.media||[]).map((m,i)=>mediaFilename(o,i,m)).join(';'),
      external_photo_reference:o.external_photo_reference });
  });});
  return rows;
}
function exportCSV(surveys, base){
  const rows=buildRows(surveys);
  if(!rows.length){ toast('書き出す観察記録がありません'); return; }
  const body=[CSV_COLS.join(',')].concat(rows.map(r=>CSV_COLS.map(c=>csvCell(r[c])).join(','))).join('\r\n');
  download(`${base}_observations.csv`, '﻿'+body, 'text/csv;charset=utf-8');
  toast('CSVを書き出しました');
}
function exportGeoJSON(surveys, base){
  const rows=buildRows(surveys).filter(r=>r.latitude&&r.longitude&&!isNaN(parseFloat(r.latitude)));
  const fc={ type:'FeatureCollection', features: rows.map(r=>({
    type:'Feature',
    geometry:{ type:'Point', coordinates:[parseFloat(r.longitude), parseFloat(r.latitude)] },
    properties: CSV_COLS.reduce((p,c)=>{ p[c]=r[c]; return p; }, {})
  }))};
  if(!fc.features.length){ toast('位置付きの記録がありません'); return; }
  download(`${base}_observations.geojson`, JSON.stringify(fc,null,1), 'application/geo+json');
  toast('GeoJSONを書き出しました');
}
const HYP_COLS=['survey_id','survey_name','hypothesis_id','title','hypothesis_text','expected_result',
  'rationale','required_data','target_species','target_location','status'];
const HYPRES_COLS=['survey_id','hypothesis_id','hypothesis_title','result_id','verified_at','observed_result',
  'judgment','judgment_reason','missing_information','alternative_explanation','next_action','next_method','note'];
function exportHypCSV(surveys, base){
  const hrows=[], rrows=[];
  surveys.forEach(s=>{ DB.hypOf(s.uuid).forEach(h=>{
    hrows.push({ survey_id:s.uuid, survey_name:s.name, hypothesis_id:h.uuid, title:h.title,
      hypothesis_text:h.hypothesis_text, expected_result:h.expected_result, rationale:h.rationale,
      required_data:h.required_data, target_species:h.target_species, target_location:h.target_location, status:h.status });
    DB.resultsOf(h.uuid).forEach(r=>{
      rrows.push({ survey_id:s.uuid, hypothesis_id:h.uuid, hypothesis_title:h.title, result_id:r.uuid,
        verified_at:r.verified_at, observed_result:r.observed_result, judgment:r.judgment,
        judgment_reason:r.judgment_reason, missing_information:r.missing_information,
        alternative_explanation:r.alternative_explanation, next_action:r.next_action,
        next_method:r.next_method, note:r.note });
    });
  });});
  if(!hrows.length){ toast('書き出す仮説がありません'); return; }
  const mk=(cols,rows)=>'﻿'+[cols.join(',')].concat(rows.map(r=>cols.map(c=>csvCell(r[c])).join(','))).join('\r\n');
  download(`${base}_hypotheses.csv`, mk(HYP_COLS,hrows), 'text/csv;charset=utf-8');
  if(rrows.length) download(`${base}_hypothesis_results.csv`, mk(HYPRES_COLS,rrows), 'text/csv;charset=utf-8');
  toast('仮説CSVを書き出しました');
}
function blobToB64(blob){ return new Promise(res=>{ const r=new FileReader();
  r.onload=()=>res(String(r.result).split(',')[1]||''); r.onerror=()=>res(''); r.readAsDataURL(blob); }); }
function b64ToBlob(b64,mime){ const bin=atob(b64||''); const u8=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i); return new Blob([u8],{type:mime||'application/octet-stream'}); }
async function exportBackup(){
  toast('バックアップを作成中…（写真・動画が多いと時間がかかります）');
  let audio=[], media=[];
  try{ const metas=await AudioDB.all();
    for(const a of metas){ if(!a||!a.blob) continue;
      audio.push({ id:a.id, mime:a.mime, ext:a.ext, dur:a.dur, size:a.size, obs_uuid:a.obs_uuid,
        created_at:a.created_at, b64:await blobToB64(a.blob) }); }
  }catch(e){ audio=[]; }
  try{ const metas=await PhotoDB.all();
    for(const m of metas){ if(!m||!m.blob) continue;
      media.push({ id:m.id, kind:m.kind, mime:m.mime, ext:m.ext, size:m.size, name:m.name, obs_uuid:m.obs_uuid,
        created_at:m.created_at, b64:await blobToB64(m.blob) }); }
  }catch(e){ media=[]; }
  const data={ app:'bird_survey', version:5, exported_at:nowISO(),
    surveys:DB.allSurveys(), observations:DB.load(DB.key.ob), notes:DB.load(DB.key.nt),
    hypotheses:DB.load(DB.key.hy), hyp_results:DB.load(DB.key.hr), recent:DB.recentSpecies(),
    myguide:myguideList(), audio, media };
  download(`bird_survey_backup_${dateValue().replace(/-/g,'')}.json`, JSON.stringify(data), 'application/json');
  toast('バックアップを書き出しました');
}

SCREENS.importHub = ()=>({
  title:'インポート',
  html:`
    <div class="card">
      <h3>JSONバックアップから復元</h3>
      <p class="small muted">以前書き出した bird_survey_backup_*.json を選ぶと、調査・観察・メモ・録音・写真・動画を取り込みます（同じ記録は上書き）。</p>
      <input type="file" id="impFile" accept="application/json,.json">
      <div class="sp"></div>
      <button class="btn primary" onclick="doImport()">このファイルを取り込む</button>
    </div>
    <div class="note">既存データは消えません。同じ調査ID・観察IDは新しい内容で置き換えられます。</div>
  `
});
function doImport(){
  const f=$('#impFile').files[0]; if(!f){ toast('ファイルを選んでください'); return; }
  const rd=new FileReader();
  rd.onload=()=>{ try{
    const d=JSON.parse(rd.result);
    const merge=(key,arr)=>{ const cur=DB.load(key); const byId={}; cur.forEach(x=>byId[x.uuid]=x);
      (arr||[]).forEach(x=>{ if(x&&x.uuid) byId[x.uuid]=x; }); DB.save(key,Object.values(byId)); };
    merge(DB.key.sv,d.surveys); merge(DB.key.ob,d.observations); merge(DB.key.nt,d.notes);
    merge(DB.key.hy,d.hypotheses); merge(DB.key.hr,d.hyp_results);
    if(d.recent) DB.save(DB.key.recent, d.recent);
    if(Array.isArray(d.myguide) && d.myguide.length){
      const cur=myguideList(); const byId={}; cur.forEach(g=>byId[g.id]=g);
      d.myguide.forEach(g=>{ if(g&&g.id) byId[g.id]=g; }); myguideSave(Object.values(byId));
    }
    if(Array.isArray(d.audio) && d.audio.length){
      Promise.all(d.audio.map(a=>(a&&a.b64)? AudioDB.put({ id:a.id, blob:b64ToBlob(a.b64,a.mime),
        mime:a.mime, ext:a.ext, dur:a.dur, size:a.size, obs_uuid:a.obs_uuid, created_at:a.created_at
      }).catch(()=>{}) : null)).catch(()=>{});
    }
    if(Array.isArray(d.media) && d.media.length){
      Promise.all(d.media.map(m=>(m&&m.b64)? PhotoDB.put({ id:m.id, blob:b64ToBlob(m.b64,m.mime),
        kind:m.kind, mime:m.mime, ext:m.ext, size:m.size, name:m.name, obs_uuid:m.obs_uuid, created_at:m.created_at
      }).catch(()=>{}) : null)).catch(()=>{});
    }
    toast('取り込みました'); reset('home');
  }catch(e){ toast('読み込みに失敗しました（ファイル形式を確認）'); } };
  rd.readAsText(f);
}

/* PDF.js は使う時だけ読み込む（起動を軽く保つ） */
let _pdfjsLoading=null;
function ensurePdfjs(){
  if(window.pdfjsLib) return Promise.resolve();
  if(_pdfjsLoading) return _pdfjsLoading;
  _pdfjsLoading=new Promise((res,rej)=>{
    const s=document.createElement('script'); s.src='./vendor/pdf.min.js';
    s.onload=()=>{ if(window.pdfjsLib){ pdfjsLib.GlobalWorkerOptions.workerSrc='./vendor/pdf.worker.min.js'; res(); } else rej(new Error('pdfjs')); };
    s.onerror=()=>rej(new Error('pdfjs load')); document.head.appendChild(s);
  });
  return _pdfjsLoading;
}
let PDFCTX=null; // { doc, page, total }
let _pdfLoadSeq=0; // PDF読込の連番。新しい読込が始まったら古い読込結果は破棄する
SCREENS.pdfView = (id)=>{
  const meta=refdocList().find(r=>r.id===id);
  if(!meta) return SCREENS.refdocs();
  return { title: meta.name, sub:[`<span class="pill" id="pdfPill">読み込み中…</span>`],
    html:`
      <div class="row" style="align-items:center; gap:8px;">
        <button class="btn" style="width:auto; padding:10px 14px;" onclick="pdfPage(-1)">‹ 前</button>
        <span class="grow" style="text-align:center;"><span id="pdfPageNum">-</span> / <span id="pdfPageTot">-</span></span>
        <button class="btn" style="width:auto; padding:10px 14px;" onclick="pdfPage(1)">次 ›</button>
      </div>
      <div class="row" style="margin-top:8px; gap:8px;">
        <input id="pdfJump" type="number" inputmode="numeric" placeholder="ページ番号へ移動" style="flex:1;">
        <button class="btn" style="width:auto; padding:10px 14px;" onclick="pdfJump()">移動</button>
      </div>
      <div id="pdfWrap" style="margin-top:12px; overflow:auto; -webkit-overflow-scrolling:touch; text-align:center;">
        <canvas id="pdfCanvas" style="max-width:100%; border:1px solid var(--line); border-radius:8px; background:#fff;"></canvas>
      </div>`,
    onMount:()=>{ loadPdf(id); }
  };
};
async function loadPdf(id){
  const seq=++_pdfLoadSeq;   // この読込の番号。以降に別の読込が始まったら、この結果は破棄する
  try{
    await ensurePdfjs();
    const rec=await RefDB.get(id); if(!rec||!rec.blob){ toast('PDFが見つかりません'); return; }
    const buf=await rec.blob.arrayBuffer();
    // 細工PDFによる任意JavaScript実行(CVE-2024-4367系)を防ぐため eval を無効化
    const doc=await pdfjsLib.getDocument({data:buf, isEvalSupported:false}).promise;
    if(seq!==_pdfLoadSeq || !$('#pdfCanvas')){ try{ doc.destroy(); }catch(e){} return; }   // 別PDFに移った/画面を離れたら破棄
    PDFCTX={ doc, page:1, total:doc.numPages };
    const tot=$('#pdfPageTot'); if(tot) tot.textContent=doc.numPages;
    const pill=$('#pdfPill'); if(pill) pill.textContent=`全 ${doc.numPages} ページ`;
    renderPdfPage();
  }catch(e){ toast('PDFを開けませんでした'); }
}
async function renderPdfPage(){
  if(!PDFCTX) return;
  const page=PDFCTX.page;
  try{
    const p=await PDFCTX.doc.getPage(page);
    const canvas=$('#pdfCanvas'); if(!canvas || !PDFCTX) return;
    const wrap=$('#pdfWrap'); const wrapW=Math.min((wrap&&wrap.clientWidth)||900, 1400);
    const vp0=p.getViewport({scale:1});
    const scale=Math.max(0.3, Math.min(3, (wrapW-4)/vp0.width));
    const vp=p.getViewport({scale});
    const ctx=canvas.getContext('2d');
    canvas.width=vp.width; canvas.height=vp.height;
    await p.render({canvasContext:ctx, viewport:vp}).promise;
    const num=$('#pdfPageNum'); if(num) num.textContent=page;
  }catch(e){}
}
function pdfPage(d){ if(!PDFCTX) return; const n=PDFCTX.page+d; if(n<1||n>PDFCTX.total) return; PDFCTX.page=n; renderPdfPage(); }
function pdfJump(){ if(!PDFCTX) return; const el=$('#pdfJump'); const v=parseInt(el&&el.value,10);
  if(v>=1 && v<=PDFCTX.total){ PDFCTX.page=v; renderPdfPage(); } else toast('1〜'+PDFCTX.total+' のページ番号を入れてください'); }

/* ============================================================
   書き出し（CSV / GeoJSON / JSONバックアップ）
   ============================================================ */
function download(filename, text, mime){
  downloadBlob(filename, new Blob([text],{type:mime||'text/plain;charset=utf-8'}));
}
function downloadBlob(filename, blob){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}
function audioFilename(o,i,a){ return `${o.uuid}_${i+1}.${(a&&a.ext)||'webm'}`; }

/* ---------- 録音ZIP（無圧縮・追加ライブラリ不要） ---------- */
function crc32(u8){ let c=~0>>>0; for(let i=0;i<u8.length;i++){ c^=u8[i];
  for(let k=0;k<8;k++) c=(c>>>1)^(0xEDB88320 & -(c&1)); } return (~c)>>>0; }
function buildZip(files){
  const enc=new TextEncoder(); const parts=[]; const central=[]; let offset=0;
  const u16=n=>[n&255,(n>>8)&255]; const u32=n=>[n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];
  files.forEach(f=>{
    const name=enc.encode(f.name); const data=f.u8; const crc=crc32(data);
    const lh=[].concat([0x50,0x4b,0x03,0x04], u16(20), u16(0x0800), u16(0), u16(0), u16(0),
      u32(crc), u32(data.length), u32(data.length), u16(name.length), u16(0));
    parts.push(new Uint8Array(lh), name, data);
    const ch=[].concat([0x50,0x4b,0x01,0x02], u16(20), u16(20), u16(0x0800), u16(0), u16(0), u16(0),
      u32(crc), u32(data.length), u32(data.length), u16(name.length), u16(0), u16(0), u16(0), u16(0),
      u32(0), u32(offset));
    central.push({ head:new Uint8Array(ch), name });
    offset += lh.length + name.length + data.length;
  });
  const cdStart=offset; let cdSize=0;
  central.forEach(c=>{ parts.push(c.head, c.name); cdSize += c.head.length + c.name.length; });
  const end=[].concat([0x50,0x4b,0x05,0x06], u16(0), u16(0), u16(central.length), u16(central.length),
    u32(cdSize), u32(cdStart), u16(0));
  parts.push(new Uint8Array(end));
  return new Blob(parts,{type:'application/zip'});
}
function mediaFilename(o,i,m){ const k=(m&&m.kind==='video')?'video':'photo';
  return `${o.uuid}_${k}${i+1}.${(m&&m.ext)||(k==='video'?'mp4':'jpg')}`; }
function flightAudioFilename(f,i,a){ return `flight_${f.uuid}_${i+1}.${(a&&a.ext)||'webm'}`; }
function flightMediaFilename(f,i,m){ const k=(m&&m.kind==='video')?'video':'photo';
  return `flight_${f.uuid}_${k}${i+1}.${(m&&m.ext)||(k==='video'?'mp4':'jpg')}`; }
// 録音・写真・動画をまとめてZIP出力（対応表 index.csv 付き）
async function exportMediaZip(surveys, base){
  const audioItems=[], mediaItems=[], flAudioItems=[], flMediaItems=[];
  surveys.forEach(s=>{ DB.obsOf(s.uuid).forEach(o=>{
    (o.audio||[]).forEach((a,i)=>audioItems.push({s,o,a,i}));
    (o.media||[]).forEach((m,i)=>mediaItems.push({s,o,m,i}));
  });
  DB.flightsOf(s.uuid).forEach(f=>{
    (f.audio||[]).forEach((a,i)=>flAudioItems.push({s,f,a,i}));
    (f.media||[]).forEach((m,i)=>flMediaItems.push({s,f,m,i}));
  }); });
  if(!audioItems.length && !mediaItems.length && !flAudioItems.length && !flMediaItems.length){ toast('書き出す録音・写真・動画がありません'); return; }
  // 全データをメモリ上でZIP化するため、大きすぎると失敗する。事前にサイズを見積り、危険域は確認・中止する
  const totalBytes=[...audioItems,...flAudioItems].reduce((n,it)=>n+((it.a&&it.a.size)||0),0)
    + [...mediaItems,...flMediaItems].reduce((n,it)=>n+((it.m&&it.m.size)||0),0);
  const GB=1024*1024*1024;
  if(totalBytes >= 3.5*GB){ toast('データが大きすぎます（約'+(totalBytes/GB).toFixed(1)+'GB）。ZIPは作れません。フォルダ保存やクラウド保存をお使いください'); return; }
  if(totalBytes >= 0.8*GB && !confirm('約'+(totalBytes/GB).toFixed(1)+'GBあります。ZIP作成に時間がかかり、端末によっては失敗します。続けますか？')) return;
  toast('まとめています…');
  const files=[]; const idxRows=[];
  for(const it of audioItems){
    let r; try{ r=await AudioDB.get(it.a.id); }catch(e){ r=null; }
    if(!r||!r.blob) continue;
    const name=audioFilename(it.o,it.i,it.a);
    files.push({ name, u8:new Uint8Array(await r.blob.arrayBuffer()) });
    idxRows.push([name,'録音',csvCell(it.s.name),it.o.observed_at,csvCell(it.o.species_name_snapshot),it.o.latitude,it.o.longitude].join(','));
  }
  for(const it of mediaItems){
    let r; try{ r=await PhotoDB.get(it.m.id); }catch(e){ r=null; }
    if(!r||!r.blob) continue;
    const name=mediaFilename(it.o,it.i,it.m);
    files.push({ name, u8:new Uint8Array(await r.blob.arrayBuffer()) });
    idxRows.push([name,(it.m.kind==='video'?'動画':'写真'),csvCell(it.s.name),it.o.observed_at,csvCell(it.o.species_name_snapshot),it.o.latitude,it.o.longitude].join(','));
  }
  for(const it of flAudioItems){
    let r; try{ r=await AudioDB.get(it.a.id); }catch(e){ r=null; }
    if(!r||!r.blob) continue;
    const name=flightAudioFilename(it.f,it.i,it.a);
    files.push({ name, u8:new Uint8Array(await r.blob.arrayBuffer()) });
    idxRows.push([name,'録音(飛翔)',csvCell(it.s.name),it.f.start_time,csvCell(it.f.species_name_snapshot),'',''].join(','));
  }
  for(const it of flMediaItems){
    let r; try{ r=await PhotoDB.get(it.m.id); }catch(e){ r=null; }
    if(!r||!r.blob) continue;
    const name=flightMediaFilename(it.f,it.i,it.m);
    files.push({ name, u8:new Uint8Array(await r.blob.arrayBuffer()) });
    idxRows.push([name,(it.m.kind==='video'?'動画(飛翔)':'写真(飛翔)'),csvCell(it.s.name),it.f.start_time,csvCell(it.f.species_name_snapshot),'',''].join(','));
  }
  if(!files.length){ toast('データが見つかりません'); return; }
  const idx=['file,type,survey_name,observed_at,species_name,latitude,longitude'].concat(idxRows).join('\r\n');
  files.push({ name:'index.csv', u8:new TextEncoder().encode('﻿'+idx) });
  downloadBlob(`${base}_media.zip`, buildZip(files));
  toast('録音・写真・動画ZIPを書き出しました');
}
const CSV_COLS=['survey_id','survey_name','survey_date','survey_method','observation_id','observed_at',
  'latitude','longitude','species_name','count','detection_method','distance_band','direction','behavior','habitat','age_class','sex',
  'env_redlist','hokkaido_redlist','species_protection_act','natural_monument','breeding_rank',
  'target_latitude','target_longitude','nest_tree_species','nest_tree_height','nest_state',
  'identification_status','confidence','needs_review','note','audio_file','media_file','external_photo_reference'];
function csvCell(v){ v=v==null?'':String(v);
  // 数式インジェクション対策は「数値でない」文字列にだけ適用する。
  // 負の緯度経度(-73.98)や個体数を ' 付きの文字列に変えてGIS/R/Pythonの数値処理を壊さないため。
  if(/^[=+\-@\t\r]/.test(v) && !/^[+-]?\d+(\.\d+)?$/.test(v)) v="'"+v;
  return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function buildRows(surveys){
  const rows=[];
  surveys.forEach(s=>{ DB.obsOf(s.uuid).forEach(o=>{
    rows.push({ survey_id:s.uuid, survey_name:s.name, survey_date:fmtDate(s.survey_date), survey_method:s.survey_method,
      observation_id:o.uuid, observed_at:o.observed_at, latitude:o.latitude, longitude:o.longitude,
      species_name:o.species_name_snapshot, count:o.count, detection_method:o.detection_method,
      distance_band:o.distance_band||'', direction:o.direction||'',
      target_latitude:o.target_latitude||'', target_longitude:o.target_longitude||'',
      nest_tree_species:o.nest_tree_species||'', nest_tree_height:o.nest_tree_height||'', nest_state:o.nest_state||'',
      behavior:o.behavior, habitat:o.habitat, age_class:o.age_class||'', sex:o.sex||'',
      env_redlist:csvConserv(o.species_name_snapshot,'e'), hokkaido_redlist:csvConserv(o.species_name_snapshot,'k'),
      species_protection_act:csvConserv(o.species_name_snapshot,'h'), natural_monument:csvConserv(o.species_name_snapshot,'t'),
      breeding_rank:(BREED_LABEL[breedingRank(o.behavior, !!o.species_name_snapshot)]||''),
      identification_status:o.identification_status,
      confidence:o.confidence, needs_review:o.needs_review?1:0, note:o.note,
      audio_file:(o.audio||[]).map((a,i)=>audioFilename(o,i,a)).join(';'),
      media_file:(o.media||[]).map((m,i)=>mediaFilename(o,i,m)).join(';'),
      external_photo_reference:o.external_photo_reference });
  });});
  return rows;
}
function exportCSV(surveys, base){
  const rows=buildRows(surveys);
  if(!rows.length){ toast('書き出す観察記録がありません'); return; }
  const body=[CSV_COLS.join(',')].concat(rows.map(r=>CSV_COLS.map(c=>csvCell(r[c])).join(','))).join('\r\n');
  download(`${base}_observations.csv`, '﻿'+body, 'text/csv;charset=utf-8');

const BREED_ORDER={A:3,B:2,C:1,'':0};
function exportReport(surveys, base){
  // 種ごとに集計（延べ個体数・記録件数・確認方法・繁殖ランク最高・保全指定）
  const bySp={}; const svNames=[];
  surveys.forEach(s=>{ svNames.push(s.name||'（無題）');
    DB.obsOf(s.uuid).forEach(o=>{
      const nm=o.species_name_snapshot||'（未同定）';
      const m=bySp[nm]||(bySp[nm]={name:nm, total:0, records:0, methods:new Set(), rank:'', bySurvey:{}});
      const c=(o.count==null||o.count==='')?1:(parseInt(o.count,10)||0);
      m.total+=c; m.records++;
      if(o.detection_method) m.methods.add(o.detection_method);
      const r=breedingRank(o.behavior, !!o.species_name_snapshot);
      if(BREED_ORDER[r]>BREED_ORDER[m.rank]) m.rank=r;
      m.bySurvey[s.name||'（無題）']=(m.bySurvey[s.name||'（無題）']||0)+c;
    });
  });
  const names=Object.keys(bySp);
  if(!names.length){ toast('書き出す観察記録がありません'); return; }
  // 種の分類順（種名マスタの並び）でソート。未同定・マスタ外は末尾
  const ord=nm=>{ const sp=speciesByName(nm); return sp? sp.species_id : 99999; };
  names.sort((a,b)=>ord(a)-ord(b)||a.localeCompare(b));

  // 1) 種一覧表
  const listCols=['和名','学名','延べ個体数','記録件数','確認方法','繁殖ランク','環境省RL','北海道RL','種の保存法','天然記念物'];
  const listRows=names.map(nm=>{ const m=bySp[nm]; const sp=speciesByName(nm);
    return [nm, sp?sp.scientific_name:'', m.total, m.records, [...m.methods].join('・'),
      (BREED_LABEL[m.rank]||''), csvConserv(nm,'e'), csvConserv(nm,'k'), csvConserv(nm,'h'), csvConserv(nm,'t')]; });
  const listCsv='﻿'+[listCols.join(',')].concat(listRows.map(r=>r.map(csvCell).join(','))).join('\r\n');
  download(`${base}_species_list.csv`, listCsv, 'text/csv;charset=utf-8');

  // 2) 地点×種マトリクス（行=種, 列=調査名, 値=延べ個体数）
  const uniqSv=[...new Set(svNames)];
  const matCols=['和名'].concat(uniqSv);
  const matRows=names.map(nm=>{ const m=bySp[nm];
    return [nm].concat(uniqSv.map(sv=>m.bySurvey[sv]||0)); });
  const matCsv='﻿'+[matCols.join(',')].concat(matRows.map(r=>r.map(csvCell).join(','))).join('\r\n');
  download(`${base}_site_species_matrix.csv`, matCsv, 'text/csv;charset=utf-8');
  toast('報告書用（種一覧・地点×種）を書き出しました');
}

function blobToB64(blob){ return new Promise((res,rej)=>{ const r=new FileReader();
  r.onload=()=>res(String(r.result).split(',')[1]||''); r.onerror=()=>rej(r.error||new Error('base64変換失敗')); r.readAsDataURL(blob); }); }
function b64ToBlob(b64,mime){ const bin=atob(b64||''); const u8=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i); return new Blob([u8],{type:mime||'application/octet-stream'}); }

async function buildFullBackup(){

  const audio=[], media=[];
  const metasA=await AudioDB.all();   // 失敗時は reject が伝播し buildFullBackup 全体が失敗する

      created_at:a.created_at, b64:await blobToB64(a.blob) }); }
  const metasM=await PhotoDB.all();

      created_at:m.created_at, b64:await blobToB64(m.blob) }); }

    surveys:c.surveys, observations:c.observations, notes:c.notes,
    hypotheses:c.hypotheses, hyp_results:c.hyp_results, flights:c.flights,
    recent:DB.recentSpecies(), myguide:myguideList(), audio, media };
}

/* ---------- Googleドライブに直接保存（OAuth / drive.file・iPhone/会社アカウント対応） ---------- */
// サインインしたアカウントのマイドライブに保存する。受け皿方式と違い、保存先＝サインインしたアカウント。
const GDRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const GDRIVE_FOLDER = '鳥類調査バックアップ';
// トークンを端末内に保存し、有効期限内なら再サインイン不要にする（会社アカの2段階認証を毎回出さないため）
function gdriveTokenLoad(){ try{ const t=JSON.parse(localStorage.getItem('bs_gdrive_token')||'null'); return (t&&t.access_token&&Date.now()<t.expiry-60000)?t:null; }catch(e){ return null; } }
function gdriveTokenSave(t){ GTOKEN=t; try{ localStorage.setItem('bs_gdrive_token', JSON.stringify(t)); }catch(e){} }
function gdriveTokenClear(){ GTOKEN=null; localStorage.removeItem('bs_gdrive_token'); }
let GTOKEN = gdriveTokenLoad();                      // {access_token, expiry}（有効期限内のみ復元）
let GUSER = localStorage.getItem('bs_gdrive_user') || ''; // 前回サインインしたアカウント（表示用）
function gdriveCfg(){ try{ return JSON.parse(localStorage.getItem('bs_gdrive')||'{}'); }catch(e){ return {}; } }
function gdriveSaveCfg(c){ localStorage.setItem('bs_gdrive', JSON.stringify(c||{})); }
function gdriveLast(){ return localStorage.getItem('bs_gdrive_last')||''; }
function gisReady(){ return !!(window.google && google.accounts && google.accounts.oauth2); }
function gdriveSignedIn(){ return !!(GTOKEN && GTOKEN.access_token && Date.now() < GTOKEN.expiry-60000); }
// アクセストークン取得。interactive=trueならアカウント選択画面を出す。falseはキャッシュ済みのみ（自動保存用・勝手にポップアップさせない）
function gdriveGetToken(interactive){
  return new Promise((resolve,reject)=>{
    const cfg=gdriveCfg();
    if(!cfg.clientId) return reject(new Error('クライアントID未設定'));
    if(gdriveSignedIn()) return resolve(GTOKEN.access_token);
    if(!interactive) return reject(new Error('未サインイン'));
    if(!gisReady()) return reject(new Error('Googleの読み込み待ち。少し待って再試行してください'));
    try{
      const tc = google.accounts.oauth2.initTokenClient({
        client_id: cfg.clientId, scope: GDRIVE_SCOPE,
        prompt: 'select_account',
        callback: (resp)=>{
          if(resp && resp.access_token){
            gdriveTokenSave({ access_token:resp.access_token, expiry: Date.now()+((resp.expires_in||3600)*1000) });
            resolve(resp.access_token);
          } else reject(new Error('サインインに失敗しました'));
        },
        error_callback: (err)=>reject(new Error((err&&err.type)||'サインインが中断されました'))
      });
      tc.requestAccessToken();
    }catch(e){ reject(e); }
  });
}
async function gdriveFetch(path, opts, token){
  opts=opts||{}; opts.headers=Object.assign({Authorization:'Bearer '+token}, opts.headers||{});
  const res=await fetch('https://www.googleapis.com/'+path, opts);
  if(res.status===401){ gdriveTokenClear(); }   // 認証切れのみトークン破棄。403(権限)はトークン自体は有効なので残す
  if(!res.ok){ const t=await res.text().catch(()=>''); throw new Error('Drive '+res.status+' '+t.slice(0,140)); }
  return res.json();
}
async function gdriveEnsureFolder(token){
  const q=encodeURIComponent("mimeType='application/vnd.google-apps.folder' and name='"+GDRIVE_FOLDER+"' and trashed=false");
  const list=await gdriveFetch('drive/v3/files?spaces=drive&fields=files(id)&q='+q, {}, token);
  if(list.files && list.files.length) return list.files[0].id;
  const created=await gdriveFetch('drive/v3/files?fields=id', { method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ name:GDRIVE_FOLDER, mimeType:'application/vnd.google-apps.folder' }) }, token);
  return created.id;
}
async function gdriveUpsertFile(folderId, name, contentStr, token){
  const q=encodeURIComponent("name='"+name.replace(/'/g,"\\'")+"' and '"+folderId+"' in parents and trashed=false");
  const list=await gdriveFetch('drive/v3/files?spaces=drive&fields=files(id)&q='+q, {}, token);
  let id;
  if(list.files && list.files.length){ id=list.files[0].id; }
  else{
    const created=await gdriveFetch('drive/v3/files?fields=id', { method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ name, parents:[folderId] }) }, token);
    id=created.id;
  }
  await gdriveFetch('upload/drive/v3/files/'+id+'?uploadType=media', { method:'PATCH',
    headers:{'Content-Type':'application/json'}, body:contentStr }, token);
  return id;
}
// Googleドライブへの保存は直列化する。自動保存と手動保存が同時に走ると
// 「検索→無い→作成」が二重に起きて同名フォルダ/ファイルを重複生成するため。
let _gdriveChain=Promise.resolve();
function gdriveSerial(fn){ const run=_gdriveChain.then(fn, fn); _gdriveChain=run.catch(()=>{}); return run; }
async function gdrivePush(kind, dataObj, token){
  return gdriveSerial(async ()=>{
    const folderId=await gdriveEnsureFolder(token);
    const json=JSON.stringify(dataObj);
    const ymd=dateValue().replace(/-/g,'');
    await gdriveUpsertFile(folderId, 'birdsurvey_'+kind+'_latest.json', json, token);
    await gdriveUpsertFile(folderId, 'birdsurvey_'+kind+'_'+ymd+'.json', json, token);
    localStorage.setItem('bs_gdrive_last', nowISO());
  });
}
// 自動保存：サインイン済み（有効トークンあり）のときだけ動く。切れていたら黙ってスキップ
async function gdriveBackupRecords(){
  if(!gdriveCfg().clientId || !gdriveSignedIn()) return;
  const token=await gdriveGetToken(false);
  await gdrivePush('records', buildRecordsBackup(), token);
}
async function gdriveSignIn(){
  const cid=(($('#gdriveClientId')&&$('#gdriveClientId').value)||'').trim();
  if(cid) gdriveSaveCfg({ clientId:cid });
  if(!gdriveCfg().clientId){ toast('先にクライアントIDを入力してください'); return; }
  try{
    const token=await gdriveGetToken(true);
    try{ const about=await gdriveFetch('drive/v3/about?fields=user(emailAddress)', {}, token);
      GUSER=(about.user&&about.user.emailAddress)||''; }catch(e){ GUSER=''; }
    if(GUSER) localStorage.setItem('bs_gdrive_user', GUSER);
    toast('サインインしました'+(GUSER?'：'+GUSER:'')); render();
  }catch(e){ toast('サインイン失敗: '+(e.message||e)); }
}
function gdriveSignOut(){ gdriveTokenClear(); GUSER=''; localStorage.removeItem('bs_gdrive_user'); toast('サインアウトしました'); render(); }
async function gdriveSyncNow(){
  if(!gdriveCfg().clientId){ toast('先にクライアントIDを設定してください'); return; }
  try{ toast('Googleドライブに保存中…'); const token=await gdriveGetToken(true);
    await gdrivePush('records', buildRecordsBackup(), token);
    toast('Googleドライブに保存しました'); render();
  }catch(e){ toast('保存に失敗: '+(e.message||e)); }
}
async function gdriveBackupFull(){
  if(!gdriveCfg().clientId){ toast('先にクライアントIDを設定してください'); return; }
  try{ toast('録音・写真を含めて保存中…'); const token=await gdriveGetToken(true);
    const data=await buildFullBackup(); await gdrivePush('full', data, token);
    toast('Googleドライブに保存しました（録音・写真含む）'); render();
  }catch(e){ toast('保存に失敗: '+(e.message||e)); }
}

const APPS_SCRIPT_CODE = `// 鳥類調査記録アプリ バックアップ受け皿（Google Apps Script）
// TOKEN を好きな合言葉に変え、デプロイ→ウェブアプリ（実行:自分／アクセス:全員）→URLをアプリに貼る
var TOKEN  = 'あいことば';            // ← アプリにも同じ合言葉を入れる
var FOLDER = '鳥類調査バックアップ';   // Myドライブ直下に自動作成
function doPost(e){
  try{
    var b = JSON.parse(e.postData.contents);
    if(!b || b.token !== TOKEN) return out('bad token');
    var kind = (b.kind||'records').replace(/[^a-z]/gi,'') || 'records';
    var f = folder(), json = JSON.stringify(b.data);
    var ymd = Utilities.formatDate(new Date(), Session.getScriptTimeZone(), 'yyyyMMdd');
    put(f, 'birdsurvey_'+kind+'_latest.json', json);
    put(f, 'birdsurvey_'+kind+'_'+ymd+'.json', json);
    return out('ok');
  }catch(err){ return out('error: '+err); }
}
function folder(){ var it=DriveApp.getFoldersByName(FOLDER); return it.hasNext()?it.next():DriveApp.createFolder(FOLDER); }
function put(f,name,c){ var it=f.getFilesByName(name); if(it.hasNext()) it.next().setContent(c); else f.createFile(name,c,'application/json'); }
function out(m){ return ContentService.createTextOutput(m).setMimeType(ContentService.MimeType.TEXT); }
function doGet(){ return out('bird-survey backup OK'); }`;

// 取り込むデータのID類が安全な文字だけか検証（細工バックアップによるXSS/破壊を防ぐ）
// null/undefined（省略）は許容。値がある場合は必ず「文字列 かつ 安全な文字だけ」でなければ弾く。
// （旧実装は typeof!=='string' を無条件で安全扱いしており、配列を渡すと検査を素通りできた）
function safeId(v){ return v==null || (typeof v==='string' && /^[\w-]*$/.test(v)); }
function importIdsOk(d){
  const arrs=[d.surveys,d.observations,d.notes,d.hypotheses,d.hyp_results,d.flights,d.myguide,d.audio,d.media];
  for(const a of arrs){ if(!Array.isArray(a)) continue;
    for(const x of a){ if(!x) continue;
      if(![x.uuid,x.id,x.survey_uuid,x.hypothesis_uuid,x.ref_id].every(safeId)) return false;
      for(const m of [].concat(x.audio||[], x.media||[])){ if(m && !safeId(m.id)) return false; }
    }
  }
  return true;
}
function doImport(){
  const f=$('#impFile').files[0]; if(!f){ toast('ファイルを選んでください'); return; }
  const rd=new FileReader();
  rd.onload=async ()=>{ try{
    const d=JSON.parse(rd.result);
    if(!importIdsOk(d)){ toast('このバックアップは形式が不正なため取り込めません'); return; }
    // 1) メディアを先に保存し、失敗したidを控える（実体の無い参照を記録に残さないため）
    let ok=0, fail=0, total=0; const failed=new Set();
    const putAll=async (arr, storeDB, mk)=>{ for(const it of (arr||[])){ if(!it||!it.b64){ if(it&&it.id) failed.add(it.id); continue; } total++;
      try{ await storeDB.put(mk(it)); ok++; }catch(e){ fail++; if(it.id) failed.add(it.id); } } };  // b64ToBlobの同期例外もここで捕捉
    await putAll(d.audio, AudioDB, a=>({ id:a.id, blob:b64ToBlob(a.b64,a.mime),
      mime:a.mime, ext:a.ext, dur:a.dur, size:a.size, obs_uuid:a.obs_uuid, flight_uuid:a.flight_uuid, created_at:a.created_at }));
    await putAll(d.media, PhotoDB, m=>({ id:m.id, blob:b64ToBlob(m.b64,m.mime),
      kind:m.kind, mime:m.mime, ext:m.ext, size:m.size, name:m.name, obs_uuid:m.obs_uuid, flight_uuid:m.flight_uuid, created_at:m.created_at }));
    // 2) 記録側の audio[]/media[] から、保存に失敗したメディア参照を除く
    const clean=rec=>{ if(!rec) return rec;
      if(Array.isArray(rec.audio)) rec.audio=rec.audio.filter(a=>a&&!failed.has(a.id));
      if(Array.isArray(rec.media)) rec.media=rec.media.filter(m=>m&&!failed.has(m.id)); return rec; };
    (d.observations||[]).forEach(clean); (d.flights||[]).forEach(clean);
    // 3) 記録をmerge。byIdは Object.create(null) でプロトタイプ汚染を防ぐ。保存失敗は検知する
    let saveOk=true;
    const merge=(key,arr)=>{ const cur=DB.load(key); const byId=Object.create(null);
      cur.forEach(x=>{ if(x&&x.uuid) byId[x.uuid]=x; });
      (arr||[]).forEach(x=>{ if(x&&x.uuid) byId[x.uuid]=x; }); if(!DB.save(key,Object.values(byId))) saveOk=false; };
    merge(DB.key.sv,d.surveys); merge(DB.key.ob,d.observations); merge(DB.key.nt,d.notes);
    merge(DB.key.hy,d.hypotheses); merge(DB.key.hr,d.hyp_results); merge(DB.key.fl,d.flights);
    if(d.recent) DB.save(DB.key.recent, d.recent);
    if(Array.isArray(d.myguide) && d.myguide.length){
      const cur=myguideList(); const byId=Object.create(null); cur.forEach(g=>{ if(g&&g.id) byId[g.id]=g; });
      d.myguide.forEach(g=>{ if(g&&g.id) byId[g.id]=g; }); myguideSave(Object.values(byId));
    }
    if(!saveOk) toast('一部の記録を保存できませんでした（空き容量を確認してください）');
    else if(fail) toast(`取り込みました（メディア ${ok}/${total}件成功・${fail}件は実体が無いため参照を除外）`);
    else toast(total? `取り込みました（記録＋メディア${total}件）` : '取り込みました');
    reset('home');
  }catch(e){ toast('読み込みに失敗しました（ファイル形式を確認）'); } };
  rd.readAsText(f);
}

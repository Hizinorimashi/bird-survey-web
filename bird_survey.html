<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f0d">
<title>鳥類調査記録</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.svg">
<link rel="stylesheet" href="./leaflet.css">
<style>
  :root{
    --bg:#0a0f0d; --panel:#12181a; --panel2:#1a2226; --line:#2a3438;
    --fg:#e8efe9; --muted:#8a9a93; --accent:#3fb984; --accent2:#2c8a63;
    --warn:#e0a030; --danger:#d05555; --chip:#233029;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    font-size:16px; line-height:1.5; overscroll-behavior:none;}
  body{padding-bottom:env(safe-area-inset-bottom);}
  h1,h2,h3{margin:0 0 .4em;}
  a{color:var(--accent);}
  button{font-family:inherit; font-size:16px;}
  .app{max-width:900px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}

  /* ヘッダー */
  header{position:sticky; top:0; z-index:500; background:var(--panel);
    border-bottom:1px solid var(--line); padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;}
  .hbar{display:flex; align-items:center; gap:10px;}
  .htitle{font-weight:700; font-size:18px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .back{background:none; border:none; color:var(--accent); font-size:16px; padding:6px 4px; cursor:pointer;}
  .hsub{display:flex; gap:10px; flex-wrap:wrap; margin-top:6px; font-size:13px; color:var(--muted);}
  .hsub .pill{background:var(--chip); border:1px solid var(--line); border-radius:20px; padding:2px 10px;}
  .pill.ok{color:var(--accent);} .pill.warn{color:var(--warn);} .pill.off{color:var(--muted);}

  main{flex:1; padding:14px; padding-bottom:90px;}

  /* カード・リスト */
  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:12px;}
  .card.tap{cursor:pointer;} .card.tap:active{background:var(--panel2);}
  .row{display:flex; align-items:center; gap:10px;}
  .grow{flex:1;}
  .muted{color:var(--muted);} .small{font-size:13px;} .tiny{font-size:12px;}
  .badge{display:inline-block; border-radius:20px; padding:2px 10px; font-size:12px; background:var(--chip); border:1px solid var(--line);}
  .badge.status-未開始{color:var(--muted);}
  .badge.status-調査中{color:var(--accent); border-color:var(--accent2);}
  .badge.status-終了{color:var(--muted);}
  .badge.warn{color:var(--warn);}
  .sp{height:8px;}

  /* ボタン */
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--panel2); color:var(--fg); border:1px solid var(--line);
    border-radius:12px; padding:12px 16px; cursor:pointer; width:100%; text-align:center;}
  .btn:active{background:var(--panel);}
  .btn.primary{background:var(--accent2); border-color:var(--accent); color:#fff; font-weight:700;}
  .btn.ghost{background:none;}
  .btn.danger{color:var(--danger); border-color:#5a2e2e;}
  .btn.big{font-size:18px; padding:18px; font-weight:700;}
  .btn-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .btn-grid.one{grid-template-columns:1fr;}

  /* フォーム */
  label.field{display:block; margin-bottom:14px;}
  label.field > .lab{display:block; font-size:13px; color:var(--muted); margin-bottom:5px;}
  input,select,textarea{width:100%; background:var(--panel2); color:var(--fg);
    border:1px solid var(--line); border-radius:10px; padding:11px 12px; font-size:16px;}
  textarea{min-height:70px; resize:vertical;}
  input:focus,select,textarea:focus{outline:none; border-color:var(--accent);}
  .req{color:var(--accent);}
  .seg{display:flex; flex-wrap:wrap; gap:8px;}
  .seg button{background:var(--panel2); border:1px solid var(--line); color:var(--muted);
    border-radius:20px; padding:8px 14px; cursor:pointer;}
  .seg button.on{background:var(--accent2); border-color:var(--accent); color:#fff;}
  .two{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

  /* 大ボタン群（調査中） */
  .actions{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:6px;}
  .act{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:20px 12px; text-align:center; cursor:pointer; font-size:17px; font-weight:700;}
  .act:active{background:var(--panel2);}
  .act .ic{font-size:26px; display:block; margin-bottom:6px;}
  .act.primary{background:var(--accent2); border-color:var(--accent); color:#fff;}
  .act.wide{grid-column:1 / -1;}

  /* 検索候補 */
  .suggest{border:1px solid var(--line); border-radius:10px; margin-top:6px; overflow:hidden; max-height:280px; overflow-y:auto;}
  .suggest .item{padding:11px 12px; border-bottom:1px solid var(--line); cursor:pointer;}
  .suggest .item:last-child{border-bottom:none;}
  .suggest .item:active{background:var(--panel2);}
  .suggest .item .fam{font-size:12px; color:var(--muted);}
  .chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;}
  .chips .c{background:var(--chip); border:1px solid var(--line); border-radius:16px; padding:5px 10px; font-size:13px; cursor:pointer;}

  /* 地図 */
  #map{height:calc(100vh - 220px); min-height:320px; border-radius:var(--radius); border:1px solid var(--line);}
  .leaflet-container{background:#0d1412;}
  .locate-btn{width:42px; height:42px; font-size:20px; line-height:1;
    background:var(--panel); color:var(--fg); border:1px solid var(--line);
    border-radius:10px; cursor:pointer; box-shadow:0 1px 5px rgba(0,0,0,.4);}
  .locate-btn:active{background:var(--panel2);}

  /* 集計テーブル */
  table{width:100%; border-collapse:collapse; font-size:14px;}
  th,td{text-align:left; padding:8px 6px; border-bottom:1px solid var(--line);}
  th{color:var(--muted); font-weight:600; position:sticky; top:0; background:var(--panel);}
  td.num,th.num{text-align:right;}
  .tablewrap{overflow-x:auto; -webkit-overflow-scrolling:touch;}

  /* トースト */
  #toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%);
    background:#000; color:#fff; padding:11px 18px; border-radius:24px; font-size:14px;
    opacity:0; transition:opacity .25s; pointer-events:none; z-index:2000; max-width:90%;}
  #toast.show{opacity:.94;}

  /* 録音 */
  .reclist{margin-top:10px; display:flex; flex-direction:column; gap:10px;}
  .recitem{background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:10px;}
  .recaudio{width:100%; margin-top:8px; height:38px;}
  .recdot{display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--danger); margin-right:6px; animation:recblink 1s infinite;}
  @keyframes recblink{0%,100%{opacity:1;} 50%{opacity:.2;}}
  /* 写真・動画 */
  .mediagrid{margin-top:10px; display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .mediaitem{position:relative;}
  .mediathumb{position:relative; width:100%; aspect-ratio:1/1; background:var(--panel2);
    border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .mediael{width:100%; height:100%; object-fit:cover; display:block; background:#000;}
  .mediadel{position:absolute; top:4px; right:4px; width:26px; height:26px; border-radius:50%;
    background:rgba(0,0,0,.6); color:#fff; border:1px solid rgba(255,255,255,.5); font-size:16px;
    line-height:1; cursor:pointer; z-index:2;}
  .mediacap{margin-top:3px; text-align:center;}

  /* 選択削除 */
  .selcard.selected{border-color:var(--accent); background:var(--panel2);}
  .selcb{font-size:22px; line-height:1; color:var(--accent); flex:0 0 auto;}
  button:disabled,.btn:disabled{opacity:.45; pointer-events:none;}

  .empty{text-align:center; color:var(--muted); padding:40px 10px;}
  .divider{height:1px; background:var(--line); margin:14px 0;}
  .note{font-size:13px; color:var(--muted); background:var(--panel2); border:1px solid var(--line);
    border-radius:10px; padding:10px 12px;}
  .hidden{display:none !important;}
  /* Leafletのレイヤ切替アイコン(images/layers.png)を同梱していないので、絵文字で代替表示する */
  .leaflet-control-layers-toggle{background-image:none !important; width:36px !important; height:36px !important; position:relative;}
  .leaflet-control-layers-toggle::after{content:'🗺'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:20px;}
  .leaflet-retina .leaflet-control-layers-toggle{background-image:none !important;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="hbar">
      <button class="back hidden" id="backBtn" onclick="goBack()">‹ 戻る</button>
      <div class="htitle" id="hTitle">鳥類調査記録</div>
    </div>
    <div class="hsub" id="hSub"></div>
  </header>
  <main id="main"></main>
</div>
<div id="toast"></div>

<script src="./leaflet.js"></script>
<script src="https://accounts.google.com/gsi/client" async></script>
<script>
/* ============================================================
   鳥類調査員育成用フィールド記録アプリ — Web/PWA 試作版 v1
   保存: localStorage(JSON) + IndexedDB(録音音声) / 地図: Leaflet + 地理院タイル
   ※ 軌跡記録(GPSトラック)は次版で追加予定
   ============================================================ */

/* ---------- バージョン（更新されたか目視で確認するための表示） ---------- */
const APP_VERSION = 'v46（2026-07-24 止まり/巣の位置を地図で記録・営巣木・距離帯・確認方向・風向・視程を追加）';

/* ---------- ユーティリティ ---------- */
const $ = (s,el=document)=>el.querySelector(s);
const uuid = ()=> (crypto.randomUUID ? crypto.randomUUID()
  : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
      const r=Math.random()*16|0, v=c==='x'?r:(r&0x3|0x8); return v.toString(16);}));
const nowISO = ()=> new Date().toISOString();
function localDatetimeValue(d=new Date()){
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}
function dateValue(d=new Date()){
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function fmtDate(s){ if(!s) return '—'; return String(s).slice(0,10); }
function fmtTime(s){ if(!s) return '—'; const d=new Date(s); if(isNaN(d)) return '—';
  const p=n=>String(n).padStart(2,'0'); return `${p(d.getHours())}:${p(d.getMinutes())}`; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),1800); }

/* ---------- データ層（localStorage） ---------- */
const DB = {
  key:{sv:'bs_surveys', ob:'bs_observations', nt:'bs_notes', hy:'bs_hypotheses', hr:'bs_hyp_results', fl:'bs_flights', recent:'bs_recent_species', fav:'bs_fav_species'},
  load(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } },
  // 読取・JSON解析に失敗したら例外を投げる（「本当に空」と「読めない」を区別する版）。
  // GCやバックアップなど、空を鵜呑みにするとデータ喪失につながる処理はこちらを使う。
  loadRaw(k){ const s=localStorage.getItem(k); if(s==null||s==='') return []; return JSON.parse(s); },
  // 保存に失敗（多くは端末の空き容量不足）したら黙って失わせず、必ず警告する。成功時のみtrue。
  save(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }
    catch(e){ try{ toast('⚠ 空き容量不足で保存できませんでした。写真・動画を整理するかバックアップ後に空けてください'); }catch(_){}
      try{ console.error('localStorage save failed', e); }catch(_){}
      return false; }
    if(typeof scheduleCloud==='function') scheduleCloud(); return true; },
  surveys(){ return this.load(this.key.sv).filter(s=>!s.deleted_at); },
  allSurveys(){ return this.load(this.key.sv); },
  observations(){ return this.load(this.key.ob).filter(o=>!o.deleted_at); },
  notes(){ return this.load(this.key.nt).filter(n=>!n.deleted_at); },
  hypotheses(){ return this.load(this.key.hy).filter(h=>!h.deleted_at); },
  hypResults(){ return this.load(this.key.hr).filter(r=>!r.deleted_at); },
  obsOf(svUuid){ return this.observations().filter(o=>o.survey_uuid===svUuid); },
  notesOf(svUuid){ return this.notes().filter(n=>n.survey_uuid===svUuid); },
  hypOf(svUuid){ return this.hypotheses().filter(h=>h.survey_uuid===svUuid); },
  flights(){ return this.load(this.key.fl).filter(f=>!f.deleted_at); },
  flightsOf(svUuid){ return this.flights().filter(f=>f.survey_uuid===svUuid); },
  flight(u){ return this.load(this.key.fl).find(f=>f.uuid===u); },
  upsertFlight(rec){ const a=this.load(this.key.fl); const i=a.findIndex(x=>x.uuid===rec.uuid);
    rec.updated_at=nowISO(); if(i<0){ rec.created_at=nowISO(); a.push(rec);} else a[i]=rec; return this.save(this.key.fl,a); },
  hypothesis(u){ return this.load(this.key.hy).find(h=>h.uuid===u); },
  resultsOf(hyUuid){ return this.hypResults().filter(r=>r.hypothesis_uuid===hyUuid); },
  survey(u){ return this.allSurveys().find(s=>s.uuid===u); },
  upsertSurvey(rec){ const a=this.load(this.key.sv); const i=a.findIndex(x=>x.uuid===rec.uuid);
    rec.updated_at=nowISO(); if(i<0){ rec.created_at=nowISO(); a.push(rec);} else a[i]=rec; return this.save(this.key.sv,a); },
  upsertObs(rec){ const a=this.load(this.key.ob); const i=a.findIndex(x=>x.uuid===rec.uuid);
    rec.updated_at=nowISO(); if(i<0){ rec.created_at=nowISO(); a.push(rec);} else a[i]=rec; return this.save(this.key.ob,a); },
  upsertNote(rec){ const a=this.load(this.key.nt); const i=a.findIndex(x=>x.uuid===rec.uuid);
    rec.updated_at=nowISO(); if(i<0){ rec.created_at=nowISO(); a.push(rec);} else a[i]=rec; return this.save(this.key.nt,a); },
  upsertHyp(rec){ const a=this.load(this.key.hy); const i=a.findIndex(x=>x.uuid===rec.uuid);
    rec.updated_at=nowISO(); if(i<0){ rec.created_at=nowISO(); a.push(rec);} else a[i]=rec; return this.save(this.key.hy,a); },
  upsertHypResult(rec){ const a=this.load(this.key.hr); const i=a.findIndex(x=>x.uuid===rec.uuid);
    rec.updated_at=nowISO(); if(i<0){ rec.created_at=nowISO(); a.push(rec);} else a[i]=rec; return this.save(this.key.hr,a); },
  softDelete(k,u){ const a=this.load(k); const i=a.findIndex(x=>x.uuid===u);
    if(i>=0){ a[i].deleted_at=nowISO(); this.save(k,a);} },
  restore(k,u){ const a=this.load(k); const i=a.findIndex(x=>x.uuid===u);
    if(i>=0){ delete a[i].deleted_at; this.save(k,a);} },
  hardDelete(k,u){ this.save(k, this.load(k).filter(x=>x.uuid!==u)); },
  deleted(k){ return this.load(k).filter(x=>x.deleted_at); },
  recentSpecies(){ return this.load(this.key.recent); },
  pushRecent(name){ if(!name) return; let a=this.load(this.key.recent).filter(x=>x!==name);
    a.unshift(name); a=a.slice(0,12); this.save(this.key.recent,a); },
};

/* ---------- 録音・写真・動画の保存（IndexedDB：サイズが大きいためlocalStorageと分離） ---------- */
/* ストア 'audio' = 録音 / 'media' = 写真・動画 */
let _mediaDbPromise=null;
function openMediaDB(){
  if(_mediaDbPromise) return _mediaDbPromise;
  // open失敗時は拒否Promiseをキャッシュに残さず、次回呼び出しでやり直せるようにする（一過性の失敗から回復するため）
  const fail=(err,rej)=>{ _mediaDbPromise=null; rej(err); };
  _mediaDbPromise=new Promise((res,rej)=>{
    if(!window.indexedDB){ fail(new Error('no-indexeddb'),rej); return; }
    let r; try{ r=indexedDB.open('bird_survey_audio',5); }catch(e){ fail(e,rej); return; }
    r.onupgradeneeded=()=>{ const db=r.result;
      if(!db.objectStoreNames.contains('audio')) db.createObjectStore('audio',{keyPath:'id'});
      if(!db.objectStoreNames.contains('media')) db.createObjectStore('media',{keyPath:'id'});
      if(!db.objectStoreNames.contains('refdoc')) db.createObjectStore('refdoc',{keyPath:'id'});
      if(!db.objectStoreNames.contains('call')) db.createObjectStore('call',{keyPath:'jp'});
      if(!db.objectStoreNames.contains('kv')) db.createObjectStore('kv',{keyPath:'key'}); };
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>fail(r.error,rej);
    r.onblocked=()=>fail(new Error('indexeddb blocked'),rej);
  });
  return _mediaDbPromise;
}
// requestの成功だけでなく transaction 全体の完了(commit)を待って解決する。
// これにより await store.put(...) が「確実に保存された」ことを意味し、途中でabortしたのに成功扱いする事故を防ぐ。
function idbDo(store, mode, fn){ return openMediaDB().then(db=>new Promise((res,rej)=>{
  const tx=db.transaction(store,mode); const st=tx.objectStore(store); const q=fn(st);
  let result;
  q.onsuccess=()=>{ result=q.result; };
  tx.oncomplete=()=>res(result);
  tx.onabort=()=>rej(tx.error||(q&&q.error)||new Error('IndexedDB transaction aborted'));
  tx.onerror=()=>rej(tx.error||(q&&q.error)||new Error('IndexedDB transaction error'));
})); }
function makeBlobStore(store, refField){
  return {
    put(rec){ return idbDo(store,'readwrite', st=>st.put(rec)); },
    get(id){ return idbDo(store,'readonly', st=>st.get(id)); },
    del(id){ return idbDo(store,'readwrite', st=>st.delete(id)); },
    all(){ return idbDo(store,'readonly', st=>st.getAll()).then(r=>r||[]); },
    // どの観察にも参照されていない残骸（保存されなかった・完全削除済み）を掃除
    // ただしマイ図鑑に登録済みのものは保護する
    gc(){ const valid=new Set();
      // 参照元(観察・飛翔・マイ図鑑)が1つでも読めない時は、孤児判定が誤るので一切削除しない（原本保護）
      try{
        DB.loadRaw(DB.key.ob).forEach(o=>(o[refField]||[]).forEach(a=>a&&a.id&&valid.add(a.id)));
        DB.loadRaw(DB.key.fl).forEach(f=>(f[refField]||[]).forEach(a=>a&&a.id&&valid.add(a.id)));
        const mg=localStorage.getItem('bs_myguide');
        if(mg) JSON.parse(mg).forEach(g=>{
          if((store==='audio'&&g.kind==='audio')||(store==='media'&&(g.kind==='photo'||g.kind==='video'))) valid.add(g.ref_id);
        });
      }catch(e){ return Promise.resolve(); }
      return this.all().then(list=>Promise.all(list.filter(a=>!valid.has(a.id)).map(a=>this.del(a.id)))); }
  };
}
const AudioDB = makeBlobStore('audio','audio');   // 観察の o.audio[] が参照
const PhotoDB = makeBlobStore('media','media');   // 観察の o.media[] が参照
function mediaGcAll(){ return Promise.all([AudioDB.gc().catch(()=>{}), PhotoDB.gc().catch(()=>{})]); }

// 資料PDF（図鑑など）。端末内のみに保存し、公開URL・バックアップには含めない
const RefDB = {
  put(rec){ return idbDo('refdoc','readwrite', st=>st.put(rec)); },
  get(id){ return idbDo('refdoc','readonly', st=>st.get(id)); },
  del(id){ return idbDo('refdoc','readwrite', st=>st.delete(id)); },
};
function refdocList(){ try{ return JSON.parse(localStorage.getItem('bs_refdocs')||'[]'); }catch(e){ return []; } }
function refdocSave(list){ localStorage.setItem('bs_refdocs', JSON.stringify(list)); }

// オフライン鳴き声（同梱CC音源を端末に保存）。store 'call' に 和名→blob
const CallDB = {
  put(rec){ return idbDo('call','readwrite', st=>st.put(rec)); },
  get(jp){ return idbDo('call','readonly', st=>st.get(jp)); },
  keys(){ return idbDo('call','readonly', st=>st.getAllKeys()).then(r=>r||[]); },
  all(){ return idbDo('call','readonly', st=>st.getAll()).then(r=>r||[]); },
  clear(){ return idbDo('call','readwrite', st=>st.clear()); },
};
// 端末に保存済みの鳴き声が「今の録音(ファイル)と一致」している種数を数える。
// 差し替え(ファイル変更)された種は未一致＝再保存対象として扱う。
function countUpToDateCalls(){
  return CallDB.all().then(list=>{ const byJp={}; list.forEach(r=>{ if(r&&r.blob) byJp[r.jp]=r; });

/* 環境省RL・北海道RLカテゴリの表示名 */
const RL_LABEL={CR:'絶滅危惧ⅠA類',EN:'絶滅危惧ⅠB類',VU:'絶滅危惧Ⅱ類',NT:'準絶滅危惧',DD:'情報不足',EX:'絶滅',EW:'野生絶滅'};
const HRL_LABEL={Cr:'絶滅危惧ⅠA類',En:'絶滅危惧ⅠB類',Vu:'絶滅危惧Ⅱ類',Nt:'準絶滅危惧',Dd:'情報不足',N:'留意',Lp:'地域個体群',Ex:'絶滅'};
const TEN_LABEL={'特':'特別天然記念物','天':'天然記念物'};
/* 種名から保全指定を取得（なければnull）。注目種判定にも使う */
function conservOf(name){ return (name && CONSERV[name]) || null; }
/* 保全指定を短いラベル配列で返す（バッジ・出力用） */
function conservTags(name){ const c=conservOf(name); if(!c) return [];
  const t=[];
  if(c.e) t.push('環境省RL '+RL_LABEL[c.e]+'（'+c.e+'）');
  if(c.k) t.push('北海道RL '+HRL_LABEL[c.k]+'（'+c.k+'）');
  if(c.h) t.push('種の保存法（国内希少種）');
  if(c.t) t.push(TEN_LABEL[c.t]);
  return t;
}
/* 保全区分を色分けの小バッジで表示（環VU / 北Vu / 天 など）。カード表示用 */
function sevColor(code){ const c=String(code||'').toUpperCase();
  if(c==='CR'||c==='EN'||c==='EX') return '#b03030';   // 絶滅危惧が高い＝赤
  if(c==='VU'||c==='NT') return '#8a5a00';             // やや高い＝橙
  return '#5a6a72'; }                                  // 情報不足・留意など＝灰
function conservBadges(name){ const c=conservOf(name); if(!c) return '';
  const b=[];
  if(c.e) b.push(`<span class="badge" style="background:${sevColor(c.e)};color:#fff;" title="環境省レッドリスト ${RL_LABEL[c.e]}（${c.e}）">環${c.e}</span>`);
  if(c.k) b.push(`<span class="badge" style="background:${sevColor(c.k)};color:#fff;" title="北海道レッドリスト ${HRL_LABEL[c.k]}（${c.k}）">北${c.k}</span>`);
  if(c.t) b.push(`<span class="badge" style="background:#2f7d5b;color:#fff;" title="${TEN_LABEL[c.t]}">${c.t==='特'?'特天':'天'}</span>`);
  return b.join('');
}
/* CSV/報告書の1列用に、指定を短い文字列で返す（該当なしは空） */
function csvConserv(name,field){ const c=conservOf(name); if(!c) return '';
  if(field==='e') return c.e? RL_LABEL[c.e]+'（'+c.e+'）':'';
  if(field==='k') return c.k? HRL_LABEL[c.k]+'（'+c.k+'）':'';
  if(field==='h') return c.h? '国内希少種':'';
  if(field==='t') return c.t? TEN_LABEL[c.t]:'';
  return '';
}

/* ---------- 繁殖ランク（観察コード）の自動判定 ----------
   全国鳥類繁殖分布調査に準拠。行動タグから A:繁殖確認 > B:繁殖の可能性 > C:生息を確認 を推定。
   あくまで自動推定のため、報告書では要確認（画面には出さず出力時のみ算出） */
const BREED_A=['巣立ち雛','給餌','餌運び'];                                   // 繁殖を確認
const BREED_B=['さえずり','繁殖行動','巣材運搬','威嚇','警戒','餌渡し','dF(ディスプレイ飛翔)']; // 繁殖の可能性
const BREED_LABEL={A:'A 繁殖を確認',B:'B 繁殖の可能性',C:'C 生息を確認'};
/* 行動文字列（「・」区切り）から繁殖ランクを返す。種名があれば最低でもC */
function breedingRank(behaviorStr, hasSpecies){
  const set=String(behaviorStr||'').split('・').filter(Boolean);
  if(set.some(b=>BREED_A.includes(b))) return 'A';
  if(set.some(b=>BREED_B.includes(b))) return 'B';
  return hasSpecies? 'C':'';
}

function brCallUrlFor(s){ return 'https://db3.bird-research.jp/saezuri/birdsong/list;name='+encodeURIComponent((s&&s.japanese_name)||''); }
function guideLinksByName(name){ const s=speciesByName(name)||{japanese_name:name, scientific_name:''};

/* ---------- 画面遷移 ---------- */
let STACK = [];               // {name, arg}
let currentSurveyUuid = null; // 調査中コンテキスト
let mapObj = null;
let _mapTimer = null;   // 地図初期化の保留タイマー（画面を離れたら取り消す）
let _recGen = 0, _mediaGen = 0;   // 録音/写真パネルの世代。再描画・画面遷移で+1し、古い非同期処理のURL割当を無効化する
let mapCurMarker = null, mapCurCircle = null; // 地図上の現在地マーカー・精度円

function nav(name, arg){ SCREENS._sel=null; STACK.push({name,arg}); render(); }
function goBack(){ if(STACK.length>1){ SCREENS._sel=null; STACK.pop(); render(); } }
function reset(name,arg){ SCREENS._sel=null; STACK=[{name,arg}]; render(); }

const SCREENS = {}; // name -> function(arg) -> returns {title, sub[], html, onMount}

function render(){
  if(REC) recAbort(); // 画面を離れたら録音を中断（保存はしない）
  if(PDFCTX){ try{ PDFCTX.doc.destroy(); }catch(e){} PDFCTX=null; } // PDF閲覧の後始末
  if(_mapTimer){ clearTimeout(_mapTimer); _mapTimer=null; }   // 前画面の地図初期化予約を取り消す
  if(mapObj){ try{ mapObj.remove(); }catch(e){} mapObj=null; }
  const cur = STACK[STACK.length-1] || {name:'home'};
  const scr = SCREENS[cur.name] || SCREENS.home;
  const out = scr(cur.arg) || {};
  $('#hTitle').textContent = out.title || '鳥類調査記録';
  $('#backBtn').classList.toggle('hidden', STACK.length<=1);
  const sub = $('#hSub'); sub.innerHTML = (out.sub||[]).join('');
  const main = $('#main');
  _recGen++; _mediaGen++;   // 保留中のメディア非同期処理を無効化（切り離されたDOMへURLを付けない）
  revokePanelUrls(main, 'audio, .mediael');   // 画面差し替え前に音声・写真のObject URLを解放（リーク防止）
  main.innerHTML = out.html || '';
  if(out.onMount) out.onMount();
  window.scrollTo(0,0);
}

SCREENS.home = ()=>{
  const surveys = DB.surveys().sort((a,b)=>(b.survey_date||'').localeCompare(a.survey_date||''));
  const active = surveys.filter(s=>s.status==='調査中');
  const others = surveys.filter(s=>s.status!=='調査中');

  const selMode = !!(SCREENS._sel && SCREENS._sel.scope==='home');
  const svCard = s=>{
    const obs = DB.obsOf(s.uuid);
    const spCount = new Set(obs.filter(o=>o.species_name_snapshot).map(o=>o.species_name_snapshot)).size;
    const review = obs.filter(o=>o.needs_review).length;

// アプリ本体のプログラムだけを最新に読み込み直す（記録データは消さない）
function forceUpdate(){
  if(!confirm('保存した記録（調査・観察・録音）はそのままで、アプリのプログラムだけを最新に読み込み直します。よろしいですか？')) return;
  const reload=()=>location.reload();
  const tasks=[];
  // このアプリのSW・キャッシュだけを対象にする（同一オリジンの別アプリを壊さない）
  if('serviceWorker' in navigator){ tasks.push(navigator.serviceWorker.getRegistration()
    .then(r=>r?r.unregister():null).catch(()=>{})); }
  if(window.caches){ tasks.push(caches.keys()
    .then(ks=>Promise.all(ks.filter(k=>k.startsWith('bird-survey-')||k.startsWith('bird-map-tiles-')).map(k=>caches.delete(k)))).catch(()=>{})); }
  Promise.all(tasks).then(reload, reload);
}

function pickSeg(btn,field,val){
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); btn.parentElement.dataset.value=val; draftSave();
}
function collectSurveyForm(){
  const f=$('#svForm'); const g=n=>{const el=f.querySelector(`[name="${n}"]`); return el?el.value:'';};
  const seg=field=>{ const on=f.querySelector(`[data-seg="${field}"] button.on`); return on?on.textContent:''; };
  return { name:g('name'), survey_date:g('survey_date'), temperature:g('temperature'),
    location_name:g('location_name'), survey_method:seg('survey_method'),
    investigator_name:g('investigator_name'), weather:seg('weather'), wind:seg('wind'),
    wind_direction:seg('wind_direction'), visibility:seg('visibility'),
    purpose:g('purpose'), pre_survey_notes:g('pre_survey_notes'), pre_hypothesis:g('pre_hypothesis') };
}
function draftSave(){ if(SCREENS._editing) return; // 新規のみ下書き
  const base={uuid:SCREENS._editUuid, status:'未開始'};
  localStorage.setItem(DRAFT_KEY, JSON.stringify(Object.assign(base, collectSurveyForm()))); }
function saveSurvey(u, editing){
  const data=collectSurveyForm();
  if(!data.name.trim()){ toast('調査名を入力してください'); return; }
  const cur = editing ? DB.survey(u) : {uuid:u, status:'未開始'};
  const rec = Object.assign({}, cur, data);
  if(!DB.upsertSurvey(rec)) return;   // 保存失敗なら下書きも消さず遷移もしない
  if(!editing) localStorage.removeItem(DRAFT_KEY);
  toast('保存しました');
  reset('home'); nav('survey', u);
}
// 調査を関連データごとソフト削除（ごみ箱から戻せる）
function softDeleteSurveyCascade(u){
  DB.softDelete(DB.key.sv,u);
  DB.obsOf(u).forEach(o=>DB.softDelete(DB.key.ob,o.uuid));
  DB.notesOf(u).forEach(n=>DB.softDelete(DB.key.nt,n.uuid));
  DB.hypOf(u).forEach(h=>DB.softDelete(DB.key.hy,h.uuid));
  DB.flightsOf(u).forEach(f=>DB.softDelete(DB.key.fl,f.uuid));
}
function deleteSurvey(u){
  if(!confirm('この調査と、ひも付く観察記録を削除します。よろしいですか？（あとで「ごみ箱」から戻せます）')) return;
  softDeleteSurveyCascade(u);

}

function startSelect(scope, sv){ SCREENS._sel={ scope, sv:sv||null, set:new Set() }; render(); }
function endSelect(){ SCREENS._sel=null; render(); }
function toggleSel(uuid, card){
  const sel=SCREENS._sel; if(!sel) return;
  if(sel.set.has(uuid)){ sel.set.delete(uuid); card.classList.remove('selected'); }
  else { sel.set.add(uuid); card.classList.add('selected'); }
  const cb=card.querySelector('.selcb'); if(cb) cb.textContent=sel.set.has(uuid)?'☑':'☐';
  const btn=$('#selDelBtn'); const n=sel.set.size;
  if(btn){ btn.textContent=`選択した${n}件を削除`; btn.disabled=n===0; }
}
function deleteSelected(){
  const sel=SCREENS._sel; if(!sel||!sel.set.size) return;
  const n=sel.set.size;
  if(!confirm(`選択した${n}件を削除しますか？（あとで「ごみ箱」から戻せます）`)) return;
  if(sel.scope==='home') sel.set.forEach(u=>softDeleteSurveyCascade(u));
  else sel.set.forEach(u=>DB.softDelete(DB.key.ob,u));
  toast(`${n}件を削除しました`); SCREENS._sel=null; render();
}

/* GPS状態インジケータ（ヘッダの pill を更新） */
let gpsWatchId=null, lastFix=null;
function startGpsIndicator(){
  stopGps();
  if(!navigator.geolocation) return;
  gpsWatchId=navigator.geolocation.watchPosition(p=>{
    lastFix={lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy, t:Date.now()};
    const el=$('#pGps'); if(el){ el.textContent=`GPS ±${Math.round(p.coords.accuracy)}m`; el.className='pill ok'; }
  }, e=>{ const el=$('#pGps'); if(el){ el.textContent='GPS 取得不可'; el.className='pill off'; } },
  {enableHighAccuracy:true, maximumAge:5000, timeout:15000});
}
function stopGps(){ if(gpsWatchId!=null && navigator.geolocation){ navigator.geolocation.clearWatch(gpsWatchId); } gpsWatchId=null; }

SCREENS.obsEdit = (argStr)=>{
  const arg = JSON.parse(argStr||'{}');
  const svUuid = arg.sv || currentSurveyUuid;
  const editing = !!arg.id;
  let o = editing ? Object.assign({}, DB.observations().find(x=>x.uuid===arg.id)) : null;
  if(!o){
    o = { uuid:uuid(), survey_uuid:svUuid, observed_at:localDatetimeValue(), latitude:'', longitude:'',
      gps_accuracy:'', species_id:'', species_name_snapshot:'', count:1, detection_method:'目視',
      behavior:'', habitat:'', age_class:'不明', sex:'不明', distance_band:'', direction:'',
      target_latitude:'', target_longitude:'', nest_tree_species:'', nest_tree_height:'', nest_state:'',
      note:'', identification_status:'確定', confidence:'中',
      needs_review:false, external_photo_reference:'' };

function pickObs(btn,field,val){ btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); }
function segVal(field){ const on=document.querySelector(`[data-seg="${field}"] button.on`); return on? (on.textContent==='なし'?'':on.textContent):''; }
function segVals(field){ return [...document.querySelectorAll(`[data-seg="${field}"] button.on`)].map(b=>b.textContent).filter(t=>t!=='なし').join('・'); }

/* 種名検索（ひらがな・カタカナどちらの入力でもヒット） */
function toKata(s){ return String(s||'').replace(/[ぁ-ゖ]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60)); }
function spSearch(q){
  const box=$('#spSuggest'); q=(q||'').trim();
  updateSpRefLinks(q);
  if(!q){ box.innerHTML=''; return; }
  const qk=toKata(q);
  const pre = SPECIES.filter(s=>toKata(s.japanese_name).startsWith(qk));
  const part = SPECIES.filter(s=>!toKata(s.japanese_name).startsWith(qk) && toKata(s.japanese_name).includes(qk));
  const list=[...pre,...part].slice(0,12);
  box.innerHTML = list.length ? `<div class="suggest">${list.map(s=>
    `<div class="item" onclick="chooseSpecies(${s.species_id},'${esc(s.japanese_name)}')">${esc(s.japanese_name)}</div>`).join('')}
    <div class="item" style="color:var(--muted)" onclick="chooseSpecies('','')">「${esc(q)}」は候補になし → 未同定で保存</div></div>`
    : `<div class="suggest"><div class="item" style="color:var(--muted)" onclick="chooseSpecies('','')">候補なし → 未同定で保存</div></div>`;
}
function chooseSpecies(id,name){ $('#spInput').value=name; $('#spSuggest').innerHTML=''; updateSpRefLinks(name);
  if(!name){ document.querySelectorAll('[data-seg="identification_status"] button').forEach(b=>{
    b.classList.toggle('on', b.textContent==='未同定'); }); } SCREENS._chosenId=id; }

function grabGps(){
  if(!navigator.geolocation){ toast('位置情報を利用できません'); return; }
  toast('位置を取得中…');
  navigator.geolocation.getCurrentPosition(p=>{
    $('#latIn').value=p.coords.latitude.toFixed(6); $('#lonIn').value=p.coords.longitude.toFixed(6);
    $('#posLabel').textContent=`${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)} (±${Math.round(p.coords.accuracy)}m)`;
    SCREENS._acc=Math.round(p.coords.accuracy); lastFix={lat:p.coords.latitude,lon:p.coords.longitude,acc:p.coords.accuracy,t:Date.now()};
    toast('位置を取得しました');
  }, e=>toast('位置を取得できませんでした'), {enableHighAccuracy:true, timeout:15000});
}
/* 観察の対象位置（止まり木・巣など）を地図タップで指定 */
let obsTargetMarker=null;
function toggleObsTargetMap(){ const el=$('#otMap'); if(!el) return;
  if(el.style.display==='none'){ el.style.display='block'; initObsTargetMap(); }
  else { el.style.display='none'; }
}
function initObsTargetMap(){
  const el=$('#otMap'); if(!el) return;
  if(mapObj){ try{ mapObj.remove(); }catch(e){} mapObj=null; } obsTargetMarker=null;
  let lat=parseFloat($('#otLat').value), lon=parseFloat($('#otLon').value);
  const ola=parseFloat($('#latIn').value), olo=parseFloat($('#lonIn').value);
  let center=[43.06,141.35], zoom=13;
  if(!isNaN(lat)&&!isNaN(lon)){ center=[lat,lon]; zoom=16; }
  else if(!isNaN(ola)&&!isNaN(olo)){ center=[ola,olo]; zoom=16; }
  else if(lastFix){ center=[lastFix.lat,lastFix.lon]; zoom=16; }
  mapObj=L.map('otMap').setView(center,zoom);
  const gsiAttr='<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank" rel="noopener">地理院タイル</a>';
  const gsi=(name,ext,mx,opt)=>L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/'+name+'/{z}/{x}/{y}.'+ext, Object.assign({maxZoom:18,maxNativeZoom:mx||18,attribution:gsiAttr},opt||{}));
  const bases={ '標準地図':gsi('std','png',18),'淡色地図':gsi('pale','png',18),'写真（航空・衛星）':gsi('seamlessphoto','jpg',18) };
  let savedBase=localStorage.getItem('bs_basemap'); if(!bases[savedBase]) savedBase='標準地図';
  bases[savedBase].addTo(mapObj);
  L.control.layers(bases,{},{position:'topright',collapsed:true}).addTo(mapObj);
  mapObj.on('baselayerchange', e=>{ try{ localStorage.setItem('bs_basemap',e.name); }catch(err){} });
  // 観察者の位置を緑丸で薄く表示（対象位置の目安）
  if(!isNaN(ola)&&!isNaN(olo)) L.circleMarker([ola,olo],{radius:5,color:'#fff',weight:1,fillColor:'#3fb984',fillOpacity:.9}).addTo(mapObj).bindPopup('観察者の位置');
  if(!isNaN(lat)&&!isNaN(lon)) setObsTarget(lat,lon);
  mapObj.on('click', e=>setObsTarget(e.latlng.lat, e.latlng.lng));
  setTimeout(()=>{ if(mapObj) mapObj.invalidateSize(); },200);
}
function setObsTarget(lat,lon){
  $('#otLat').value=lat.toFixed(6); $('#otLon').value=lon.toFixed(6);
  $('#otLabel').textContent=lat.toFixed(6)+', '+lon.toFixed(6);
  const mapShown=$('#otMap') && $('#otMap').style.display!=='none';
  if(mapObj && mapShown){ if(obsTargetMarker){ try{ mapObj.removeLayer(obsTargetMarker); }catch(e){} }
    obsTargetMarker=L.marker([lat,lon]).addTo(mapObj); }
}
function obsTargetFromGps(){
  if(lastFix){ setObsTarget(lastFix.lat,lastFix.lon); if(mapObj && $('#otMap').style.display!=='none') mapObj.setView([lastFix.lat,lastFix.lon],16); toast('現在地を対象位置にしました'); return; }
  if(!navigator.geolocation){ toast('位置情報を利用できません'); return; }
  toast('位置を取得中…');
  navigator.geolocation.getCurrentPosition(p=>{ lastFix={lat:p.coords.latitude,lon:p.coords.longitude,acc:p.coords.accuracy,t:Date.now()};
    setObsTarget(p.coords.latitude,p.coords.longitude); toast('現在地を対象位置にしました'); },
    e=>toast('位置を取得できませんでした'), {enableHighAccuracy:true,timeout:15000});
}
function clearObsTarget(){ $('#otLat').value=''; $('#otLon').value=''; $('#otLabel').textContent='未指定';
  if(mapObj&&obsTargetMarker){ try{ mapObj.removeLayer(obsTargetMarker); }catch(e){} obsTargetMarker=null; } }
function saveObs(u, svUuid, editing, cont){
  const f=$('#obForm'); const g=n=>{const el=f.querySelector(`[name="${n}"]`); return el?el.value:'';};
  const name=$('#spInput').value.trim();
  const idStatus = segVal('identification_status') || (name?'確定':'未同定');

  let lat=$('#latIn').value.trim(), lon=$('#lonIn').value.trim();
  if((lat||lon) && !validLatLon(lat,lon)){ toast('⚠ 位置の数値が正しくないため、位置なしで保存します'); lat=''; lon=''; }
  // 対象位置（止まり木・巣など）。不正なら位置なしで保存
  let tlat=(($('#otLat')&&$('#otLat').value)||'').trim(), tlon=(($('#otLon')&&$('#otLon').value)||'').trim();
  if((tlat||tlon) && !validLatLon(tlat,tlon)){ tlat=''; tlon=''; }
  const rec = Object.assign({}, editing?DB.observations().find(x=>x.uuid===u):{uuid:u}, {
    uuid:u, survey_uuid:svUuid,
    observed_at: g('observed_at')? new Date(g('observed_at')).toISOString() : nowISO(),
    latitude: lat, longitude: lon,
    gps_accuracy: SCREENS._acc || (DB.observations().find(x=>x.uuid===u)||{}).gps_accuracy || '',
    species_id: (speciesByName(name)||{}).species_id || SCREENS._chosenId || '', species_name_snapshot: name,
    count: parseInt(g('count'),10)||0, detection_method: segVal('detection_method'),
    behavior: segVals('behavior'), habitat: segVals('habitat'),
    age_class: segVal('age_class'), sex: segVal('sex'),
    distance_band: segVal('distance_band'), direction: segVal('direction'),
    target_latitude: tlat, target_longitude: tlon,
    nest_tree_species: g('nest_tree_species'), nest_tree_height: g('nest_tree_height'), nest_state: segVal('nest_state'),
    identification_status: name? idStatus : '未同定',
    confidence: segVal('confidence'), needs_review: $('#needsReview').checked,
    note: g('note'), external_photo_reference: g('external_photo_reference'),
    audio: SCREENS._audio||[], media: SCREENS._media||[],
  });
  if(!DB.upsertObs(rec)) return;   // 保存失敗(DB.saveが警告済み)。成功表示も画面遷移もしない
  if(name) DB.pushRecent(name);
  SCREENS._acc=null; SCREENS._chosenId=null; SCREENS._audio=null; SCREENS._media=null;
  toast('保存しました');
  if(cont){ goBack(); nav('obsEdit', JSON.stringify({sv:svUuid})); } // 位置を引き継いで次の種へ
  else goBack();
}

function myguideList(){ try{ return JSON.parse(localStorage.getItem('bs_myguide')||'[]'); }catch(e){ return []; } }

  if(!audio.length && !media.length){ toast('登録できる録音・写真がありません'); return; }
  const l=myguideList(); const have=new Set(l.filter(g=>g.species_name===name).map(g=>g.ref_id)); let added=0;
  audio.forEach(a=>{ if(have.has(a.id)) return; l.push({ id:uuid(), species_name:name, kind:'audio', ref_id:a.id, ext:a.ext, mime:a.mime, source_obs:o.uuid, created_at:nowISO() }); added++; });
  media.forEach(m=>{ if(have.has(m.id)) return; l.push({ id:uuid(), species_name:name, kind:m.kind, ref_id:m.id, ext:m.ext, mime:m.mime, source_obs:o.uuid, created_at:nowISO() }); added++; });
  myguideSave(l);

}
function removeFromGuide(id){

// 図鑑の切り抜き画像を取り込む（ファイル名＝和名で種に紐付け・端末内のみ）
function importGuideImages(input){
  const files=Array.from(input.files||[]); input.value=''; if(!files.length) return;
  toast('図鑑画像を取り込み中…');
  const adds=[];
  const jobs=files.map(f=>{
    const name=(f.name||'').replace(/\.[^.]+$/,'').replace(/[\s_]*[（(]?\d+[）)]?\s*$/,'').trim();
    const kind=(f.type||'').startsWith('video')?'video':'photo';
    const ext=fileExt(f.name,f.type), mid=uuid();
    return PhotoDB.put({ id:mid, kind, mime:f.type||'', ext, size:f.size, name:f.name||'', obs_uuid:'', created_at:nowISO(), blob:f })
      .then(()=>{ adds.push({ id:uuid(), species_name:name, kind, ref_id:mid, ext, mime:f.type||'', source:'guide', created_at:nowISO() }); });
  });
  Promise.all(jobs).then(()=>{
    let l=myguideList().concat(adds);
    // 図鑑取り込みは種ごとに最新1枚だけ残す（再取り込みで更新）
    const seen={}; const keep=[];
    for(let i=l.length-1;i>=0;i--){ const g=l[i];
      if(g.source==='guide'){ if(seen[g.species_name]) continue; seen[g.species_name]=1; }
      keep.unshift(g);
    }
    myguideSave(keep); mediaGcAll(); scheduleFolderFull();
    const matched=adds.filter(a=>speciesByName(a.species_name)).length;
    toast(`図鑑画像 ${adds.length}枚を取り込みました（和名一致 ${matched}種）`); render();
  }).catch(()=>toast('取り込みに失敗しました'));
}
// 無圧縮(格納)ZIPを解く。ローカルファイルヘッダを順に読む（このアプリで配る図鑑ZIPは無圧縮・UTF-8名で作る）
function parseStoredZip(buf){
  const dv=new DataView(buf), u8=new Uint8Array(buf); const dec=new TextDecoder('utf-8');
  const entries=[]; let i=0;
  while(i+30<=u8.length){
    if(dv.getUint32(i,true)!==0x04034b50) break;   // ローカルヘッダ以外（中央ディレクトリ等）に来たら終了
    const method=dv.getUint16(i+8,true);
    const compSize=dv.getUint32(i+18,true);
    const nameLen=dv.getUint16(i+26,true), extraLen=dv.getUint16(i+28,true);
    const name=dec.decode(u8.subarray(i+30, i+30+nameLen));
    const dataStart=i+30+nameLen+extraLen;
    if(method===0 && !name.endsWith('/')) entries.push({ name, data:u8.subarray(dataStart, dataStart+compSize) });
    i=dataStart+compSize;
  }
  return entries;
}
// 種図鑑ZIP（和名.png を多数まとめたもの）を1ファイルで一括取り込み。端末内のみ保存・公開URLには出さない
async function importGuideZip(input){
  const f=(input.files||[])[0]; input.value=''; if(!f) return;
  if(!/\.zip$/i.test(f.name||'')){ toast('ZIPファイルを選んでください'); return; }
  toast('図鑑ZIPを読み込み中…（初回は少し時間がかかります）');
  let buf; try{ buf=await f.arrayBuffer(); }catch(e){ toast('ファイルを読めませんでした'); return; }
  let entries=[]; try{ entries=parseStoredZip(buf); }catch(e){ entries=[]; }
  const imgs=entries.filter(e=>/\.(png|jpe?g|webp|gif)$/i.test(e.name));
  if(!imgs.length){ toast('ZIP内に画像が見つかりません（無圧縮ZIPをお使いください）'); return; }
  const adds=[]; let done=0;
  for(const e of imgs){
    const base=e.name.replace(/^.*\//,'');
    const name=base.replace(/\.[^.]+$/,'').replace(/[\s_]*[（(]?\d+[）)]?\s*$/,'').trim();
    const ext=((base.match(/\.([a-z0-9]+)$/i)||[])[1]||'png').toLowerCase();
    const mime=ext==='png'?'image/png':(/^jpe?g$/.test(ext)?'image/jpeg':(ext==='webp'?'image/webp':'image/'+ext));
    const blob=new Blob([e.data],{type:mime}); const mid=uuid();
    try{ await PhotoDB.put({ id:mid, kind:'photo', mime, ext, size:blob.size, name:base, obs_uuid:'', created_at:nowISO(), blob });
      adds.push({ id:uuid(), species_name:name, kind:'photo', ref_id:mid, ext, mime, source:'guide', created_at:nowISO() });
    }catch(err){}
    if(++done%20===0) toast(`取り込み中… ${done}/${imgs.length}`);
  }
  // 種ごとに最新1枚だけ残す（再取り込みで更新）
  let l=myguideList().concat(adds); const seen={}; const keep=[];
  for(let i=l.length-1;i>=0;i--){ const g=l[i];
    if(g.source==='guide'){ if(seen[g.species_name]) continue; seen[g.species_name]=1; }
    keep.unshift(g); }
  myguideSave(keep); scheduleFolderFull();
  const matched=adds.filter(a=>speciesByName(a.species_name)).length;
  toast(`図鑑ZIP：${adds.length}種を取り込みました（和名一致 ${matched}種）`); render();
}

/* ---------- 録音 ---------- */
let REC = null; // 録音中コンテキスト { mr, stream, t0, chunks, timer, abort }
function recSupported(){ return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder); }
function pickRecMime(){
  const c=['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/aac','audio/ogg'];
  for(const m of c){ try{ if(MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)) return m; }catch(e){} }
  return '';
}
function mimeExt(m){ m=m||''; if(m.includes('webm'))return 'webm'; if(m.includes('mp4'))return 'm4a';
  if(m.includes('aac'))return 'aac'; if(m.includes('ogg'))return 'ogg'; return 'bin'; }
function fmtDur(s){ s=Math.max(0,Math.round(+s||0)); const m=Math.floor(s/60); return `${m}:${String(s%60).padStart(2,'0')}`; }

async function recToggle(){
  if(REC){ recStop(); return; }
  if(!recSupported()){ toast('この端末では録音を利用できません（httpsで開いてください）'); return; }
  let stream;
  try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ toast('マイクを使えません（許可を確認してください）'); return; }
  const mime=pickRecMime();
  let mr;
  try{ mr=new MediaRecorder(stream, mime?{mimeType:mime}:undefined); }
  catch(e){ stream.getTracks().forEach(t=>t.stop()); toast('録音を開始できませんでした'); return; }
  const ctx={ mr, stream, t0:Date.now(), chunks:[], timer:null, abort:false };
  mr.ondataavailable=e=>{ if(e.data && e.data.size) ctx.chunks.push(e.data); };
  mr.onstop=()=>{ clearInterval(ctx.timer); stream.getTracks().forEach(t=>t.stop());
    const wasAbort=ctx.abort; REC=null; renderRecPanel();
    if(!wasAbort) recFinalize(ctx.chunks, mr.mimeType||mime, ctx.t0); };
  REC=ctx; mr.start(); ctx.timer=setInterval(updateRecTimer,250); renderRecPanel();
}
function recStop(){ if(REC){ clearInterval(REC.timer); try{ REC.mr.stop(); }catch(e){} } }
function recAbort(){ if(REC){ REC.abort=true; clearInterval(REC.timer); try{ REC.mr.stop(); }catch(e){} } }
function updateRecTimer(){ const el=$('#recTime'); if(el && REC) el.textContent=fmtDur((Date.now()-REC.t0)/1000); }

function recFinalize(chunks, mime, t0){
  const dur=Math.round((Date.now()-t0)/1000);
  const blob=new Blob(chunks,{type:mime}); if(!blob.size){ toast('録音が空でした'); return; }
  const meta={ id:uuid(), dur, size:blob.size, mime, ext:mimeExt(mime), created_at:nowISO() };
  const target=mediaTarget();   // 録音開始時点の対象を固定（保存完了までに画面が変わっても取り違えない）
  const owner = target.kind==='flight' ? { flight_uuid:target.uuid, obs_uuid:'' } : { obs_uuid:target.uuid };
  AudioDB.put(Object.assign({}, meta, { blob }, owner)).then(()=>{
    attachMediaMeta(target,'audio',meta); scheduleFolderFull(); toast('録音を保存しました');
  }).catch(()=>toast('録音の保存に失敗しました'));
}
function delAudio(id){ const target=mediaTarget();
  AudioDB.del(id).catch(()=>{}).then(()=>{
    detachMediaMeta(target,'audio',id); scheduleFolderFull(); toast('録音を削除しました');
  });
}
// メディアの持ち主（観察 or 飛翔）。飛翔画面では SCREENS._mediaCtx を設定する
function mediaCtx(){ return SCREENS._mediaCtx || { kind:'obs', uuid:(SCREENS._obs&&SCREENS._obs.uuid)||'', sv:(SCREENS._obs&&SCREENS._obs.survey_uuid)||currentSurveyUuid }; }
function mediaTarget(){ const c=mediaCtx(); return { kind:c.kind, uuid:c.uuid, sv:c.sv||currentSurveyUuid }; }
// 対象レコード(target)へメディアmetaを追記。保存済みならDBへ直接反映し、
// 現在画面が同じ対象の時だけ編集中配列とパネルを更新する（別記録への誤添付・誤表示を防ぐ）
function attachMediaMeta(target, field, meta){
  if(target.uuid){ const recKey=target.kind==='flight'?DB.key.fl:DB.key.ob;
    const list=DB.load(recKey); const i=list.findIndex(x=>x.uuid===target.uuid);
    if(i>=0){ list[i][field]=(list[i][field]||[]).concat([meta]);
      if(target.kind==='flight') DB.upsertFlight(list[i]); else DB.upsertObs(list[i]); }
    else{
      // まだ保存されていない新規記録。参照を失わないよう、この場で仮保存する（後で本保存が上書き）
      const sv=target.sv||currentSurveyUuid;
      if(target.kind==='flight') DB.upsertFlight({ uuid:target.uuid, survey_uuid:sv, path:[], species_name_snapshot:'',
        start_time:'', end_time:'', height_class:'不明', age_class:'不明', individual_label:'', behavior:'', count:1, memo:'', needs_review:false, audio:[], media:[], [field]:[meta] });
      else DB.upsertObs({ uuid:target.uuid, survey_uuid:sv, observed_at:nowISO(), latitude:'', longitude:'',
        species_id:'', species_name_snapshot:'', count:1, detection_method:'', behavior:'', habitat:'',
        identification_status:'未同定', confidence:'中', needs_review:false, note:'', external_photo_reference:'', audio:[], media:[], [field]:[meta] });
    } }
  const cur=mediaCtx();
  if(cur.kind===target.kind && cur.uuid===target.uuid){
    if(field==='audio'){ SCREENS._audio=(SCREENS._audio||[]).concat([meta]); renderRecPanel(); }
    else { SCREENS._media=(SCREENS._media||[]).concat([meta]); renderMediaPanel(); } }
}
function detachMediaMeta(target, field, id){
  if(target.uuid){ const recKey=target.kind==='flight'?DB.key.fl:DB.key.ob;
    const list=DB.load(recKey); const i=list.findIndex(x=>x.uuid===target.uuid);
    if(i>=0){ list[i][field]=(list[i][field]||[]).filter(x=>x.id!==id);
      if(target.kind==='flight') DB.upsertFlight(list[i]); else DB.upsertObs(list[i]); } }
  const cur=mediaCtx();
  if(cur.kind===target.kind && cur.uuid===target.uuid){
    if(field==='audio'){ SCREENS._audio=(SCREENS._audio||[]).filter(x=>x.id!==id); renderRecPanel(); }
    else { SCREENS._media=(SCREENS._media||[]).filter(x=>x.id!==id); renderMediaPanel(); } }
}
// パネル再構築や画面遷移の前に、割り当て済みのObject URLをまとめて解放する（メモリリーク防止）
function revokePanelUrls(root, selector){ if(!root) return;
  root.querySelectorAll(selector).forEach(el=>{ if(el._url){ try{ URL.revokeObjectURL(el._url); }catch(e){} el._url=null; } }); }
function renderRecPanel(){
  const box=$('#recPanel'); if(!box) return;
  revokePanelUrls(box, 'audio');   // 再構築前に古いObject URLを解放（リーク防止）
  if(!recSupported()){ box.innerHTML='<div class="note">この端末・接続では録音を利用できません（httpsまたはホーム画面から起動すると使えます）。</div>'; return; }
  const list=SCREENS._audio||[]; const active=!!REC;
  box.innerHTML=`
    <button type="button" class="btn ${active?'danger':''}" onclick="recToggle()">
      ${active?'<span class="recdot"></span>録音を停止 <span id="recTime">0:00</span>':'🎤 録音する'}</button>
    ${list.length?`<div class="reclist">${list.map((a,i)=>`
      <div class="recitem" data-id="${a.id}">
        <div class="row"><span class="small muted grow">録音${i+1} ・ ${fmtDur(a.dur)} ・ ${Math.max(1,Math.round(a.size/1024))}KB</span>
          <button type="button" class="btn danger" style="width:auto; padding:6px 12px;" onclick="delAudio('${a.id}')">削除</button></div>
        <audio controls preload="none" class="recaudio"></audio>
      </div>`).join('')}</div>`:''}`;
  // 各プレーヤーにIndexedDBの音声を割り当て（取得完了までに再描画・画面遷移していたら割り当てない）
  const gen=++_recGen;
  list.forEach(a=>{ AudioDB.get(a.id).then(r=>{ if(!r||!r.blob) return;
    if(gen!==_recGen) return;
    const el=box.querySelector(`.recitem[data-id="${a.id}"] audio`); if(!el||!el.isConnected) return;
    if(el._url) URL.revokeObjectURL(el._url);
    el._url=URL.createObjectURL(r.blob); el.src=el._url;
  }).catch(()=>{}); });
}

/* ---------- 写真・動画（カメラ／ライブラリ） ---------- */
function fileExt(name, mime){
  const m=String(name||'').match(/\.([a-z0-9]{1,5})$/i); if(m) return m[1].toLowerCase();
  mime=mime||''; const map={'image/jpeg':'jpg','image/png':'png','image/webp':'webp','image/heic':'heic',
    'image/heif':'heif','image/gif':'gif','video/mp4':'mp4','video/quicktime':'mov','video/webm':'webm','video/3gpp':'3gp'};
  return map[mime] || (mime.startsWith('video')?'mp4':'jpg');
}
function pickMedia(input){
  const files=Array.from(input.files||[]); input.value='';
  if(!files.length) return;
  const target=mediaTarget();   // 取り込み開始時点の対象を固定
  const owner = target.kind==='flight' ? { flight_uuid:target.uuid, obs_uuid:'' } : { obs_uuid:target.uuid };
  toast('取り込み中…');
  let ok=0, fail=0;
  const jobs=files.map(f=>{
    const kind=(f.type||'').startsWith('video')?'video':'photo';
    const meta={ id:uuid(), kind, mime:f.type||'', ext:fileExt(f.name,f.type), size:f.size, name:f.name||'', created_at:nowISO() };
    // 1件ずつ、成功したものだけ確実に反映（1件失敗しても成功分は残る）
    return PhotoDB.put(Object.assign({}, meta, { blob:f }, owner))
      .then(()=>{ attachMediaMeta(target,'media',meta); ok++; })
      .catch(()=>{ fail++; });
  });
  Promise.all(jobs).then(()=>{ scheduleFolderFull();
    if(fail) toast(`写真・動画：${ok}件追加・${fail}件失敗`); else toast('写真・動画を追加しました'); });
}
function delMedia(id){ const target=mediaTarget();
  PhotoDB.del(id).catch(()=>{}).then(()=>{
    detachMediaMeta(target,'media',id); scheduleFolderFull(); toast('削除しました');
  });
}
function renderMediaPanel(){
  const box=$('#mediaPanel'); if(!box) return;
  revokePanelUrls(box, '.mediael');   // 再構築前に古いObject URLを解放（リーク防止）
  const list=SCREENS._media||[];
  // ラベル直結＋capture属性で、端末のカメラを確実に起動（撮影と選択を分離）
  const HID='position:absolute; width:1px; height:1px; opacity:0; overflow:hidden;';
  box.innerHTML=`
    <input type="file" id="mediaCamPhoto" accept="image/*" capture="environment" style="${HID}" onchange="pickMedia(this)">
    <input type="file" id="mediaCamVideo" accept="video/*" capture="environment" style="${HID}" onchange="pickMedia(this)">
    <input type="file" id="mediaLib" accept="image/*,video/*" multiple style="${HID}" onchange="pickMedia(this)">
    <div class="btn-grid">
      <label class="btn" for="mediaCamPhoto">📷 写真を撮る</label>
      <label class="btn" for="mediaCamVideo">🎬 動画を撮る</label>
    </div>
    <div class="sp"></div>
    <label class="btn" for="mediaLib">🖼 ライブラリから選ぶ</label>
    ${list.length?`<div class="mediagrid">${list.map(m=>`
      <div class="mediaitem" data-id="${m.id}">
        <div class="mediathumb">${m.kind==='video'
          ? '<video class="mediael" controls preload="metadata"></video>'
          : '<img class="mediael" alt="写真">'}</div>
        <button type="button" class="mediadel" onclick="delMedia('${m.id}')">×</button>
        <div class="tiny muted mediacap">${m.kind==='video'?'🎬 動画':'📷 写真'} ・ ${Math.max(1,Math.round(m.size/1024))}KB</div>
      </div>`).join('')}</div>`:''}`;
  const gen=++_mediaGen;
  list.forEach(m=>{ PhotoDB.get(m.id).then(r=>{ if(!r||!r.blob) return;
    if(gen!==_mediaGen) return;
    const el=box.querySelector(`.mediaitem[data-id="${m.id}"] .mediael`); if(!el||!el.isConnected) return;
    if(el._url) URL.revokeObjectURL(el._url); el._url=URL.createObjectURL(r.blob); el.src=el._url;
  }).catch(()=>{}); });
}

// 折れ線を滑らかな曲線に（Chaikin法。始点・終点は保持。生データは変えず表示・書き出しにだけ使う）
function smoothPath(pts, iterations){
  pts=(pts||[]).filter(p=>Array.isArray(p)&&p.length===2);
  if(pts.length<3) return pts.slice();
  let cur=pts.slice();
  const n=(iterations==null)?2:iterations;
  for(let it=0; it<n; it++){
    const next=[cur[0]];
    for(let i=0;i<cur.length-1;i++){
      const a=cur[i], b=cur[i+1];
      next.push([a[0]*0.75+b[0]*0.25, a[1]*0.75+b[1]*0.25]);
      next.push([a[0]*0.25+b[0]*0.75, a[1]*0.25+b[1]*0.75]);
    }
    next.push(cur[cur.length-1]);
    cur=next;
  }
  return cur;
}
// 緯度経度が有効な数値か（不正な文字列でLeafletが例外を投げ地図全体が壊れるのを防ぐ）
// parseFloat('35abc')=35 のような部分一致は弾く（純粋な数値表記のみ許可）＋範囲チェック
const _numRe=/^[+-]?\d+(\.\d+)?$/;
function validLatLon(lat,lon){ const sa=String(lat).trim(), sb=String(lon).trim();
  if(!_numRe.test(sa)||!_numRe.test(sb)) return false;
  const a=parseFloat(sa), b=parseFloat(sb);
  return a>=-90&&a<=90&&b>=-180&&b<=180; }
function validPathPt(p){ if(!Array.isArray(p)||p.length!==2) return false;
  const a=+p[0], b=+p[1];
  return Number.isFinite(a)&&Number.isFinite(b)&&a>=-90&&a<=90&&b>=-180&&b<=180; }
// 2点間の距離（m）。地図が無くても使える（集計・書き出し用）
function distMeters(a,b){
  const R=6371000, toR=Math.PI/180;
  const dLat=(b[0]-a[0])*toR, dLon=(b[1]-a[1])*toR;
  const s=Math.sin(dLat/2)**2 + Math.cos(a[0]*toR)*Math.cos(b[0]*toR)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.min(1,Math.sqrt(s)));
}
function pathLength(path){ let d=0; const p=(path||[]).filter(x=>Array.isArray(x)&&x.length===2);
  for(let i=1;i<p.length;i++) d+=distMeters(p[i-1],p[i]); return d; }
function fmtDist(d){ return d>=1000?(d/1000).toFixed(2)+'km':Math.round(d)+'m'; }
// 飛翔経路の色分け（種／齢／個体）。値ごとに安定した色を割り当てる
const FLIGHT_PALETTE=['#e0a030','#3fb984','#5a7de0','#d05555','#9b59b6','#16a3a3','#e07b39','#7a8b3f','#c94f7c','#4a6fa5'];
function flightColorMode(){ const m=localStorage.getItem('bs_flightcolor'); return (m==='齢'||m==='個体')?m:'種'; }
function flightColorKey(f,mode){ mode=mode||flightColorMode();
  if(mode==='齢') return f.age_class||'不明';
  if(mode==='個体') return f.individual_label||'（未設定）';
  return f.species_name_snapshot||'（未同定）'; }
// 値ごとに色番号を初回登場順で固定して保存する。あとから別の値が増えても既存の色がずれない。
function flightColorMap(){ try{ return JSON.parse(localStorage.getItem('bs_flightcoloridx')||'{}'); }catch(e){ return {}; } }
function flightColorIndex(mode, value){
  const all=flightColorMap(); const m=all[mode]||(all[mode]={});
  if(m[value]==null){ const used=Object.values(m); m[value]=used.length?Math.max.apply(null,used)+1:0;
    try{ localStorage.setItem('bs_flightcoloridx', JSON.stringify(all)); }catch(e){} }
  return m[value];
}
function initFlightMap(){
  const el=$('#fmap'); if(!el) return;
  let center=[43.06,141.35], zoom=13;
  if(flightPath.length){ center=flightPath[0]; zoom=15; }
  else if(lastFix){ center=[lastFix.lat,lastFix.lon]; zoom=15; }
  mapObj=L.map('fmap').setView(center,zoom);
  const gsiAttr='<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank" rel="noopener">地理院タイル</a>';
  const gsi=(name,ext,mx,opt)=>L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/'+name+'/{z}/{x}/{y}.'+ext, Object.assign({maxZoom:18, maxNativeZoom:mx||18, attribution:gsiAttr}, opt||{}));
  const bases={ '標準地図':gsi('std','png',18), '淡色地図':gsi('pale','png',18), '写真（航空・衛星）':gsi('seamlessphoto','jpg',18) };
  let savedBase=localStorage.getItem('bs_basemap'); if(!bases[savedBase]) savedBase='標準地図';
  bases[savedBase].addTo(mapObj);
  L.control.layers(bases,{},{position:'topright',collapsed:true}).addTo(mapObj);
  mapObj.on('baselayerchange', e=>{ try{ localStorage.setItem('bs_basemap', e.name); }catch(err){} });
  mapObj.on('click', e=>{ flightPath.push([e.latlng.lat, e.latlng.lng]); redrawFlight(); });
  // 同じ調査の他の飛翔経路を薄く重ねる（1画面で何本も見えるように）
  if(SCREENS._flightSv){ DB.flightsOf(SCREENS._flightSv).forEach(of=>{
    if(of.uuid===SCREENS._flightSelf) return;
    const p=(of.path||[]).filter(x=>Array.isArray(x)&&x.length===2);
    if(p.length<2) return;
    L.polyline(smoothPath(p),{color:'#e0a030',weight:3,opacity:.3,dashArray:'4,4'}).addTo(mapObj);
  }); }
  redrawFlight();
  if(flightPath.length>1){ try{ mapObj.fitBounds(flightPath,{padding:[40,40]}); }catch(e){} }
  setTimeout(()=>{ if(mapObj) mapObj.invalidateSize(); }, 200);
  addLocateControl();
  if(!flightPath.length) locateOnMap([]);
}
function redrawFlight(){
  if(!mapObj) return;
  if(flightLayer){ try{ mapObj.removeLayer(flightLayer); }catch(e){} }
  flightLayer=L.layerGroup().addTo(mapObj);
  if(flightPath.length){
    if(flightPath.length>1) L.polyline(flightPath,{color:'#e0a030',weight:4,opacity:.9}).addTo(flightLayer);
    const badge=(txt,bg)=>L.divIcon({className:'',html:`<div style="background:${bg};border:2px solid #fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.5)">${txt}</div>`,iconSize:[24,24],iconAnchor:[12,12]});
    L.marker(flightPath[0],{icon:badge('始','#3fb984')}).addTo(flightLayer);
    flightPath.forEach((p,i)=>{ if(i>0 && i<flightPath.length-1) L.circleMarker(p,{radius:4,color:'#fff',weight:1,fillColor:'#e0a030',fillOpacity:1}).addTo(flightLayer); });
    if(flightPath.length>1) L.marker(flightPath[flightPath.length-1],{icon:badge('終','#d05555')}).addTo(flightLayer);
  }
  const info=$('#fInfo');
  if(info){ let d=0; for(let i=1;i<flightPath.length;i++){ try{ d+=mapObj.distance(flightPath[i-1],flightPath[i]); }catch(e){} }
    info.textContent = flightPath.length? `${flightPath.length}点 ・ 全長 約${d>=1000?(d/1000).toFixed(2)+'km':Math.round(d)+'m'}` : 'まだ点がありません。地図をタップして描いてください。'; }
}

function flightClear(){ if(flightPath.length && !confirm('描いた線を全部消しますか？')) return; flightPath=[]; redrawFlight(); }

function saveHypResult(u,hyUuid,editing){
  const f=$('#hrForm'); const g=n=>{const el=f.querySelector(`[name="${n}"]`); return el?el.value:'';};
  const judgment=segVal('judgment');
  if(judgment && !g('judgment_reason').trim()){ toast('判定するときは判定理由を入力してください'); return; }
  const obsIds=[...document.querySelectorAll('#hrForm .chips .c.on')].map(el=>el.dataset.obs).filter(Boolean);
  const prev=editing?DB.resultsOf(hyUuid).find(x=>x.uuid===u):{uuid:u};
  const rec=Object.assign({},prev,{ uuid:u, hypothesis_uuid:hyUuid,
    verified_at:g('verified_at'), observed_result:g('observed_result'), judgment,
    judgment_reason:g('judgment_reason'), missing_information:g('missing_information'),
    alternative_explanation:g('alternative_explanation'), next_action:g('next_action'),
    next_method:g('next_method'), note:g('note'), observation_uuids:obsIds });
  if(!DB.upsertHypResult(rec)) return;   // 保存失敗なら成功表示も遷移もしない

SCREENS.summary = (u)=>{
  const s=DB.survey(u); const obs=DB.obsOf(u); const flights=DB.flightsOf(u);
  const map={};
  const ent=key=>map[key]||(map[key]={name:key, total:0, count:0, first:null, last:null, methods:new Set(), review:0, undet:0, routes:0});
  const touchTime=(m,t)=>{ if(t){ if(!m.first||t<m.first) m.first=t; if(!m.last||t>m.last) m.last=t; } };
  obs.forEach(o=>{ const m=ent(o.species_name_snapshot||'（未同定）');
    m.total+=parseInt(o.count,10)||0; m.count++;
    if(o.detection_method) m.methods.add(o.detection_method);
    if(o.needs_review) m.review++;
    if(o.identification_status==='未同定'||!o.species_name_snapshot) m.undet++;
    touchTime(m,o.observed_at);
  });
  // 飛翔経路も種別集計に合流（延べ個体に加算・確認方法に「飛翔」・経路数を計上）
  let flightRoutes=0, flightInd=0, flightDist=0;
  flights.forEach(f=>{ const path=(f.path||[]).filter(validPathPt);
    if(path.length<2) return;
    const m=ent(f.species_name_snapshot||'（未同定）');
    const c=parseInt(f.count,10)||0;
    m.total+=c; m.routes++; m.methods.add('飛翔');
    if(f.needs_review) m.review++;
    touchTime(m,f.start_time);
    flightRoutes++; flightInd+=c; flightDist+=pathLength(path);
  });
  const rows=Object.values(map).sort((a,b)=>b.total-a.total);
  const totalInd=rows.reduce((a,r)=>a+r.total,0);
  return {
    title:'種別集計',
    sub:[`<span class="pill">確認種数 ${rows.filter(r=>r.name!=='（未同定）').length}</span>`,`<span class="pill">延べ ${totalInd}個体</span>`,
      flightRoutes?`<span class="pill">飛翔 ${flightRoutes}経路</span>`:''].filter(Boolean),
    html:`
      ${rows.length? `<div class="tablewrap"><table>
        <thead><tr><th>種名</th><th class="num">個体</th><th class="num">回数</th><th class="num">経路</th><th>初認</th><th>終認</th><th>確認</th></tr></thead>
        <tbody>${rows.map(r=>`<tr>
          <td>${esc(r.name)}${r.review?` <span class="badge warn tiny">要${r.review}</span>`:''}</td>
          <td class="num">${r.total}</td><td class="num">${r.count}</td><td class="num">${r.routes||''}</td>
          <td>${fmtTime(r.first)}</td><td>${fmtTime(r.last)}</td>
          <td class="tiny muted">${[...r.methods].join('/')}</td></tr>`).join('')}</tbody>
      </table></div>` : '<div class="empty">観察記録がありません。</div>'}
      <div class="sp"></div>
      <div class="note">合計個体数は延べ数です。同一個体の重複記録を含むため、生息個体数とは限りません。飛翔経路の個体数も延べに含みます。</div>
      ${flightRoutes?`<div class="sp"></div>
      <h3 style="margin:0 0 6px;">飛翔経路のまとめ</h3>
      <div class="row" style="gap:8px;flex-wrap:wrap;">
        <span class="pill">経路数 ${flightRoutes}</span>
        <span class="pill">延べ ${flightInd}個体</span>
        <span class="pill">合計距離 約${fmtDist(flightDist)}</span>
      </div>`:''}
      <div class="sp"></div>
      <button class="btn" onclick="nav('exportSurvey','${u}')">⤓ この調査を書き出す（CSV/GeoJSON）</button>
    `
  };
};

SCREENS.map = (u)=>{
  const obs=DB.obsOf(u).filter(o=>validLatLon(o.latitude,o.longitude));
  const notes=DB.notesOf(u).filter(n=>validLatLon(n.latitude,n.longitude));
  const flights=DB.flightsOf(u).filter(f=>(f.path||[]).filter(validPathPt).length>=2);
  const targets=DB.obsOf(u).filter(o=>validLatLon(o.target_latitude,o.target_longitude));
  return {
    title:'地図',
    sub:[`<span class="pill">観察地点 ${obs.length}</span>`, targets.length?`<span class="pill">止まり/巣 ${targets.length}</span>`:'', flights.length?`<span class="pill">飛翔経路 ${flights.length}</span>`:''].filter(Boolean),
    html:`<div id="map"></div>
      <div class="sp"></div>
      <div class="note">丸＝観察地点 / ?＝未同定 / △＝要確認 / ◆赤＝止まり・巣の位置 / ノート＝メモ / 色つき曲線＝飛翔経路（緑「始」→赤「終」）。左下の凡例で線の色分けを 種／齢／個体 に切り替えられます。青丸＝現在地（開くと自動で表示範囲に含めます）。右上の📍で現在地へ。右上の重ねアイコンで、背景（標準／淡色／航空写真）を選び、さらに「陰影」「傾斜」を重ねられます。選択は次回も保持。</div>`,
    onMount:()=>{ _mapTimer=setTimeout(()=>drawMap(obs,notes,flights,targets),50); }
  };
};
function drawMap(obs,notes,flights,targets){
  const el=$('#map'); if(!el) return;
  let center=[35.68,139.77], zoom=13;
  const pts=obs.filter(o=>validLatLon(o.latitude,o.longitude));
  if(pts.length){ center=[parseFloat(pts[0].latitude), parseFloat(pts[0].longitude)]; zoom=15; }
  else if(lastFix){ center=[lastFix.lat,lastFix.lon]; zoom=15; }
  mapObj=L.map('map').setView(center,zoom);
  // 背景地図（すべて地理院タイル＝オフラインキャッシュ対応）を切り替え可能に
  const gsiAttr='<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank" rel="noopener">地理院タイル</a>';
  const gsi=(name,ext,mx,opt)=>L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/'+name+'/{z}/{x}/{y}.'+ext, Object.assign({maxZoom:18, maxNativeZoom:mx||18, attribution:gsiAttr}, opt||{}));
  // 背景（1つ選ぶ）
  const bases={
    '標準地図': gsi('std','png',18),
    '淡色地図': gsi('pale','png',18),
    '写真（航空・衛星）': gsi('seamlessphoto','jpg',18),
  };
  // 重ねるレイヤ（ON/OFF・半透明）。航空写真＋陰影で起伏が分かる
  const overlays={
    '陰影を重ねる（起伏）': gsi('hillshademap','png',16,{opacity:0.5}),
    '傾斜を重ねる（急斜面）': gsi('slopemap','png',15,{opacity:0.45}),
  };
  let savedBase=localStorage.getItem('bs_basemap'); if(!bases[savedBase]) savedBase='標準地図';
  bases[savedBase].addTo(mapObj);
  let savedOv=[]; try{ savedOv=JSON.parse(localStorage.getItem('bs_overlays')||'[]'); }catch(e){}
  savedOv.forEach(n=>{ if(overlays[n]) overlays[n].addTo(mapObj); });
  L.control.layers(bases, overlays, {position:'topright', collapsed:true}).addTo(mapObj);
  mapObj.on('baselayerchange', e=>{ try{ localStorage.setItem('bs_basemap', e.name); }catch(err){} });
  mapObj.on('overlayadd overlayremove', ()=>{ try{
    localStorage.setItem('bs_overlays', JSON.stringify(Object.keys(overlays).filter(n=>mapObj.hasLayer(overlays[n]))));
  }catch(err){} });
  const mk=(lat,lon,html,color)=>L.marker([lat,lon],{icon:L.divIcon({className:'',
    html:`<div style="background:${color};border:2px solid #fff;border-radius:50%;width:22px;height:22px;
      display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700;
      box-shadow:0 1px 4px rgba(0,0,0,.5)">${html}</div>`, iconSize:[22,22], iconAnchor:[11,11]})});
  const group=[];
  pts.forEach(o=>{ const lat=parseFloat(o.latitude), lon=parseFloat(o.longitude);
    let sym='●', col='#3fb984';
    if(o.needs_review){ sym='▲'; col='#e0a030'; }
    else if(o.identification_status==='未同定'||!o.species_name_snapshot){ sym='?'; col='#8a9a93'; }
    const m=mk(lat,lon,sym,col).addTo(mapObj);
    m.bindPopup(`<b>${esc(o.species_name_snapshot||'（未同定）')}</b><br>${esc(o.count==null||o.count===''?1:o.count)}個体 ・ ${esc(o.detection_method||'')}<br>${fmtTime(o.observed_at)}`);
    group.push([lat,lon]);
  });
  notes.forEach(n=>{ const lat=parseFloat(n.latitude), lon=parseFloat(n.longitude);
    const m=mk(lat,lon,'✎','#5a7de0').addTo(mapObj);
    m.bindPopup(`<b>メモ:${esc(n.category||'')}</b><br>${esc((n.content||'').slice(0,80))}`); group.push([lat,lon]); });
  // 対象位置（止まり木・巣など）を赤の◆で表示
  (targets||[]).forEach(o=>{ const lat=parseFloat(o.target_latitude), lon=parseFloat(o.target_longitude);
    const m=mk(lat,lon,'◆','#b03030').addTo(mapObj);
    m.bindPopup(`<b>${esc(o.species_name_snapshot||'（未同定）')}</b> 止まり/巣の位置<br>${esc(o.nest_state||'')}${o.nest_tree_species?'<br>営巣木:'+esc(o.nest_tree_species)+(o.nest_tree_height?'（'+esc(o.nest_tree_height)+'m）':''):''}`);
    group.push([lat,lon]); });
  // 飛翔経路（滑らかな曲線＋始点/終点。色は種／齢／個体で切替）
  const fMode=flightColorMode();
  // 値ごとに固定の色番号（初回登場順・保存）を使う。別種が同色になったり、分類追加で色がずれるのを防ぐ
  const fKeys=[...new Set((flights||[]).map(f=>flightColorKey(f,fMode)))];
  const colorOf={}; fKeys.forEach(k=>colorOf[k]=FLIGHT_PALETTE[flightColorIndex(fMode,k)%FLIGHT_PALETTE.length]);
  const legend={};   // 凡例用：値→色
  (flights||[]).forEach(f=>{ const path=(f.path||[]).filter(validPathPt);
    if(path.length<2) return;
    const col=colorOf[flightColorKey(f,fMode)]; legend[flightColorKey(f,fMode)]=col;
    const pl=L.polyline(smoothPath(path),{color:col,weight:4,opacity:.85}).addTo(mapObj);
    pl.bindPopup(`<b>🛩 ${esc(f.species_name_snapshot||'（未同定）')}</b>${f.age_class&&f.age_class!=='不明'?' ・ '+esc(f.age_class):''}${f.individual_label?' ・ '+esc(f.individual_label):''}<br>${esc(f.count==null||f.count===''?1:f.count)}個体 ・ ${esc(f.height_class||'')}<br>${esc(f.behavior||'')}<br>${fmtTime(f.start_time)}`);
    const badge=(txt,bg)=>L.divIcon({className:'',html:`<div style="background:${bg};border:2px solid #fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.5)">${txt}</div>`,iconSize:[20,20],iconAnchor:[10,10]});
    L.marker(path[0],{icon:badge('始','#3fb984')}).addTo(mapObj);
    L.marker(path[path.length-1],{icon:badge('終','#d05555')}).addTo(mapObj);
    path.forEach(p=>group.push(p));
  });
  if(Object.keys(legend).length) addFlightLegend(legend, fMode);
  mapCurMarker=null; mapCurCircle=null;
  if(lastFix){ addCurrentPos(lastFix.lat,lastFix.lon,lastFix.acc); }
  if(group.length>1){ try{ mapObj.fitBounds(group,{padding:[40,40]}); }catch(e){} }
  else if(group.length===1 && !lastFix){ mapObj.setView(group[0],15); }
  // コンテナ確定後にサイズを再計算（初期表示のタイル欠け・灰色化を防ぐ）
  setTimeout(()=>{ if(mapObj) mapObj.invalidateSize(); }, 200);
  addLocateControl();   // 右上に「現在地へ」ボタンを設置
  locateOnMap(group);   // 現在地を取得し、自動で表示範囲に含める
}
// 飛翔経路の凡例＋色モード切替（種→齢→個体）を地図左下に置く
function cycleFlightColorMode(){ const order=['種','齢','個体']; const cur=flightColorMode();
  const next=order[(order.indexOf(cur)+1)%order.length]; localStorage.setItem('bs_flightcolor',next); render(); }
function addFlightLegend(legend, mode){
  if(!mapObj) return;
  const items=Object.keys(legend).sort().map(k=>
    `<div style="display:flex;align-items:center;gap:6px;margin:2px 0;">
      <span style="width:14px;height:4px;border-radius:2px;background:${legend[k]};display:inline-block;"></span>
      <span style="font-size:11px;">${esc(k)}</span></div>`).join('');
  const Ctl=L.Control.extend({ options:{position:'bottomleft'},
    onAdd:function(){
      const d=L.DomUtil.create('div','');
      d.style.cssText='background:rgba(255,255,255,.92);padding:6px 8px;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.3);max-width:170px;color:#222;';
      d.innerHTML=`<div style="font-size:11px;font-weight:700;margin-bottom:3px;">飛翔：${esc(mode)}別</div>${items}
        <button type="button" style="margin-top:5px;font-size:11px;padding:3px 6px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;">色を切替（種/齢/個体）</button>`;
      L.DomEvent.disableClickPropagation(d);
      const b=d.querySelector('button'); if(b) b.onclick=cycleFlightColorMode;
      return d;
    }});
  mapObj.addControl(new Ctl());
}
// 地図上の現在地マーカー（青丸）と精度円を更新
function addCurrentPos(lat,lon,acc){
  if(!mapObj) return;
  if(mapCurMarker){ try{ mapObj.removeLayer(mapCurMarker); }catch(e){} }
  if(mapCurCircle){ try{ mapObj.removeLayer(mapCurCircle); }catch(e){} }
  if(acc && acc>0 && acc<3000){
    mapCurCircle=L.circle([lat,lon],{radius:acc,color:'#3f7de0',fillColor:'#3f7de0',fillOpacity:.08,weight:1}).addTo(mapObj);
  }
  mapCurMarker=L.circleMarker([lat,lon],{radius:7,color:'#fff',weight:2,fillColor:'#3f7de0',fillOpacity:1}).addTo(mapObj).bindPopup('現在地');
}
// 現在地を取得して表示範囲を自動調整（観察地点があれば両方が収まるように）
function locateOnMap(group){
  if(!navigator.geolocation) return;
  const targetMap=mapObj;   // この地図に対する取得。画面を切り替えたら新しい地図を触らない
  toast('現在地を取得中…');
  navigator.geolocation.getCurrentPosition(p=>{
    const lat=p.coords.latitude, lon=p.coords.longitude, acc=p.coords.accuracy;
    lastFix={lat,lon,acc,t:Date.now()};
    if(!mapObj || mapObj!==targetMap) return;
    addCurrentPos(lat,lon,acc);
    const all=(group||[]).concat([[lat,lon]]);
    if(all.length>1){ try{ mapObj.fitBounds(all,{padding:[40,40], maxZoom:17}); }catch(e){} }
    else { mapObj.setView([lat,lon],16); }
  }, e=>{ /* 取得失敗時は既存の表示のまま */ }, {enableHighAccuracy:true, timeout:15000, maximumAge:10000});
}
// 右上の「現在地へ」ボタン（自分中心に寄せ直す）
function addLocateControl(){
  if(!mapObj || !navigator.geolocation) return;
  const targetMap=mapObj;   // このボタンが属する地図
  const Ctl=L.Control.extend({ options:{position:'topright'},
    onAdd:function(){
      const b=L.DomUtil.create('button','locate-btn'); b.type='button'; b.innerHTML='📍'; b.title='現在地へ';
      L.DomEvent.disableClickPropagation(b); L.DomEvent.on(b,'click',L.DomEvent.stop);
      b.onclick=()=>{ toast('現在地を取得中…');
        navigator.geolocation.getCurrentPosition(p=>{
          const lat=p.coords.latitude, lon=p.coords.longitude, acc=p.coords.accuracy;
          lastFix={lat,lon,acc,t:Date.now()}; if(!mapObj || mapObj!==targetMap) return; addCurrentPos(lat,lon,acc); mapObj.setView([lat,lon],16);
        }, ()=>toast('現在地を取得できませんでした'), {enableHighAccuracy:true, timeout:15000}); };
      return b;
    } });
  mapObj.addControl(new Ctl());
}

/* ============================================================
   検索（全調査を横断）
   ============================================================ */
SCREENS.search = ()=>({
  title:'検索',
  html:`
    <label class="field"><span class="lab">記録を横断して探す（種名・メモ・場所・行動など）</span>
      <input id="searchBox" autocomplete="off" placeholder="例）カワセミ ／ 採餌 ／ 川の名前" oninput="runSearch(this.value)"></label>
    <div id="searchResults"></div>`,
  onMount:()=>{ const b=$('#searchBox'); if(b) b.value=SCREENS._searchQ||''; runSearch(SCREENS._searchQ||''); if(b) b.focus(); }
});
function runSearch(q){
  SCREENS._searchQ=q; const box=$('#searchResults'); if(!box) return;
  q=(q||'').trim();
  if(!q){ box.innerHTML='<div class="empty small">種名・メモ・場所などを入力すると、すべての調査から探します。</div>'; return; }
  const qk=toKata(q.toLowerCase());
  const hit=txt=>toKata(String(txt||'').toLowerCase()).includes(qk);
  const svMap={}; DB.surveys().forEach(s=>svMap[s.uuid]=s); // 削除されていない調査のみ
  const results=[];
  DB.observations().forEach(o=>{ const s=svMap[o.survey_uuid]; if(!s) return;
    if([o.species_name_snapshot,o.note,o.behavior,o.habitat,o.detection_method,o.identification_status,s.name,s.location_name].some(hit)){
      results.push({ kind:'obs', s, o, t:o.observed_at||'',
        title:o.species_name_snapshot||'（未同定）',
        sub:`${esc(s.name||'')} ・ ${fmtDate(o.observed_at)} ・ ${esc(o.detection_method||'')}${o.behavior?' ・ '+esc(o.behavior):''}`,
        snippet:o.note||'', marks:`${(o.audio&&o.audio.length)?'🎤':''}${(o.media&&o.media.length)?'📷':''}${o.latitude?'📍':''}` });
    }});
  DB.notes().forEach(n=>{ const s=svMap[n.survey_uuid]; if(!s) return;
    if([n.content,n.category,s.name,s.location_name].some(hit)){
      results.push({ kind:'note', s, n, t:n.recorded_at||'',
        title:'📝 メモ: '+esc(n.category||''), sub:`${esc(s.name||'')} ・ ${fmtDate(n.recorded_at)}`,
        snippet:n.content||'', marks:'' });
    }});
  results.sort((a,b)=>String(b.t).localeCompare(String(a.t)));
  if(!results.length){ box.innerHTML=`<div class="empty small">「${esc(q)}」に一致する記録はありませんでした。</div>`; return; }
  box.innerHTML=`<div class="small muted" style="margin-bottom:8px;">${results.length}件見つかりました</div>`+
    results.slice(0,200).map(r=>{
      const act=r.kind==='obs'
        ? `nav('obsEdit', JSON.stringify({sv:'${r.s.uuid}',id:'${r.o.uuid}'}))`
        : `nav('noteEdit', JSON.stringify({sv:'${r.s.uuid}',id:'${r.n.uuid}'}))`;
      return `<div class="card tap" onclick="${act}">
        <div class="row"><div class="grow">
          <div style="font-weight:700;">${esc(r.title)} <span class="tiny muted">${r.marks}</span></div>
          <div class="small muted">${r.sub}</div>
          ${r.snippet?`<div class="small" style="margin-top:4px;">${esc(String(r.snippet).slice(0,80))}</div>`:''}
        </div><span class="muted">›</span></div></div>`;
    }).join('');
}

SCREENS.trash = ()=>{
  const groups=[
    { k:DB.key.sv, label:'調査',   items:DB.deleted(DB.key.sv), name:x=>x.name||'(無題の調査)', sub:x=>fmtDate(x.survey_date) },
    { k:DB.key.ob, label:'観察記録', items:DB.deleted(DB.key.ob), name:x=>x.species_name_snapshot||'（未同定）', sub:x=>fmtTime(x.observed_at) },
    { k:DB.key.nt, label:'メモ',   items:DB.deleted(DB.key.nt), name:x=>x.category||'メモ', sub:x=>String(x.content||'').slice(0,40) },
    { k:DB.key.hy, label:'仮説',   items:DB.deleted(DB.key.hy), name:x=>x.title||'(無題の仮説)', sub:x=>'' },
    { k:DB.key.fl, label:'飛翔経路', items:DB.deleted(DB.key.fl), name:x=>'🛩 '+(x.species_name_snapshot||'（未同定）'), sub:x=>fmtTime(x.start_time) },
  ];
  const total=groups.reduce((n,g)=>n+g.items.length,0);
  return { title:'ごみ箱',
    html: total? `
      ${groups.filter(g=>g.items.length).map(g=>`
        <h3 class="muted small">${g.label}（${g.items.length}）</h3>
        ${g.items.map(x=>`<div class="card">
          <div style="font-weight:700;">${esc(g.name(x))}</div>
          <div class="small muted">${esc(g.sub(x))}</div>
          <div class="row" style="margin-top:10px; gap:8px;">
            <button class="btn" style="flex:1;" onclick="restoreItem('${g.k}','${x.uuid}')">↩ 復元</button>
            <button class="btn danger" style="flex:1;" onclick="purgeItem('${g.k}','${x.uuid}')">完全に削除</button>
          </div></div>`).join('')}`).join('')}
      <div class="divider"></div>
      <button class="btn danger" onclick="purgeAll()">ごみ箱を空にする（完全削除）</button>
      <div class="sp"></div>
      <div class="note">「復元」で元に戻せます。「完全に削除」すると取り消せません。調査を復元・完全削除すると、ひも付く観察記録・メモ・仮説もまとめて処理します。</div>
    ` : '<div class="empty">ごみ箱は空です。</div>'
  };
};
function restoreItem(k,u){
  DB.restore(k,u);
  // 仮説と一緒に消えた検証結果(deleted_with_hyp)を戻す
  const restoreHypResults=(hyUuid)=>{ const arr=DB.load(DB.key.hr); let ch=false;
    arr.forEach(r=>{ if(r.hypothesis_uuid===hyUuid && r.deleted_at && r.deleted_with_hyp){ delete r.deleted_at; delete r.deleted_with_hyp; ch=true; } });
    if(ch) DB.save(DB.key.hr,arr); };
  if(k===DB.key.hy){ restoreHypResults(u); }
  if(k===DB.key.sv){
    DB.deleted(DB.key.ob).filter(o=>o.survey_uuid===u).forEach(o=>DB.restore(DB.key.ob,o.uuid));
    DB.deleted(DB.key.nt).filter(n=>n.survey_uuid===u).forEach(n=>DB.restore(DB.key.nt,n.uuid));
    DB.deleted(DB.key.hy).filter(h=>h.survey_uuid===u).forEach(h=>{ DB.restore(DB.key.hy,h.uuid); restoreHypResults(h.uuid); });
    DB.deleted(DB.key.fl).filter(f=>f.survey_uuid===u).forEach(f=>DB.restore(DB.key.fl,f.uuid));
  }
  toast('復元しました'); render();
}
function purgeItem(k,u){
  if(!confirm('完全に削除すると元に戻せません。よろしいですか？')) return;
  if(k===DB.key.sv){
    DB.load(DB.key.ob).filter(o=>o.survey_uuid===u).forEach(o=>DB.hardDelete(DB.key.ob,o.uuid));
    DB.load(DB.key.nt).filter(n=>n.survey_uuid===u).forEach(n=>DB.hardDelete(DB.key.nt,n.uuid));
    DB.load(DB.key.hy).filter(h=>h.survey_uuid===u).forEach(h=>{
      DB.load(DB.key.hr).filter(r=>r.hypothesis_uuid===h.uuid).forEach(r=>DB.hardDelete(DB.key.hr,r.uuid));
      DB.hardDelete(DB.key.hy,h.uuid); });
    DB.load(DB.key.fl).filter(f=>f.survey_uuid===u).forEach(f=>DB.hardDelete(DB.key.fl,f.uuid));
  }
  if(k===DB.key.hy){   // 仮説単体の完全削除でも、子の検証結果を残骸にしない
    DB.load(DB.key.hr).filter(r=>r.hypothesis_uuid===u).forEach(r=>DB.hardDelete(DB.key.hr,r.uuid));
  }
  DB.hardDelete(k,u); mediaGcAll(); toast('完全に削除しました'); render();
}
function purgeAll(){
  if(!confirm('ごみ箱の中身をすべて完全に削除します。元に戻せません。よろしいですか？')) return;
  [DB.key.sv,DB.key.ob,DB.key.nt,DB.key.hy,DB.key.hr,DB.key.fl].forEach(k=>
    DB.deleted(k).forEach(x=>DB.hardDelete(k,x.uuid)));
  mediaGcAll(); toast('ごみ箱を空にしました'); render();
}

function updateCallSaved(){

    const sv=$('#callSaved');

// タップされた種の鳴き声だけを読み込んで再生（一覧で一括ロードしないので軽い）
function playCall(btn, jp){
  const c=CALLS[jp]; if(!c || !btn) return;
  btn.disabled=true; btn.textContent='読み込み中…';
  const show=(src, isBlob)=>{ const a=document.createElement('audio'); a.className='recaudio'; a.controls=true; a.autoplay=true;
    a.style.display='block'; a.src=src;
    if(isBlob){ a._url=src; a.addEventListener('ended',()=>{ if(a._url){ try{ URL.revokeObjectURL(a._url); }catch(e){} a._url=null; } }); } // 再生後・画面遷移(render)で解放
    if(btn.parentNode) btn.replaceWith(a); try{ a.play&&a.play().catch(()=>{}); }catch(e){} };
  CallDB.get(jp).then(r=>{
    if(r&&r.blob) show(URL.createObjectURL(r.blob), true); // 端末保存済み＝圏外でも再生
    else show('./assets/calls/'+c.f, false);               // 未保存＝ネットから
